<!DOCTYPE html>
<html lang="en" data-theme="purple">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>Operational Resilience &amp; Controls Assessment — {{PROJECT}}</title>
<style>
/* ============================================================
   LONG-FORM REPORT — canonical anchor format.
   Reproduces the reference report exactly (thin sticky topbar →
   compact hero → 3-col 208|1fr|244 both-rail layout → stacked
   rounded section panels → dark split-diff → folded appendix).

   DATA-DRIVEN: the ONLY content source is the JSON in
   <script id="report-data">. render() builds the whole DOM from it
   on DOMContentLoaded; wireInteractions()+wireThemeSwitch() add the
   live behaviour. <noscript> covers the JS-off case.
   Self-contained: inline CSS + inline SVG + system fonts. No external requests.
   ============================================================ */
:root{
 /* surfaces */
 --bg:#fff; --bg-band:#f6f6f8; --bg-subtle:#fafafb; --bg-deep:#15131a;
 --rule:#dcdce2; --rule-soft:#ebebef;
 /* ink */
 --ink:#11131a; --ink-mid:#33363f; --ink-soft:#5a5e68; --ink-faint:#868b95;
 /* brand accent — Purple (default) */
 --navy:#a100ff; --navy-deep:#7a00c2; --navy-bg:#f3e8ff; --navy-line:#d9bef5;
 /* cleared / approved */
 --ok:#5a2f8a; --ok-bg:#efe8f5; --ok-line:#d0b5e0;
 /* semantic states — constant across themes */
 --risk:#b3261e; --risk-bg:#fbeceb; --risk-line:#edc7c4;
 --hold:#8a6d00; --hold-bg:#fbf3da; --hold-line:#e7d8a4;
 /* type stacks */
 --mono:ui-monospace,"JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;
 --sans:-apple-system,"Segoe UI",system-ui,Roboto,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Apple SD Gothic Neo","Malgun Gothic","PingFang SC","Microsoft YaHei","Noto Sans CJK JP","Noto Sans CJK KR","Noto Sans CJK SC","Noto Sans JP","Noto Sans KR","Noto Sans SC","Noto Sans",sans-serif;
}
/* theme overrides — swap ONLY the 7 accent values (all 9 presets incl. Black) */
html[data-theme="blue"]{ --navy:#0b5fd4; --navy-deep:#0842a0; --navy-bg:#e8f1fc; --navy-line:#bcd6f5; --ok:#1a4f9c; --ok-bg:#e9f0fa; --ok-line:#b7cdea; }
html[data-theme="purple"]{ --navy:#a100ff; --navy-deep:#7a00c2; --navy-bg:#f3e8ff; --navy-line:#d9bef5; --ok:#5a2f8a; --ok-bg:#efe8f5; --ok-line:#d0b5e0; }
html[data-theme="indigo"]{ --navy:#4338ca; --navy-deep:#312c92; --navy-bg:#ebebfb; --navy-line:#c7c3f0; --ok:#3730a3; --ok-bg:#ebeaf7; --ok-line:#c5c2ea; }
html[data-theme="teal"]{ --navy:#0e7c86; --navy-deep:#095861; --navy-bg:#e0f3f4; --navy-line:#a9dade; --ok:#0f5d54; --ok-bg:#e3f3ef; --ok-line:#b3ddd4; }
html[data-theme="cyan"]{ --navy:#0891b2; --navy-deep:#0e6f88; --navy-bg:#e2f4f9; --navy-line:#abdde9; --ok:#0e6b7a; --ok-bg:#e4f3f4; --ok-line:#b0dde2; }
html[data-theme="green"]{ --navy:#1f7a44; --navy-deep:#155730; --navy-bg:#e6f4ea; --navy-line:#b3dcc1; --ok:#2f6b3c; --ok-bg:#e9f3ea; --ok-line:#bedcc4; }
html[data-theme="plum"]{ --navy:#a21d6e; --navy-deep:#7c1450; --navy-bg:#fbe8f2; --navy-line:#e8b9d4; --ok:#6d2356; --ok-bg:#f6e8f0; --ok-line:#e3bcd5; }
html[data-theme="slate"]{ --navy:#3f4f63; --navy-deep:#29384b; --navy-bg:#eef1f5; --navy-line:#c2ccd8; --ok:#34495e; --ok-bg:#eef1f5; --ok-line:#c2ccd8; }
html[data-theme="black"]{ --navy:#000000; --navy-deep:#000000; --navy-bg:#f1f1f3; --navy-line:#d6d6db; --ok:#3f3f46; --ok-bg:#f1f1f3; --ok-line:#cfcfd6; }

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
code{font-family:var(--mono);}
a{color:var(--navy-deep);}
.icon{width:1.15em;height:1.15em;display:inline-block;vertical-align:-.18em;color:inherit;}
.icon-lg{width:20px;height:20px;}
.tnum{font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums;}

/* density toggle — compact shaves the base + spacing without inflating */
html[data-density="compact"] body{font-size:12px;}
html[data-density="compact"] .sec{margin-bottom:12px;}
html[data-density="compact"] .sec-head{padding-top:10px;padding-bottom:10px;}
html[data-density="compact"] .find-body,html[data-density="compact"] .fix-card-grid{padding-top:11px;padding-bottom:11px;}
html[data-density="compact"] .hero{padding-top:22px;padding-bottom:16px;}

/* ---------- read-progress bar (top of viewport) ---------- */
.read-prog{position:fixed;top:0;left:0;height:3px;width:0;background:var(--navy);z-index:20;transition:width .08s linear;}
@media print{.read-prog{display:none!important;}}

/* ---------- noscript notice ---------- */
.noscript{margin:20px 40px;padding:14px 18px;background:var(--hold-bg);border:1px solid var(--hold-line);border-radius:10px;color:#6b5500;font-size:12.5px;line-height:1.6;}

/* ---------- topbar ---------- */
.topbar{position:sticky;top:0;z-index:8;background:#fff;border-bottom:1px solid var(--rule);}
.topbar-inner{max-width:1720px;margin:0 auto;padding:10px 40px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px;letter-spacing:-.01em;color:var(--ink);}
.logo .mark{width:18px;height:18px;color:var(--navy);}
.logo small{font-weight:600;font-size:11px;color:var(--ink-faint);margin-left:6px;letter-spacing:0;}
.topbar-right{display:flex;align-items:center;gap:22px;flex-wrap:wrap;justify-content:flex-end;}
.crumb{font-size:11.5px;color:var(--ink-faint);}
.crumb b{color:var(--ink-soft);font-weight:700;}
.topbar-gen{font-size:11px;color:var(--ink-faint);white-space:nowrap;}
.topbar-gen b{color:var(--ink-soft);font-weight:700;margin-right:5px;font-size:10px;letter-spacing:.04em;text-transform:uppercase;}

/* topbar controls: density toggle + theme dots */
.topbar-tools{display:flex;align-items:center;gap:14px;}
.dens-toggle{display:inline-flex;border:1px solid var(--rule);border-radius:7px;overflow:hidden;background:#fff;}
.dens-toggle button{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);background:#fff;border:none;padding:4px 9px;cursor:pointer;}
.dens-toggle button+button{border-left:1px solid var(--rule);}
.dens-toggle button.is-on{background:var(--navy-bg);color:var(--navy-deep);}
.rc-theme{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--rule);border-radius:7px;padding:3px 4px 3px 7px;background:var(--bg);}
.rc-theme-sw{width:12px;height:12px;border-radius:50%;background:var(--navy);box-shadow:0 0 0 1px var(--rule);flex:none;}
.rc-theme-sel{border:0;background:none;font:600 11px/1 var(--mono);color:var(--ink-mid);cursor:pointer;outline:none;padding:2px;}
@media print{.rc-theme{display:none;}}

/* ---------- hero ---------- */
.hero{max-width:1720px;margin:0 auto;padding:30px 40px 22px;border-bottom:1px solid var(--rule);}
.hero-eyebrow{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--navy-deep);}
.hero-title{font-size:25px;line-height:1.28;font-weight:800;letter-spacing:-.01em;margin:8px 0 13px;color:var(--ink);}
.hero-badges{display:flex;flex-wrap:wrap;gap:7px;}
.hero .badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:6px;background:#fff;color:var(--ink-soft);border:1px solid var(--rule);}
.hero .badge-verdict{color:var(--risk);border-color:var(--risk);font-weight:700;}
.hero .badge-cat{color:var(--navy-deep);border-color:var(--navy-line);font-weight:700;}
.hero .badge-sev{color:var(--hold);border-color:var(--hold-line);background:var(--hold-bg);font-weight:700;}
.hero-sum{font-size:14px;line-height:1.8;color:var(--ink-mid);margin:14px 0 0;max-width:none;}
.hero-sum code{font-family:var(--mono);font-size:12.5px;color:var(--navy-deep);background:var(--navy-bg);padding:0 4px;border-radius:3px;}
.hero-sum a.gloss{text-decoration:none;border-bottom:1px dotted var(--navy-line);}
.hero-meta{display:flex;flex-wrap:wrap;gap:7px 24px;margin-top:16px;padding-top:14px;border-top:1px solid var(--rule-soft);font-size:12px;color:var(--ink-soft);align-items:baseline;}
.hero-meta>span>b{color:var(--ink-faint);font-weight:700;margin-right:5px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;}
.hero-meta i{font-style:normal;}

/* ---------- 3-col layout ---------- */
.content{max-width:1720px;margin:0 auto;padding:28px 40px 72px;display:grid;grid-template-columns:208px minmax(0,1fr) 244px;gap:40px;align-items:start;}
@media(max-width:1280px){.content{grid-template-columns:208px minmax(0,1fr);}.rail{display:none;}}
@media(max-width:1000px){.content{grid-template-columns:1fr;gap:20px;padding:22px;}.toc{position:static;}}
main{min-width:0;}

/* left TOC (sticky + scroll-spy) */
.toc{position:sticky;top:64px;align-self:start;min-width:0;}
.toc-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 7px;display:flex;align-items:baseline;justify-content:space-between;gap:8px;}
.toc-allbtn{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);background:none;border:none;padding:0;cursor:pointer;}
.toc-allbtn:hover{color:var(--navy-deep);}
.toc-nav{display:flex;flex-direction:column;overflow-y:auto;max-height:calc(100vh - 130px);scrollbar-width:thin;}
.toc a{display:grid;grid-template-columns:28px 1fr;gap:9px;align-items:baseline;padding:6px 0;color:var(--ink-mid);text-decoration:none;font-size:12.5px;line-height:1.35;border-left:2px solid transparent;padding-left:9px;margin-left:-11px;}
.toc a:hover{color:var(--navy-deep);}
.toc a .n{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--ink-faint);}
.toc a.active{color:var(--navy-deep);font-weight:700;border-left-color:var(--navy);}
.toc a.active .n{color:var(--navy-deep);}

/* right rail (sticky metadata) */
.rail{position:sticky;top:64px;align-self:start;min-width:0;display:flex;flex-direction:column;gap:14px;}
.rail-card{border:1px solid var(--rule);border-radius:14px;background:#fff;box-shadow:0 1px 3px rgba(17,19,26,.05);overflow:hidden;}
.rail-card-hd{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);padding:11px 14px 10px;border-bottom:1px solid var(--rule-soft);background:var(--bg-subtle);}
.rail-facts{margin:0;padding:3px 14px 9px;}
.rail-facts>div{display:grid;grid-template-columns:74px minmax(0,1fr);gap:10px;padding:8px 0;border-bottom:1px solid var(--rule-soft);align-items:baseline;}
.rail-facts>div:last-child{border-bottom:none;}
.rail-facts dt{margin:0;font-size:10px;font-weight:700;letter-spacing:.02em;color:var(--ink-faint);text-transform:uppercase;}
.rail-facts dd{margin:0;font-size:12px;line-height:1.45;color:var(--ink-mid);min-width:0;word-break:break-word;overflow-wrap:anywhere;}
.rail-facts dd.mono{font-family:var(--mono);font-size:11px;color:var(--ink);}
.rail-screen{display:inline-block;font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--navy-deep);background:var(--navy-bg);border:1px solid var(--navy-line);border-radius:5px;padding:1px 7px;margin:0 4px 4px 0;}
.rail-prog{padding:11px 14px 13px;}
.rail-prog-row{display:flex;justify-content:space-between;align-items:baseline;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 6px;}
.rail-prog-row b{font-family:var(--mono);font-size:15px;font-weight:800;color:var(--ink);letter-spacing:0;}
.rail-bar{height:7px;border-radius:5px;background:var(--bg-band);overflow:hidden;}
.rail-bar i{display:block;height:100%;border-radius:5px;background:var(--navy);}

/* ---------- section panels ---------- */
.sec{margin:0 0 18px;border:1px solid var(--rule);border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 1px 2px rgba(17,19,26,.045);scroll-margin-top:84px;}
.sec-head{display:flex;align-items:center;gap:11px;padding:13px 24px;background:var(--bg-band);border-bottom:1px solid var(--rule);}
.sec-num{border:1px solid var(--navy-line);color:var(--navy-deep);background:#fff;padding:2px 9px;border-radius:6px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;white-space:nowrap;}
.sec-ico{width:17px;height:17px;color:var(--navy-deep);flex:none;}
.sec-head h2{font-size:16px;font-weight:800;margin:0;letter-spacing:-.01em;}
.sec-head-links{margin-left:auto;display:flex;gap:6px;align-items:center;flex:0 0 auto;}
.sec>*:not(.sec-head){margin-left:24px;margin-right:24px;}
.sec>.sec-head + *,details.sec>summary.sec-head + *{margin-top:20px;}
.sec>*:not(.sec-head):last-child{margin-bottom:22px;}
.sec p{font-size:13px;line-height:1.8;color:var(--ink-mid);}
.sec p strong{color:var(--ink);}
.lead{font-size:13.5px;color:var(--ink-mid);}

/* collapsible section caret (every .sec head is now a toggle) */
.sec-collapse{margin-left:6px;color:var(--ink-faint);font-size:15px;line-height:1;background:none;border:none;cursor:pointer;padding:0 2px;transition:transform .15s ease;flex:none;}
.sec.is-collapsed .sec-collapse{transform:rotate(-90deg);}
.sec.is-collapsed>*:not(.sec-head){display:none;}
.sec.is-collapsed .sec-head{border-bottom:none;}

/* folded supplement / appendix */
details.sec-fold>summary.sec-head{cursor:pointer;list-style:none;}
details.sec-fold>summary.sec-head::-webkit-details-marker{display:none;}
details.sec-fold:not([open])>summary.sec-head{border-bottom:none;}
.sec-fold-hint{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);}
details.sec-fold[open] .sec-fold-hint{display:none;}
.sec-fold-caret{margin-left:8px;color:var(--ink-faint);font-size:15px;line-height:1;transition:transform .15s ease;}
details.sec-fold[open] .sec-fold-caret{transform:rotate(90deg);}

/* labels */
.bugsum-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 7px;}
.bugsum{font-size:15px;font-weight:700;color:var(--ink);line-height:1.6;margin:0 0 6px;}
.exhibit-src{font-size:11.5px;color:var(--ink-faint);font-style:italic;margin:10px 0 0;}

/* §00 key/value grid */
table.kv-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));border:1px solid var(--rule-soft);border-radius:10px;overflow:hidden;background:#fff;width:auto;}
table.kv-grid tbody{display:contents;}
table.kv-grid tr{display:flex;flex-direction:column;gap:3px;padding:11px 16px;border-right:1px solid var(--rule-soft);border-bottom:1px solid var(--rule-soft);}
table.kv-grid th{width:auto;background:transparent;border:none;padding:0;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);white-space:nowrap;text-align:left;}
table.kv-grid td{border:none;padding:0;font-family:var(--mono);font-size:12.5px;color:var(--ink);word-break:break-word;}
@media(max-width:1000px){table.kv-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}

/* §01 phenomenon rows */
.phenomenon{border:1px solid var(--rule-soft);border-radius:10px;overflow:hidden;margin:0 0 16px;}
.phen-row{display:grid;grid-template-columns:128px 1fr;gap:14px;padding:11px 16px;border-bottom:1px solid var(--rule-soft);}
.phen-row:last-child{border-bottom:none;}
.phen-k{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);}
.phenomenon>.phen-row:not(.expect) .phen-k{color:var(--risk);}
.phen-v{font-size:13.5px;line-height:1.7;color:var(--ink-mid);overflow-wrap:anywhere;}
.nb{white-space:nowrap;}

/* cause chain */
ol.cause-chain{list-style:none;margin:0;padding:0;}
ol.cause-chain>li{display:grid;grid-template-columns:24px 1fr;gap:12px;padding:0 0 12px;}
.chain-step{display:flex;flex-direction:column;align-items:center;}
.chain-num{width:20px;height:20px;border-radius:5px;background:var(--navy);color:#fff;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;flex:none;}
.chain-line{flex:1;width:2px;background:var(--rule-soft);margin-top:4px;}
ol.cause-chain>li:last-child .chain-line{display:none;}
.chain-headline{font-size:13.5px;font-weight:700;margin:0 0 3px;color:var(--ink);}
.chain-detail{font-size:12.5px;line-height:1.65;color:var(--ink-mid);margin:0;overflow-wrap:anywhere;}
.chain-evref{font-family:var(--mono);font-size:10px;color:var(--navy-deep);background:var(--navy-bg);padding:0 5px;border-radius:5px;text-decoration:none;margin-right:5px;white-space:nowrap;display:inline-block;margin-top:6px;}
.chain-evref:hover{background:var(--navy);color:#fff;}

/* §02 fix/finding cards + dark diff */
.fix-card-grid{border:1px solid var(--rule);border-radius:11px;padding:18px 20px;display:grid;gap:14px;background:#fff;margin:0 0 16px;}
.fc-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.fc-priority{font-family:var(--mono);font-size:10px;font-weight:700;color:#fff;background:var(--risk);padding:3px 10px;border-radius:6px;}
.fc-priority.fc-priority--rec{background:var(--navy);}
.fc-where{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);overflow-wrap:anywhere;}
.fc-label{font-size:11px;font-weight:700;letter-spacing:.03em;color:var(--navy-deep);margin:0 0 5px;}
.fc-text{font-size:13px;line-height:1.85;color:var(--ink-mid);margin:0;}
.fc-tldr-list{margin:0;padding:11px 16px 11px 30px;background:var(--bg-band);border:1px solid var(--rule-soft);border-radius:9px;font-size:12.5px;line-height:1.75;color:var(--ink-mid);}
.fc-tldr-list li{margin:0 0 2px;}
.fc-tldr-list code{font-family:var(--mono);font-size:11.5px;color:var(--navy-deep);}
.diff-split{border:1px solid var(--rule);background:#0b0b0d;color:#e5e7eb;margin:4px 0 0;overflow:hidden;border-radius:10px;}
.diff-split .diff-header{display:grid;grid-template-columns:1fr 1fr auto;align-items:center;padding:8px 16px;background:#000;border-bottom:1px solid #2a2a2a;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
.diff-split .diff-h-left{color:#f0a0a0;}.diff-split .diff-h-right{color:#a0d8a8;}
.diff-split .diff-tools{justify-self:end;display:flex;align-items:center;gap:10px;}
.diff-split .ev-id{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:#8a8a8a;}
.copy-btn{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#cfcfd6;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:5px;padding:3px 8px;cursor:pointer;}
.copy-btn:hover{background:rgba(255,255,255,.16);color:#fff;}
.copy-btn.copied{color:#9be29b;border-color:rgba(155,226,155,.5);}
.copy-btn .icon{width:12px;height:12px;}
.diff-split .diff-grid{display:grid;grid-template-columns:1fr 1fr;column-gap:0;}
.diff-split .diff-cell{display:grid;grid-template-columns:44px 18px minmax(0,1fr);align-items:start;font-family:var(--mono);font-size:12px;line-height:1.7;min-height:1.7em;border-bottom:1px solid #1a1a1a;}
.diff-split .diff-cell:nth-child(odd){border-right:1px solid #1a1a1a;}
.diff-split .diff-gutter{padding:1px 8px 1px 14px;text-align:right;color:#6a6a6a;user-select:none;background:rgba(255,255,255,.02);}
.diff-split .diff-marker{padding:1px 0;text-align:center;color:#6a6a6a;user-select:none;font-weight:700;}
.diff-split .diff-code{padding:1px 14px 1px 6px;color:#e5e7eb;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;min-width:0;}
.diff-split .diff-ctx .diff-code{color:#d1d5db;}
.diff-split .diff-add{background:rgba(46,160,67,.28);}.diff-split .diff-add .diff-marker{color:#9be29b;}.diff-split .diff-add .diff-code{color:#d5f5d5;}
.diff-split .diff-del{background:rgba(160,39,41,.28);}.diff-split .diff-del .diff-code{color:#ffd0d0;}
.diff-split .diff-empty{background:repeating-linear-gradient(135deg,#131316 0 6px,#0b0b0d 6px 12px);}.diff-split .diff-empty .diff-code{color:transparent;}

/* §03 findings accordion */
.find-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 12px;}
.find-tools .fil-label{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-right:2px;}
.fil-chip{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--ink-soft);background:#fff;border:1px solid var(--rule);border-radius:6px;padding:3px 10px;cursor:pointer;}
.fil-chip:hover{border-color:var(--navy-line);color:var(--navy-deep);}
.fil-chip.is-on{background:var(--navy-bg);border-color:var(--navy-line);color:var(--navy-deep);}
.find-bulk{margin-left:auto;display:flex;gap:8px;}
.find-bulk button{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);background:none;border:none;cursor:pointer;}
.find-bulk button:hover{color:var(--navy-deep);}
.finding-row{border:1px solid var(--rule-soft);border-radius:10px;margin:0 0 10px;overflow:hidden;}
.finding-row[hidden]{display:none;}
.finding-row>summary{list-style:none;cursor:pointer;padding:12px 16px;background:var(--bg-band);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.finding-row>summary::-webkit-details-marker{display:none;}
.finding-row[open]>summary{border-bottom:1px solid var(--rule-soft);}
.find-id{display:inline-flex;align-items:center;gap:7px;}
.fi-type{font-size:9.5px;font-weight:700;letter-spacing:.04em;color:#fff;background:var(--navy);padding:2px 8px;border-radius:5px;white-space:nowrap;}
.fi-code{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--navy-deep);}
.find-title{font-size:13px;font-weight:600;color:var(--ink);flex:1;min-width:200px;}
.find-meta{display:flex;align-items:center;gap:8px;margin-left:auto;}
.find-caret{color:var(--ink-faint);font-size:11px;transition:transform .15s ease;}
.finding-row[open] .find-caret{transform:rotate(90deg);}
.find-body{padding:14px 16px;}
.find-body p{font-size:13px;line-height:1.75;color:var(--ink-mid);margin:0 0 10px;}
.find-body p:last-child{margin-bottom:0;}
.evi-body-card{border:1px solid var(--rule-soft);border-radius:10px;overflow:hidden;margin:0 0 4px;}
.evi-body-card>h5{margin:0;padding:8px 14px;background:var(--bg-band);border-bottom:1px solid var(--rule-soft);font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--ink-mid);line-height:1.5;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.evi-body-card>h5 .copy-btn{color:var(--ink-faint);background:var(--bg-subtle);border-color:var(--rule);}
.evi-body-card>h5 .copy-btn:hover{color:var(--navy-deep);background:#fff;}
.evi-body-card>h5 .copy-btn.copied{color:var(--ok);border-color:var(--ok-line);}
.evi-body-card pre{margin:0;padding:12px 14px;font-family:var(--mono);font-size:11.5px;line-height:1.65;color:var(--ink-mid);background:var(--bg-subtle);white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;}

/* §04 metrics */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:0 0 16px;}
@media(max-width:1000px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.stat-box{border:1px solid var(--rule-soft);border-radius:10px;padding:13px 15px;background:#fff;}
.stat-k{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 6px;}
.stat-v{font-size:30px;font-weight:800;line-height:1;color:var(--ink);font-feature-settings:"tnum" 1;}
.stat-v small{font-size:14px;font-weight:700;color:var(--ink-soft);margin-left:2px;}
.stat-d{font-size:11px;margin-top:6px;font-weight:700;}
.stat-d.up{color:var(--ok);}.stat-d.down{color:var(--risk);}

/* data table (shared primitive) */
table.dt{width:calc(100% - 48px);border-collapse:collapse;table-layout:fixed;font-size:12.5px;margin:0 0 4px;}
.sec table.dt{margin-left:24px;margin-right:24px;}
table.dt th{text-align:left;border-bottom:2px solid var(--ink);padding:6px 12px 6px 0;font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);}
table.dt th.sortable{cursor:pointer;user-select:none;}
table.dt th.sortable:hover{color:var(--navy-deep);}
table.dt th .sort-ind{opacity:.4;margin-left:4px;font-size:9px;}
table.dt th.sort-asc .sort-ind,table.dt th.sort-desc .sort-ind{opacity:1;color:var(--navy-deep);}
table.dt td{border-bottom:1px solid var(--rule-soft);padding:8px 12px 8px 0;vertical-align:top;line-height:1.55;color:var(--ink-mid);word-break:break-word;overflow-wrap:anywhere;}
table.dt tr:hover td{background:var(--bg-subtle);}
table.dt td code{font-family:var(--mono);font-size:11px;color:var(--navy-deep);font-weight:700;}
.dt-num{text-align:right;font-family:var(--mono);font-feature-settings:"tnum" 1;}
td.dt-num[data-exact]{cursor:help;}

/* §05 residual risk */
.risk-list{list-style:none;margin:0;padding:0;}
.risk-list li{display:grid;grid-template-columns:auto minmax(0,1fr);gap:12px;align-items:start;font-size:13px;line-height:1.7;color:var(--ink-mid);margin:0 0 9px;overflow-wrap:anywhere;}
.risk-id{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--navy-deep);background:var(--navy-bg);border:1px solid var(--navy-line);border-radius:5px;padding:1px 7px;white-space:nowrap;margin-top:1px;}

/* supplement table column hints */
.lat-c-id{width:64px;}.lat-c-where{width:24%;}.lat-c-judgement{width:104px;}

/* status badges (shared) */
.st-badge{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;white-space:nowrap;padding:2px 9px;border:1px solid var(--rule);border-radius:6px;background:#fff;color:var(--ink-mid);}
.st-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ink-faint);}
.st-risk{color:var(--risk);}.st-risk::before{background:var(--risk);}
.st-hold{color:var(--hold);}.st-hold::before{background:var(--hold);}
.st-ok{color:var(--ok);}.st-ok::before{background:var(--ok);}

/* appendix reference index */
.ref-c-id{width:108px;}.ref-c-type{width:96px;}.ref-c-where{width:34%;}
.evi-link-icon{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;background:var(--navy);color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;text-decoration:none;flex:none;}
.evi-link-icon--repo{background:var(--navy-deep);}
.evi-link-icon--monitor{background:#00ac69;}
.evi-link-icon--log{background:#d93025;}
.evi-link-icon--doc{background:#0b6b66;}
.evi-link-icon--data{background:var(--navy);}
.ev-usedin{display:block;margin-top:5px;font-size:11px;color:var(--ink-soft);}
.ev-usedin a{font-family:var(--mono);font-size:10px;color:var(--navy-deep);background:var(--navy-bg);border-radius:5px;padding:0 5px;text-decoration:none;margin-right:4px;white-space:nowrap;display:inline-block;}
.ev-usedin a:hover{background:var(--navy);color:#fff;}
tr.ev-flash td{animation:evflash 1.4s ease;}
@keyframes evflash{0%,30%{background:var(--navy-bg);}100%{background:transparent;}}

/* footnote / definition popover */
.gloss{cursor:help;text-decoration:none;border-bottom:1px dotted var(--navy-line);color:inherit;}
.gloss:hover{color:var(--navy-deep);}
.glosspop{position:fixed;z-index:30;max-width:300px;background:#fff;border:1px solid var(--rule);border-radius:10px;box-shadow:0 6px 24px rgba(17,19,26,.16);padding:11px 13px;font-size:12px;line-height:1.55;color:var(--ink-mid);display:none;}
.glosspop.is-on{display:block;}
.glosspop b{display:block;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--navy-deep);margin:0 0 4px;}

/* footer */
.footer{background:var(--bg-deep);color:#c9c4d0;padding:36px 40px;margin-top:0;}
.foot-inner{max-width:1720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.brand-dk{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;color:#fff;letter-spacing:-.01em;}
.brand-dk .sq{width:14px;height:14px;border-radius:4px;background:var(--navy);}
.foot-meta{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8f8898;text-align:right;line-height:1.7;}

/* print — expanded static snapshot, controls hidden */
@media print{
 .topbar,.toc,.rail,.topbar-tools,.dens-toggle,.read-prog,.find-tools,.sec-collapse,.copy-btn,.toc-allbtn,.glosspop{display:none !important;}
 .content{grid-template-columns:1fr;padding:0;}
 .sec{break-inside:avoid;box-shadow:none;}
 .sec.is-collapsed>*:not(.sec-head){display:revert !important;}
 .sec.is-collapsed .sec-head{border-bottom:1px solid var(--rule) !important;}
 .finding-row[hidden]{display:block !important;}
 .footer{background:#fff;color:#333;border-top:1px solid var(--rule);}
 .brand-dk{color:#111;}.foot-meta{color:#666;}
 details.sec-fold{display:block;}details.sec-fold[open]{}
 body{font-size:11px;}
}

  var FRAC=/^\s*(\d+)\s*\/\s*(\d+)\s*$/;  // "2 / 4" → progress widget

  /* scroll-spy: activate the TOPMOST visible section (correct on scroll-up) */
  function wireScrollSpy(){
    var links={}, tocNav=document.querySelector('.toc-nav');
    document.querySelectorAll('.toc a').forEach(function(a){ links[a.getAttribute('href').slice(1)]=a; });
    var secs=Array.prototype.slice.call(document.querySelectorAll('.sec'));
    if(!secs.length) return;
    function update(){
      // Activation line sits just below the sticky chrome.
      var line=96;
      // The active section is the TOPMOST whose top edge has passed the line:
      // i.e. the section with the greatest top that is still <= line. This is
      // correct on scroll-up too (it re-evaluates every frame, not just on enter).
      var pick=null, pickTop=-Infinity, firstBelow=null, firstBelowTop=Infinity;
      secs.forEach(function(s){
        var t=s.getBoundingClientRect().top;
        if(t<=line+4){ if(t>pickTop){ pick=s; pickTop=t; } }
        else if(t<firstBelowTop){ firstBelow=s; firstBelowTop=t; }
      });
      // Near the very top, nothing has crossed yet → use the first section below.
      if(!pick) pick=firstBelow||secs[0];
      var id=pick.id;
      Object.keys(links).forEach(function(k){ links[k].classList.toggle('active', k===id); });
      // keep active link in view within a long TOC
      var act=links[id];
      if(act && tocNav){
        var ar=act.getBoundingClientRect(), nr=tocNav.getBoundingClientRect();
        if(ar.top<nr.top) tocNav.scrollTop -= (nr.top-ar.top)+8;
        else if(ar.bottom>nr.bottom) tocNav.scrollTop += (ar.bottom-nr.bottom)+8;
      }
    }
    var ticking=false;
    function onScroll(){ if(!ticking){ ticking=true; requestAnimationFrame(function(){ update(); ticking=false; }); } }
    window.addEventListener('scroll', onScroll, {passive:true});
    window.addEventListener('resize', onScroll, {passive:true});
    update();
  }

  /* sortable data tables (the metrics + supplement tables) */
  function wireSort(){
    document.addEventListener('click', function(e){
      var th=e.target.closest && e.target.closest('table.dt th.sortable');
      if(!th) return;
      var table=th.closest('table'), tbody=table.querySelector('tbody');
      var idx=+th.dataset.col, type=th.dataset.type;
      var asc = !th.classList.contains('sort-asc');
      table.querySelectorAll('th').forEach(function(h){ h.classList.remove('sort-asc','sort-desc'); });
      th.classList.add(asc?'sort-asc':'sort-desc');
      var rows=Array.prototype.slice.call(tbody.querySelectorAll('tr'));
      rows.sort(function(a,b){
        var ca=a.children[idx], cb=b.children[idx];
        var va,vb;
        if(type==='num'){ va=parseFloat((ca.dataset.exact||ca.textContent).replace(/[^0-9.\-]/g,''))||0; vb=parseFloat((cb.dataset.exact||cb.textContent).replace(/[^0-9.\-]/g,''))||0; return asc?va-vb:vb-va; }
        va=ca.textContent.trim().toLowerCase(); vb=cb.textContent.trim().toLowerCase();
        return asc? (va<vb?-1:va>vb?1:0) : (va>vb?-1:va<vb?1:0);
      });
      rows.forEach(function(r){ tbody.appendChild(r); });
    });
  }

  /* code/diff copy buttons */
  function wireCopy(){
    document.addEventListener('click', function(e){
      var b=e.target.closest && e.target.closest('.copy-btn');

      var txt=b.getAttribute('data-copy')||'';
      var done=function(){ var o=b.innerHTML; b.classList.add('copied'); b.textContent='Copied'; setTimeout(function(){ b.classList.remove('copied'); b.innerHTML=o; },1400); };
      if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done,fallback); }
      else fallback();
      function fallback(){ var ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(_){} document.body.removeChild(ta); done(); }
    });
  }

  /* evidence cross-links: auto-open folded sections on anchor jump + flash target row */
  function wireAnchors(){
    function openTo(hash){
      if(!hash || hash.length<2) return;
      var el=document.getElementById(decodeURIComponent(hash.slice(1)));
      if(!el) return;
      var n=el;
      while(n){ if(n.tagName==='DETAILS') n.open=true;
        if(n.classList && n.classList.contains('sec') && n.classList.contains('is-collapsed')) n.classList.remove('is-collapsed');
        n=n.parentElement; }
      el.scrollIntoView({block:'start'});
      if(el.tagName==='TR'){ el.classList.remove('ev-flash'); void el.offsetWidth; el.classList.add('ev-flash'); }
    }
    document.addEventListener('click', function(e){
      var a=e.target.closest && e.target.closest('a[href^="#"]');
      if(a){ var h=a.getAttribute('href'); if(h.length>1){ setTimeout(function(){ openTo(h); },0); } }
    });
    window.addEventListener('hashchange', function(){ openTo(location.hash); });
    if(location.hash) setTimeout(function(){ openTo(location.hash); }, 0);
  }

  /* glossary / definition popovers on control IDs + jargon ([data-term]) */
  function wireGlossary(){
    var gl=GLOSSARY;
    var pop=document.getElementById('glosspop');
    // auto-tag <code> tokens whose exact text is a known term (plus any pre-tagged [data-term])
    document.querySelectorAll('.sec code, .hero-sum code').forEach(function(el){
      if(el.getAttribute('data-term')) return;
      var t=(el.textContent||'').trim();
      if(gl[t]){ el.setAttribute('data-term', t); }
    });
    document.querySelectorAll('[data-term]').forEach(function(el){
      if(gl[el.getAttribute('data-term')]) el.classList.add('gloss');
    });
    function show(el){
      var g=gl[el.getAttribute('data-term')]; if(!g) return;
      pop.innerHTML='<b>'+esc(g.title||g.term)+'</b>'+esc(g.def);
      pop.classList.add('is-on');
      var r=el.getBoundingClientRect();
      var pw=Math.min(300, pop.offsetWidth||300);
      var left=Math.min(r.left, window.innerWidth-pw-12);
      var top=r.bottom+6;
      if(top+pop.offsetHeight+12>window.innerHeight && r.top-pop.offsetHeight-6>0) top=r.top-pop.offsetHeight-6;
      pop.style.left=Math.max(8,left)+'px'; pop.style.top=top+'px';
    }
    function hide(){ pop.classList.remove('is-on'); }
    document.addEventListener('mouseover', function(e){ var el=e.target.closest && e.target.closest('[data-term]'); if(el) show(el); });
    document.addEventListener('mouseout', function(e){ var el=e.target.closest && e.target.closest('[data-term]'); if(el && !(e.relatedTarget && e.relatedTarget.closest && e.relatedTarget.closest('#glosspop'))) hide(); });
    document.addEventListener('click', function(e){ var el=e.target.closest && e.target.closest('[data-term]'); if(el){ e.preventDefault(); pop.classList.contains('is-on')?hide():show(el); } else if(!(e.target.closest&&e.target.closest('#glosspop'))) hide(); });
    window.addEventListener('scroll', hide, {passive:true});
  }

  function boot(){ render(); wireInteractions(); wireThemeSwitch(); }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
