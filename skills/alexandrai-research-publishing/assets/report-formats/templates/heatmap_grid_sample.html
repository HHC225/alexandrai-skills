<!doctype html>
<html lang="en" data-theme="teal">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>{{PROJECT}} — Heatmap Grid</title>
<style>
/* ============================================================
   SHARED FOUNDATION TOKENS  (per _FOUNDATION.md §1)
   :root = Purple default; data-theme overrides swap 7 values.
   This document ships data-theme="teal".
   ============================================================ */
:root{
  /* surfaces */
  --bg:#fff; --bg-band:#f6f6f8; --bg-subtle:#fafafb; --bg-deep:#15131a;
  --rule:#dcdce2; --rule-soft:#ebebef;
  /* ink */
  --ink:#11131a; --ink-mid:#33363f; --ink-soft:#5a5e68; --ink-faint:#868b95;
  /* brand accent (Purple default) */
  --navy:#a100ff; --navy-deep:#7a00c2; --navy-bg:#f3e8ff; --navy-line:#d9bef5;
  /* cleared / approved */
  --ok:#5a2f8a; --ok-bg:#efe8f5; --ok-line:#d0b5e0;
  /* semantic states — CONSTANT across all themes */
  --risk:#b3261e; --risk-bg:#fbeceb; --risk-line:#edc7c4;
  --hold:#8a6d00; --hold-bg:#fbf3da; --hold-line:#e7d8a4;
  /* type stacks */
  --mono:ui-monospace,"JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;
  --sans:-apple-system,"Segoe UI",system-ui,Roboto,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Apple SD Gothic Neo","Malgun Gothic","PingFang SC","Microsoft YaHei","Noto Sans CJK JP","Noto Sans CJK KR","Noto Sans CJK SC","Noto Sans JP","Noto Sans KR","Noto Sans SC","Noto Sans",sans-serif;
}
html[data-theme="blue"]{ --navy:#0b5fd4; --navy-deep:#0842a0; --navy-bg:#e8f1fc; --navy-line:#bcd6f5; --ok:#1a4f9c; --ok-bg:#e9f0fa; --ok-line:#b7cdea; }
html[data-theme="purple"]{ --navy:#a100ff; --navy-deep:#7a00c2; --navy-bg:#f3e8ff; --navy-line:#d9bef5; --ok:#5a2f8a; --ok-bg:#efe8f5; --ok-line:#d0b5e0; }
html[data-theme="indigo"]{ --navy:#4338ca; --navy-deep:#312c92; --navy-bg:#ebebfb; --navy-line:#c7c3f0; --ok:#3730a3; --ok-bg:#ebeaf7; --ok-line:#c5c2ea; }
html[data-theme="teal"]{ --navy:#0e7c86; --navy-deep:#095861; --navy-bg:#e0f3f4; --navy-line:#a9dade; --ok:#0f5d54; --ok-bg:#e3f3ef; --ok-line:#b3ddd4; }
html[data-theme="cyan"]{ --navy:#0891b2; --navy-deep:#0e6f88; --navy-bg:#e2f4f9; --navy-line:#abdde9; --ok:#0e6b7a; --ok-bg:#e4f3f4; --ok-line:#b0dde2; }
html[data-theme="green"]{ --navy:#1f7a44; --navy-deep:#155730; --navy-bg:#e6f4ea; --navy-line:#b3dcc1; --ok:#2f6b3c; --ok-bg:#e9f3ea; --ok-line:#bedcc4; }
html[data-theme="plum"]{ --navy:#a21d6e; --navy-deep:#7c1450; --navy-bg:#fbe8f2; --navy-line:#e8b9d4; --ok:#6d2356; --ok-bg:#f6e8f0; --ok-line:#e3bcd5; }
html[data-theme="slate"]{ --navy:#3f4f63; --navy-deep:#29384b; --navy-bg:#eef1f5; --navy-line:#c2ccd8; --ok:#34495e; --ok-bg:#eef1f5; --ok-line:#c2ccd8; }
html[data-theme="black"]{ --navy:#000000; --navy-deep:#000; --navy-bg:#f1f1f3; --navy-line:#d6d6db; --ok:#3f3f46; --ok-bg:#f1f1f3; --ok-line:#cfcfd6; }

*{ box-sizing:border-box; }
html,body{ margin:0; }
body{
  font:13px/1.6 var(--sans); color:var(--ink); background:var(--bg-band);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
h1,h2,h3,h4,p{ margin:0; }
.tnum{ font-feature-settings:"tnum" 1; }
.mono{ font-family:var(--mono); }

/* icon sizing (house SVGs, currentColor) */
.icon{ width:1.15em; height:1.15em; display:inline-block; vertical-align:-.18em; color:inherit; }
.icon-lg{ width:18px; height:18px; }

/* ---- shared primitives ---- */
.st-badge{
  display:inline-flex; align-items:center; gap:6px; font:600 10.5px/1 var(--mono);
  letter-spacing:.04em; text-transform:uppercase; padding:4px 8px 4px 7px;
  border:1px solid var(--rule); border-radius:6px; background:var(--bg); white-space:nowrap;
}
.st-badge::before{ content:""; width:7px; height:7px; border-radius:50%; background:var(--ink-faint); }
.st-ok{ color:var(--ok); border-color:var(--ok-line); background:var(--ok-bg); }
.st-ok::before{ background:var(--ok); }
.st-risk{ color:var(--risk); border-color:var(--risk-line); background:var(--risk-bg); }
.st-risk::before{ background:var(--risk); }
.st-hold{ color:var(--hold); border-color:var(--hold-line); background:var(--hold-bg); }
.st-hold::before{ background:var(--hold); }
.mini-dot{ display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--ink-faint); flex:none; }
.mini-dot.is-ok{ background:var(--ok); } .mini-dot.is-risk{ background:var(--risk); } .mini-dot.is-hold{ background:var(--hold); }
.chip{
  display:inline-flex; align-items:center; gap:5px; font:500 11px/1 var(--mono); letter-spacing:.02em;
  color:var(--navy-deep); background:var(--navy-bg); border:1px solid var(--navy-line);
  border-radius:6px; padding:5px 8px; white-space:nowrap;
}

/* canonical theme switcher (.rc-theme) */
.rc-theme{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--rule);border-radius:7px;
          padding:3px 4px 3px 7px;background:var(--bg);}
.rc-theme-sw{width:12px;height:12px;border-radius:50%;background:var(--navy);box-shadow:0 0 0 1px var(--rule);flex:none;}
.rc-theme-sel{border:0;background:none;font:600 11px/1 var(--mono);color:var(--ink-mid);cursor:pointer;outline:none;padding:2px;}
@media print{.rc-theme{display:none;}}

/* JS-off notice */
.noscript{ max-width:1180px; margin:18px auto 0; padding:13px 18px; background:var(--hold-bg);
  border:1px solid var(--hold-line); border-radius:10px; color:var(--hold); font-weight:600; }

/* ============================================================
   HEATMAP BOARD CHROME  (the distinct format silhouette)
   A dense N×M graded colour grid — NOT a 2×2 plotting plane.
   ============================================================ */
.heatmap{ max-width:1500px; margin:0 auto; padding:22px 40px 0; }

.hm-head{
  background:var(--bg); border:1px solid var(--rule); border-radius:12px;
  box-shadow:0 1px 2px rgba(17,19,26,.045);
  padding:16px 20px; display:grid; grid-template-columns:1fr auto; gap:14px 22px; align-items:start;
}
.hh-left{ min-width:0; }
.eyebrow{ font:600 10px/1 var(--mono); letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:8px; }
.hm-title{ font:800 23px/1.12 var(--sans); letter-spacing:-.01em; color:var(--ink); display:flex; align-items:center; gap:10px; }
.hm-title .markmini{ color:var(--navy); display:inline-flex; }
.hm-title .markmini svg{ width:22px; height:22px; }
.hm-standfirst{ font:500 12.5px/1.45 var(--sans); color:var(--ink-soft); margin-top:8px; max-width:760px; }
.mode-chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:11px; }
.mode-chip{
  display:inline-flex; align-items:center; gap:6px; font:600 10.5px/1 var(--mono); letter-spacing:.05em;
  text-transform:uppercase; color:var(--ink-soft); background:var(--bg);
  border:1px solid var(--rule); border-radius:6px; padding:5px 9px;
}
.mode-chip.is-active{ color:var(--navy-deep); background:var(--navy-bg); border-color:var(--navy-line); }
.mode-chip .mc-ico{ display:inline-flex; }
.hh-right{ display:flex; flex-direction:column; align-items:flex-end; gap:11px; }
.asof{ font:600 10.5px/1 var(--mono); letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft); display:flex; align-items:center; gap:12px; }

/* colour-scale legend — a continuous ramp OR semantic bands */
.scale-legend{ display:flex; flex-direction:column; gap:6px; align-items:flex-end;
  padding:9px 12px; border:1px solid var(--rule); border-radius:9px; background:var(--bg-subtle); }
.scale-legend .sl-cap{ font:700 9.5px/1 var(--mono); letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); }
.scale-ramp{ display:flex; align-items:center; gap:9px; }
.scale-ramp .sr-bar{ width:188px; height:11px; border-radius:5px; border:1px solid var(--rule);
  background:linear-gradient(90deg, var(--hm-c0), var(--hm-c100)); }
.scale-ramp .sr-end{ font:600 10px/1 var(--mono); color:var(--ink-soft); }
/* banded legend (semantic) */
.scale-bands{ display:flex; gap:14px; }
.scale-bands[hidden]{ display:none; }
.band-item{ display:inline-flex; align-items:center; gap:6px; font:600 10px/1 var(--mono); letter-spacing:.04em; text-transform:uppercase; color:var(--ink-mid); }
.band-sw{ width:11px; height:11px; border-radius:3px; flex:none; background:var(--ink-faint); }
.band-sw.is-ok{ background:var(--ok); } .band-sw.is-hold{ background:var(--hold); } .band-sw.is-risk{ background:var(--risk); }

/* ---- the toolbar : data-driven controls (threshold / sort / units) ---- */
.hm-toolbar{
  margin-top:18px; background:var(--bg); border:1px solid var(--rule); border-radius:11px;
  box-shadow:0 1px 2px rgba(17,19,26,.045); padding:11px 16px;
  display:flex; align-items:center; gap:18px 22px; flex-wrap:wrap;
}
.tool{ display:flex; align-items:center; gap:9px; }
.tool-label{ font:700 9.5px/1 var(--mono); letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); display:inline-flex; align-items:center; gap:6px; }
.tool-label .tl-ico{ color:var(--navy); display:inline-flex; }
.thresh-wrap{ display:flex; align-items:center; gap:10px; }
input[type=range].thresh{ -webkit-appearance:none; appearance:none; width:190px; height:4px; border-radius:3px;
  background:linear-gradient(90deg, var(--navy) var(--fill,0%), var(--rule) var(--fill,0%)); cursor:pointer; }
input[type=range].thresh::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:15px; height:15px;
  border-radius:50%; background:var(--bg); border:2px solid var(--navy); box-shadow:0 1px 2px rgba(17,19,26,.2); cursor:pointer; }
input[type=range].thresh::-moz-range-thumb{ width:15px; height:15px; border-radius:50%; background:var(--bg);
  border:2px solid var(--navy); box-shadow:0 1px 2px rgba(17,19,26,.2); cursor:pointer; }
.thresh-val{ font:700 12px/1 var(--mono); color:var(--navy-deep); min-width:46px; text-align:right; }
/* segmented toggles + sort select reuse the ghost-button language */
.seg{ display:inline-flex; border:1px solid var(--rule); border-radius:7px; overflow:hidden; }
.seg button{ font:600 10px/1 var(--mono); letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft);
  background:var(--bg); border:0; padding:6px 11px; cursor:pointer; border-right:1px solid var(--rule); }
.seg button:last-child{ border-right:0; }
.seg button.is-on{ color:#fff; background:var(--navy); }
select.tool-sel{ font:600 10.5px/1 var(--mono); letter-spacing:.03em; color:var(--ink-mid);
  border:1px solid var(--rule); border-radius:7px; background:var(--bg); padding:6px 9px; cursor:pointer; }
.ghost-btn{
  font:600 10px/1 var(--mono); letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft);
  border:1px solid var(--rule); border-radius:7px; background:var(--bg); padding:6px 10px; cursor:pointer; }
.ghost-btn:hover{ color:var(--navy-deep); border-color:var(--navy-line); background:var(--navy-bg); }
.tool.push{ margin-left:auto; }

/* ============================================================
   THE GRID FRAME  (the hero — an N×M graded colour matrix)
   ============================================================ */
.hm-frame{
  background:var(--bg); border:1px solid var(--rule); border-radius:12px;
  box-shadow:0 1px 2px rgba(17,19,26,.045); margin-top:18px; overflow:hidden;
}
.hm-frame-head{
  display:flex; align-items:center; gap:10px; padding:13px 18px; border-bottom:1px solid var(--rule-soft);
  background:var(--bg-subtle);
}
.hm-frame-head .fh-ico{ color:var(--navy); display:inline-flex; }
.hm-frame-head h2{ font:800 15px/1.2 var(--sans); letter-spacing:-.005em; color:var(--ink); }
.hm-frame-head .fh-sub{ font:500 11.5px/1.3 var(--sans); color:var(--ink-soft); margin-left:2px; }
.hm-frame-head .fh-tag{ margin-left:auto; display:flex; align-items:center; gap:10px; }

/* horizontal scroll wrapper for large grids */
.grid-scroll{ overflow:auto; padding:18px 20px 20px; }

/* the matrix grid: top-left corner | x-axis title (spans cols) | corner
   then a column-label row, then data rows (row-label | cells… | row total),
   then a column-totals footer row. Built from CSS grid via inline template. */
.hm-grid{ display:grid; gap:3px; width:max-content; }

/* axis titles */
.ax-x-title, .ax-y-title{ font:700 10px/1 var(--mono); letter-spacing:.12em; text-transform:uppercase; color:var(--navy-deep); display:flex; align-items:center; justify-content:center; gap:6px; }
.ax-x-title{ padding:2px 0 6px; }
.ax-y-title{ writing-mode:vertical-rl; transform:rotate(180deg); padding:0 6px 0 2px; }
.corner{ }

/* column header cells */
.col-head{
  font:700 10px/1.25 var(--mono); letter-spacing:.02em; color:var(--ink-mid);
  display:flex; align-items:flex-end; justify-content:center; text-align:center;
  padding:4px 4px 7px; min-width:74px; cursor:pointer; border-bottom:2px solid var(--ink);
  transition:color .14s;
}
.col-head:hover{ color:var(--navy-deep); }
.col-head .ch-n{ display:block; font:600 9px/1.2 var(--mono); color:var(--ink-faint); margin-top:3px; }
.col-head.is-sort{ color:var(--navy-deep); }

/* row header cells */
.row-head{
  font:700 11.5px/1.2 var(--sans); color:var(--ink); display:flex; align-items:center; gap:8px;
  padding:0 12px 0 4px; white-space:nowrap; cursor:pointer; border-right:2px solid var(--ink);
  transition:color .14s;
}
.row-head:hover{ color:var(--navy-deep); }
.row-head .rh-n{ font:600 9.5px/1 var(--mono); color:var(--ink-faint); }
.row-head.is-sort{ color:var(--navy-deep); }

/* the data cells — graded by value */
.cell{
  position:relative; min-width:74px; height:46px; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font:700 12.5px/1 var(--mono); font-feature-settings:"tnum" 1; cursor:pointer;
  background:var(--cell-bg, var(--bg-subtle)); color:var(--cell-fg, var(--ink-mid));
  border:1px solid var(--cell-line, var(--rule-soft));
  transition:transform .12s, box-shadow .12s, opacity .14s, filter .14s;
}
.cell:hover, .cell.is-hi{ transform:scale(1.06); box-shadow:0 3px 12px rgba(17,19,26,.22); z-index:4; }
.cell:focus-visible{ outline:2px solid var(--navy); outline-offset:2px; z-index:5; }
.cell.is-empty{ background:repeating-linear-gradient(45deg,var(--bg-subtle),var(--bg-subtle) 5px,var(--rule-soft) 5px,var(--rule-soft) 6px); color:var(--ink-faint); cursor:default; }
.cell.is-empty:hover{ transform:none; box-shadow:none; }
/* threshold dimming: cells below the cutoff fade back */
.cell.is-below{ opacity:.16; filter:grayscale(.7); }
/* cross-highlight of the hovered cell's row + column */
.cell.is-cross{ box-shadow:inset 0 0 0 1.5px var(--navy-line); }
.col-head.is-cross, .row-head.is-cross{ color:var(--navy-deep); }

/* marginal totals (row totals column + column totals row) */
.tot-cap{ font:700 9px/1 var(--mono); letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint);
  display:flex; align-items:center; justify-content:center; padding-bottom:7px; border-bottom:2px solid var(--ink); }
.tot-cap.left{ border-bottom:0; border-right:2px solid var(--ink); padding:0 8px 0 0; justify-content:flex-end; }
.row-tot, .col-tot{
  display:flex; align-items:center; justify-content:center;
  font:800 12px/1 var(--mono); font-feature-settings:"tnum" 1; color:var(--ink);
  min-width:60px; padding:0 8px;
}
.row-tot{ border-left:2px solid var(--ink); }
.col-tot{ height:38px; border-top:2px solid var(--ink); }
.row-tot .rt-bar, .col-tot .ct-bar{ position:absolute; }
/* totals get a faint accent under-bar to read as a marginal summary */
.row-tot{ position:relative; }
.row-tot::after{ content:""; position:absolute; left:8px; right:8px; bottom:5px; height:3px; border-radius:2px;
  background:var(--navy-line); transform:scaleX(var(--tw,0)); transform-origin:left; opacity:.9; }
.col-tot{ position:relative; }
.col-tot::after{ content:""; position:absolute; left:8px; right:8px; bottom:3px; height:3px; border-radius:2px;
  background:var(--navy-line); transform:scaleX(var(--tw,0)); transform-origin:left; opacity:.9; }

/* hover / click detail popover (built once, positioned by JS) */
.cell-pop{
  position:fixed; z-index:60; min-width:210px; max-width:286px;
  background:var(--bg); border:1px solid var(--pc, var(--rule)); border-radius:11px;
  box-shadow:0 8px 26px rgba(17,19,26,.2); padding:12px 14px; pointer-events:none;
  opacity:0; transform:translateY(5px); transition:opacity .12s, transform .12s;
}
.cell-pop.show{ opacity:1; transform:translateY(0); }
.cell-pop.pinned{ pointer-events:auto; }
.cell-pop .cp-cross{ display:flex; align-items:center; gap:7px; font:700 12.5px/1.2 var(--sans); color:var(--ink); margin-bottom:3px; }
.cell-pop .cp-cross .cp-sw{ width:12px; height:12px; border-radius:3px; flex:none; background:var(--pc, var(--ink-faint)); border:1px solid rgba(17,19,26,.12); }
.cell-pop .cp-axes{ font:600 10px/1.4 var(--mono); letter-spacing:.03em; color:var(--ink-faint); text-transform:uppercase; margin-bottom:8px; }
.cell-pop .cp-val{ display:flex; align-items:baseline; gap:7px; margin-bottom:7px; }
.cell-pop .cp-val .cp-num{ font:800 24px/1 var(--mono); font-feature-settings:"tnum" 1; color:var(--ink); }
.cell-pop .cp-val .cp-band{ font:600 9.5px/1 var(--mono); letter-spacing:.05em; text-transform:uppercase; padding:3px 6px; border-radius:5px; border:1px solid var(--rule); color:var(--ink-soft); }
.cell-pop .cp-val .cp-band.is-ok{ color:var(--ok); border-color:var(--ok-line); background:var(--ok-bg); }
.cell-pop .cp-val .cp-band.is-hold{ color:var(--hold); border-color:var(--hold-line); background:var(--hold-bg); }
.cell-pop .cp-val .cp-band.is-risk{ color:var(--risk); border-color:var(--risk-line); background:var(--risk-bg); }
.cell-pop .cp-detail{ font:500 11px/1.5 var(--sans); color:var(--ink-mid); padding-top:8px; border-top:1px solid var(--rule-soft); }
.cell-pop .cp-close{ display:none; }
.cell-pop.pinned .cp-close{ display:inline-flex; position:absolute; top:9px; right:9px; width:18px; height:18px;
  align-items:center; justify-content:center; border:1px solid var(--rule); border-radius:5px; background:var(--bg);
  color:var(--ink-soft); cursor:pointer; }

/* empty-state when threshold hides everything */
.hm-note{ font:600 11px/1.4 var(--mono); color:var(--ink-soft); padding:6px 0 0; }

/* ---- footer ---- */
.foot{
  margin-top:22px; background:var(--bg-deep); color:#d7d6dd;
  border-radius:12px 12px 0 0; padding:16px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.foot .wm{ display:flex; align-items:center; gap:9px; font:800 13px/1 var(--sans); color:#fff; }
.foot .wm .sq{ width:14px; height:14px; border-radius:4px; background:var(--navy); }
.foot .fmeta{ font:600 10px/1.5 var(--mono); letter-spacing:.06em; text-transform:uppercase; color:#9a99a4; }
.foot .fright{ margin-left:auto; font:600 10px/1.5 var(--mono); letter-spacing:.06em; text-transform:uppercase; color:#9a99a4; text-align:right; }

/* ---- reduced motion ---- */
@media (prefers-reduced-motion: reduce){
  *{ transition:none !important; }
  .cell:hover, .cell.is-hi{ transform:none; }
}

/* ---- print : static, complete snapshot; hide controls ---- */
@media print{
  body{ background:#fff; }
  .heatmap{ max-width:none; padding:0; }
  .rc-theme, .hm-toolbar, .cell-pop, .ghost-btn{ display:none !important; }
  .hm-frame, .hm-head{ box-shadow:none; break-inside:avoid; }
  .grid-scroll{ overflow:visible; }
  /* expand everything: drop threshold dimming, print full grid */
  .cell.is-below{ opacity:1 !important; filter:none !important; }
  .foot{ background:#fff; color:#000; border-top:1px solid var(--rule); border-radius:0; }
  .foot .fmeta, .foot .fright{ color:#555; }
  .foot .wm{ color:#000; }
}
</style>
</head>
<body>
<main class="heatmap" id="board" hidden>

  <!-- ============== HEAD ============== -->
  <header class="hm-head">
    <div class="hh-left">
      <div class="eyebrow" id="hhEyebrow">Risk Workshop · {{REPORT_TYPE}}</div>
      <h1 class="hm-title">
        <span class="markmini" aria-hidden="true">
          <!-- heatmap mark (house style: stroke 1.75, squared node) -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3.5" y="3.5" width="17" height="17" rx="2.5"/>
            <path d="M9.17 3.5V20.5M14.83 3.5V20.5M3.5 9.17H20.5M3.5 14.83H20.5"/>
            <rect x="14.83" y="3.5" width="5.67" height="5.67" rx="1" fill="currentColor" stroke="none"/>
          </svg>
        </span>

<script>
/* ============================================================
   Data-driven render + interactions  (vanilla JS, no libs).
   JS renders the N×M graded grid from #report-data; print
   prints the rendered snapshot. Board is hidden until render.
   ============================================================ */
(function(){
  "use strict";
  var DATA = {};
  try { DATA = JSON.parse(document.getElementById('report-data').textContent); }
  catch(e){ console.error('report-data parse failed', e); return; }

  var m     = DATA.meta || {};
  var MODE  = DATA.mode || 'risk';
  var rows  = (DATA.rows || []).slice();
  var cols  = (DATA.cols || []).slice();
  var scale = DATA.scale || { min:0, max:100 };
  var axes  = DATA.axisLabels || { x:'', y:'' };

  var MODE_LABEL = { risk:'Risk', correlation:'Correlation', activity:'Activity' };
  var MODE_ICON = {
    /* status: warning-octagon */
    risk:'<path d="M8.3 3.5h7.4L20.5 8.3v7.4L15.7 20.5H8.3L3.5 15.7V8.3Z"/><path d="M12 8V12.5"/><rect x="10.6" y="14.6" width="2.8" height="2.8" rx="1.2" fill="currentColor" stroke="none"/>',
    /* data: scatter / correlation */
    correlation:'<path d="M4 4V20H20"/><rect x="7" y="14" width="2.6" height="2.6" rx="1.1" fill="currentColor" stroke="none"/><rect x="11" y="10" width="2.6" height="2.6" rx="1.1" fill="currentColor" stroke="none"/><rect x="15.4" y="6.6" width="2.6" height="2.6" rx="1.1" fill="currentColor" stroke="none"/>',
    /* time: calendar */
    activity:'<rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><path d="M3.5 9.5H20.5M8 3.5V6.5M16 3.5V6.5"/><rect x="7" y="12" width="2.6" height="2.6" rx="1" fill="currentColor" stroke="none"/><rect x="14.4" y="12" width="2.6" height="2.6" rx="1" fill="currentColor" stroke="none"/>'
  };

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function el(tag, cls){ var n=document.createElement(tag); if(cls) n.className=cls; return n; }

  /* ---------- cell lookup ---------- */
  var CELL = {};   // "row|col" -> cell
  (DATA.cells||[]).forEach(function(c){ CELL[c.row + '|' + c.col] = c; });
  function cellAt(rk, ck){ return CELL[rk + '|' + ck]; }

  /* ---------- colour scale ---------- */
  var MIN = (scale.min != null) ? scale.min : 0;
  var MAX = (scale.max != null) ? scale.max : 100;
  if(MAX <= MIN) MAX = MIN + 1;
  var BANDS = (scale.bands || []).slice().sort(function(a,b){ return a.min - b.min; });
  var BANDED = BANDS.length > 0;

  function norm(v){ return Math.max(0, Math.min(1, (v - MIN) / (MAX - MIN))); }
  function pct(v){ return Math.round(norm(v) * 100); }

  /* band tone for a value (semantic mode) */
  function bandOf(v){
    var hit = null;
    for(var i=0;i<BANDS.length;i++){ if(v >= BANDS[i].min) hit = BANDS[i]; }
    return hit;
  }
  var TONE_VARS = {
    ok:  { c:'var(--ok)',   bg:'var(--ok-bg)',   line:'var(--ok-line)' },
    hold:{ c:'var(--hold)', bg:'var(--hold-bg)', line:'var(--hold-line)' },
    risk:{ c:'var(--risk)', bg:'var(--risk-bg)', line:'var(--risk-line)' }
  };

  /* Per-cell colour. Banded → tint of the band tone scaled by intra-band
     intensity. Unbanded → single-hue accent ramp (tint --navy-bg → full --navy). */
  function cellColours(v){
    var t = norm(v);                         // 0..1 overall intensity
    if(BANDED){
      var b = bandOf(v) || BANDS[0];
      var tv = TONE_VARS[b.tone] || TONE_VARS.ok;
      /* wash mix: stronger fill as value rises; text flips to the tone at high mix */
      var mix = Math.round(22 + t * 70);     // 22%..92% of the tone over white
      var fg  = (mix >= 60) ? '#fff' : tv.c;
      return {
        bg:'color-mix(in srgb, ' + tv.c + ' ' + mix + '%, #fff)',
        fg:fg, line:tv.line, pop:tv.c, tone:b.tone, band:b
      };
    } else {
      /* accent ramp: --navy-bg (tint) at 0 → --navy (full) at 1 */
      var mixN = Math.round(8 + t * 92);     // 8%..100% accent over navy-bg
      var fgN  = (mixN >= 55) ? '#fff' : 'var(--navy-deep)';
      return {
        bg:'color-mix(in srgb, var(--navy) ' + mixN + '%, var(--navy-bg))',
        fg:fgN, line:'var(--navy-line)', pop:'var(--navy)', tone:null, band:null
      };
    }
  }

  /* ---------- totals ---------- */
  function rowTotal(rk){ var s=0; cols.forEach(function(c){ var x=cellAt(rk,c.key); if(x && x.value!=null) s+=x.value; }); return s; }
  function colTotal(ck){ var s=0; rows.forEach(function(r){ var x=cellAt(r.key,ck); if(x && x.value!=null) s+=x.value; }); return s; }
  function grandTotal(){ var s=0; rows.forEach(function(r){ s+=rowTotal(r.key); }); return s; }

  /* ---------- view state ---------- */
  var unit   = 'value';   // 'value' | 'pct'
  var thresh = MIN;       // dim cells with value < thresh
  var sort   = 'none';
  var pinned = null;      // pinned cell key

  /* current ordered rows/cols (sort applies here) */
  function orderedRows(){
    var r = rows.slice();
    if(sort==='rows-desc') r.sort(function(a,b){ return rowTotal(b.key)-rowTotal(a.key); });
    if(sort==='rows-asc')  r.sort(function(a,b){ return rowTotal(a.key)-rowTotal(b.key); });
    return r;
  }
  function orderedCols(){
    var c = cols.slice();
    if(sort==='cols-desc') c.sort(function(a,b){ return colTotal(b.key)-colTotal(a.key); });
    if(sort==='cols-asc')  c.sort(function(a,b){ return colTotal(a.key)-colTotal(b.key); });
    return c;
  }

  /* ---------- render the grid ---------- */
  var grid = document.getElementById('hmGrid');

  function buildGrid(){
    var R = orderedRows(), C = orderedCols();
    grid.innerHTML = '';
    /* template-columns: y-axis | row-label | C data cols | row-total
       template-rows:    x-axis | col-labels | R data rows | col-total  */
    grid.style.gridTemplateColumns = '22px auto repeat(' + C.length + ', minmax(74px, 1fr)) 64px';
    grid.style.gridTemplateRows    = 'auto auto repeat(' + R.length + ', 46px) 38px';

    var maxRowTot = Math.max(1, Math.max.apply(null, R.map(function(r){ return rowTotal(r.key); })));
    var maxColTot = Math.max(1, Math.max.apply(null, C.map(function(c){ return colTotal(c.key); })));

    /* --- ROW 1 : empty corner | empty | x-axis title (span C+? ) | --- */
    var corner = el('div','corner'); corner.style.gridColumn='1 / 3'; corner.style.gridRow='1';
    grid.appendChild(corner);
    var axx = el('div','ax-x-title'); axx.style.gridColumn = '3 / ' + (3 + C.length); axx.style.gridRow='1';
    axx.innerHTML = '<span aria-hidden="true"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12H19M14 7l5 5-5 5"/></svg></span>' + esc(axes.x||'');
    grid.appendChild(axx);
    var totCapTop = el('div','tot-cap'); totCapTop.textContent='Total'; totCapTop.style.gridColumn=(3+C.length); totCapTop.style.gridRow='1 / 3';
    grid.appendChild(totCapTop);

    /* --- ROW 2 : y-axis title (spans R) | corner | column heads --- */
    var axy = el('div','ax-y-title'); axy.style.gridColumn='1'; axy.style.gridRow='2 / ' + (3 + R.length);
    axy.textContent = axes.y || '';
    grid.appendChild(axy);
    var corner2 = el('div','corner'); corner2.style.gridColumn='2'; corner2.style.gridRow='2';
    grid.appendChild(corner2);

    C.forEach(function(c, ci){
      var ch = el('div','col-head' + (sort.indexOf('cols')===0 ? ' is-sort':''));
      ch.dataset.col = c.key; ch.setAttribute('role','columnheader');
      var n = (unit==='value') ? '' : '';
      ch.innerHTML = esc(c.label) + (c.sublabel?'<span class="ch-n">'+esc(c.sublabel)+'</span>':'') ;
      ch.style.gridColumn = (3 + ci); ch.style.gridRow='2';
      grid.appendChild(ch);
    });

    /* --- DATA ROWS --- */
    R.forEach(function(r, ri){
      var gr = (3 + ri);
      var rh = el('div','row-head' + (sort.indexOf('rows')===0 ? ' is-sort':''));
      rh.dataset.row = r.key; rh.setAttribute('role','rowheader');
      rh.innerHTML = '<span class="rh-n">'+esc(String(ri+1))+'</span>' + esc(r.label);
      rh.style.gridColumn='2'; rh.style.gridRow=gr;
      grid.appendChild(rh);

      C.forEach(function(c, ci){
        var x = cellAt(r.key, c.key);
        var cell = el('div','cell');
        cell.style.gridColumn=(3+ci); cell.style.gridRow=gr;
        cell.setAttribute('role','gridcell');
        cell.dataset.row=r.key; cell.dataset.col=c.key;
        if(!x || x.value==null){
          cell.classList.add('is-empty'); cell.textContent='·';
          cell.setAttribute('aria-label', r.label + ' × ' + c.label + ' — no data');
        } else {
          cell.dataset.value=x.value;
          cell.setAttribute('tabindex','0');
          var col = cellColours(x.value);
          cell.style.setProperty('--cell-bg', col.bg);
          cell.style.setProperty('--cell-fg', col.fg);
          cell.style.setProperty('--cell-line', col.line);
          cell.style.setProperty('--pc-c', col.pop);
          cell.dataset.pop = col.pop;
          cell.dataset.tone = col.tone || '';
          cell.dataset.bandlabel = (col.band && col.band.label) ? col.band.label : '';
          cell.textContent = (unit==='value') ? fmt(x.value) : (pct(x.value) + '%');
          cell.setAttribute('aria-label', r.label + ' × ' + c.label + ' = ' + x.value + (col.band?(' ('+col.band.label+')'):''));
        }
        grid.appendChild(cell);
      });

      /* row total */
      var rt = el('div','row-tot tnum'); rt.dataset.row=r.key;
      rt.style.gridColumn=(3+C.length); rt.style.gridRow=gr;
      var rtv = rowTotal(r.key);
      rt.textContent = (unit==='value') ? fmt(rtv) : (Math.round(rtv/Math.max(1,grandTotal())*100)+'%');
      rt.style.setProperty('--tw', (rtv/maxRowTot).toFixed(3));
      grid.appendChild(rt);
    });

    /* --- COLUMN TOTALS ROW --- */
    var grTot = (3 + R.length);
    var capLeft = el('div','tot-cap left'); capLeft.textContent='Total';
    capLeft.style.gridColumn='2'; capLeft.style.gridRow=grTot;
    grid.appendChild(capLeft);
    C.forEach(function(c, ci){
      var ct = el('div','col-tot tnum'); ct.dataset.col=c.key;
      ct.style.gridColumn=(3+ci); ct.style.gridRow=grTot;
      var ctv = colTotal(c.key);
      ct.textContent = (unit==='value') ? fmt(ctv) : (Math.round(ctv/Math.max(1,grandTotal())*100)+'%');
      ct.style.setProperty('--tw', (ctv/maxColTot).toFixed(3));
      grid.appendChild(ct);
    });
    /* grand total corner */
    var grand = el('div','col-tot tnum'); grand.style.gridColumn=(3+C.length); grand.style.gridRow=grTot;
    grand.style.borderLeft='2px solid var(--ink)'; grand.style.fontWeight='800';
    grand.textContent = fmt(grandTotal());
    grid.appendChild(grand);

    applyThreshold();
  }

  function fmt(v){ return (Math.round(v*100)/100).toString(); }

  /* ---------- threshold dimming ---------- */
  function applyThreshold(){
    var hidden = 0, total = 0;
    grid.querySelectorAll('.cell:not(.is-empty)').forEach(function(c){
      total++;
      var v = parseFloat(c.dataset.value);
      var below = v < thresh;
      c.classList.toggle('is-below', below);
      if(below) hidden++;
    });
    var note = document.getElementById('hmNote');
    if(thresh > MIN){
      note.hidden = false;
      note.textContent = 'Threshold ≥ ' + thresh + ' — ' + (total - hidden) + ' of ' + total + ' cells at or above cutoff (' + hidden + ' dimmed).';
    } else { note.hidden = true; }
    document.getElementById('resetBtn').hidden = (thresh===MIN && sort==='none' && unit==='value');
  }

  /* ---------- chrome ---------- */
  function renderChrome(){
    if(m.reportType) document.getElementById('hhEyebrow').textContent = (MODE_LABEL[MODE]||'Risk') + ' Heatmap · ' + m.reportType;
    document.getElementById('hhTitle').textContent = (m.project||'{{PROJECT}}') + (m.title ? (' · ' + m.title) : ' · Heatmap Grid');
    document.getElementById('hhStandfirst').textContent = m.subtitle || '';
    document.getElementById('hhAsof').textContent = 'as of ' + (m.date||'{{DATE}}');
    document.getElementById('ftOrg').textContent = m.org || '{{ORG}}';
    document.getElementById('ftMeta').innerHTML = esc(m.reportType||'{{REPORT_TYPE}}') + ' · Heatmap Grid<br>Prepared by ' + esc(m.author||'{{AUTHOR}}') + ' · ' + esc(m.date||'{{DATE}}');
    document.getElementById('ftRight').innerHTML = 'Confidential — internal use only<br>Mode: ' + esc((MODE_LABEL[MODE]||'Risk').toLowerCase()) + ' · ' + esc(axes.y||'') + ' × ' + esc(axes.x||'');

    /* grid frame head */
    document.getElementById('gridTitle').textContent = (axes.y||'Rows') + ' × ' + (axes.x||'Cols');
    document.getElementById('gridSub').textContent = 'graded ' + (MODE_LABEL[MODE]||'value').toLowerCase() + ' grid · ' + rows.length + '×' + cols.length;

    /* mode chips (the three supported modes; active = current) */
    var box = document.getElementById('modeChips');
    box.innerHTML = '';
    ['risk','correlation','activity'].forEach(function(md){
      var chip = el('span','mode-chip' + (md===MODE ? ' is-active':''));
      chip.innerHTML = '<span class="mc-ico" aria-hidden="true"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">'+MODE_ICON[md]+'</svg></span>'+MODE_LABEL[md];
      box.appendChild(chip);
    });

    /* scale legend : ramp ends + banded swatches */
    document.getElementById('srLo').textContent = MIN;
    document.getElementById('srHi').textContent = MAX + (scale.unit ? '' : '');
    document.getElementById('slCap').textContent = scale.unit ? (scale.unit.charAt(0).toUpperCase()+scale.unit.slice(1)) : 'Intensity';
    /* expose ramp endpoints to CSS gradient using the active scale colours */
    var c0 = BANDED ? 'color-mix(in srgb, var(--ok) 22%, #fff)' : 'var(--navy-bg)';
    var c100 = BANDED ? 'var(--risk)' : 'var(--navy)';
    document.getElementById('scaleRamp').style.setProperty('--hm-c0', c0);
    document.getElementById('scaleRamp').style.setProperty('--hm-c100', c100);
    if(BANDED){
      var bb = document.getElementById('scaleBands'); bb.hidden=false; bb.innerHTML='';
      BANDS.forEach(function(b){
        var it = el('span','band-item');
        it.innerHTML = '<span class="band-sw is-'+esc(b.tone)+'"></span>' + esc(b.label || b.tone);
        bb.appendChild(it);
      });
    }

    /* threshold range bounds */
    var tr = document.getElementById('threshRange');
    tr.min = MIN; tr.max = MAX; tr.value = MIN; thresh = MIN;
    document.getElementById('threshVal').textContent = MIN;

    document.getElementById('cellCount').textContent = (DATA.cells||[]).length + ' cells · ' + rows.length + '×' + cols.length;
  }

  /* ============================================================
     INTERACTIONS
     ============================================================ */
  var pop = null;

  function buildPop(){
    pop = el('div','cell-pop'); pop.id='cellPop';
    pop.innerHTML = '<button class="cp-close" aria-label="Close" type="button">&times;</button><div class="cp-body"></div>';
    document.body.appendChild(pop);
    pop.querySelector('.cp-close').addEventListener('click', function(){ unpin(); });
  }

  function rowLabel(rk){ var r=rows.filter(function(x){return x.key===rk;})[0]; return r?r.label:rk; }
  function colLabel(ck){ var c=cols.filter(function(x){return x.key===ck;})[0]; return c?c.label:ck; }

  function fillPop(cell){
    var rk=cell.dataset.row, ck=cell.dataset.col, x=cellAt(rk,ck);
    if(!x) return;
    var col = cellColours(x.value);
    pop.style.setProperty('--pc', col.pop);
    var bandHtml = col.band ? '<span class="cp-band is-'+esc(col.tone)+'">'+esc(col.band.label||col.tone)+'</span>' : '';
    var html =
      '<div class="cp-cross"><span class="cp-sw"></span>'+esc(rowLabel(rk))+' &times; '+esc(colLabel(ck))+'</div>'+
      '<div class="cp-axes">'+esc(axes.y||'row')+' &middot; '+esc(axes.x||'col')+'</div>'+
      '<div class="cp-val"><span class="cp-num">'+esc(x.label!=null?x.label:fmt(x.value))+'</span>'+
        '<span class="cp-band">'+esc(pct(x.value))+'% of max</span>'+ bandHtml +'</div>'+
      (x.detail ? '<div class="cp-detail">'+esc(x.detail)+'</div>' : '');
    pop.querySelector('.cp-body').innerHTML = html;
  }

  function placePop(cell){
    var r = cell.getBoundingClientRect();
    pop.style.left='0'; pop.style.top='0'; pop.classList.add('show');
    var pw=pop.offsetWidth, ph=pop.offsetHeight;
    var x = r.right + 12, y = r.top + r.height/2 - ph/2;
    if(x + pw > window.innerWidth - 8) x = r.left - pw - 12;
    if(x < 8) x = 8;
    if(y < 8) y = 8;
    if(y + ph > window.innerHeight - 8) y = window.innerHeight - ph - 8;
    pop.style.left = x+'px'; pop.style.top = y+'px';
  }

  function showPop(cell){ if(pinned) return; fillPop(cell); placePop(cell); }
  function hidePop(){ if(pinned) return; pop.classList.remove('show'); }
  function pin(cell){
    pinned = cell.dataset.row+'|'+cell.dataset.col;
    fillPop(cell); placePop(cell); pop.classList.add('show','pinned');
    crossHighlight(cell.dataset.row, cell.dataset.col, true);
  }
  function unpin(){ pinned=null; pop.classList.remove('show','pinned'); crossHighlight(null,null,false); }

  /* cross-highlight a cell's row + column headers and cells */
  function crossHighlight(rk, ck, on){
    grid.querySelectorAll('.is-cross').forEach(function(n){ n.classList.remove('is-cross'); });
    if(!on) return;
    grid.querySelectorAll('.cell').forEach(function(c){
      if(c.dataset.row===rk || c.dataset.col===ck) c.classList.add('is-cross');
    });
    grid.querySelectorAll('.row-head').forEach(function(h){ if(h.dataset.row===rk) h.classList.add('is-cross'); });
    grid.querySelectorAll('.col-head').forEach(function(h){ if(h.dataset.col===ck) h.classList.add('is-cross'); });
  }

  function wireInteractions(){
    buildPop();

    grid.addEventListener('mouseover', function(e){
      var c = e.target.closest('.cell'); if(!c || c.classList.contains('is-empty')) return;
      c.classList.add('is-hi'); if(!pinned){ crossHighlight(c.dataset.row, c.dataset.col, true); showPop(c); }
    });
    grid.addEventListener('mouseout', function(e){
      var c = e.target.closest('.cell'); if(!c) return;
      c.classList.remove('is-hi'); if(!pinned){ crossHighlight(null,null,false); hidePop(); }
    });
    grid.addEventListener('focusin', function(e){
      var c = e.target.closest('.cell'); if(!c || c.classList.contains('is-empty')) return;
      if(!pinned){ crossHighlight(c.dataset.row, c.dataset.col, true); showPop(c); }
    });
    grid.addEventListener('focusout', function(){ if(!pinned){ crossHighlight(null,null,false); hidePop(); } });

    /* click a cell → pin/unpin its drill detail; click a header → sort by it */
    grid.addEventListener('click', function(e){
      var cell = e.target.closest('.cell');
      if(cell && !cell.classList.contains('is-empty')){
        var key = cell.dataset.row+'|'+cell.dataset.col;
        if(pinned===key){ unpin(); } else { unpin(); pin(cell); }
        return;
      }
      var ch = e.target.closest('.col-head');
      if(ch){ cycleSort('cols'); return; }
      var rh = e.target.closest('.row-head');
      if(rh){ cycleSort('rows'); return; }
    });
    grid.addEventListener('keydown', function(e){
      var cell = e.target.closest('.cell');
      if(cell && (e.key==='Enter' || e.key===' ')){ e.preventDefault();
        var key = cell.dataset.row+'|'+cell.dataset.col;
        if(pinned===key){ unpin(); } else { unpin(); pin(cell); }
      }
    });

    /* threshold slider */
    var tr = document.getElementById('threshRange');
    tr.addEventListener('input', function(){
      thresh = parseFloat(tr.value);
      document.getElementById('threshVal').textContent = thresh;
      var f = ((thresh - MIN)/(MAX - MIN)*100).toFixed(1) + '%';
      tr.style.setProperty('--fill', f);
      applyThreshold();
    });

    /* sort select */
    document.getElementById('sortSel').addEventListener('change', function(){
      sort = this.value; unpin(); buildGrid();
    });

    /* value ↔ % toggle */
    document.getElementById('unitSeg').addEventListener('click', function(e){
      var b = e.target.closest('button'); if(!b) return;
      unit = b.dataset.unit;
      this.querySelectorAll('button').forEach(function(x){ x.classList.toggle('is-on', x===b); });
      unpin(); buildGrid();
    });

    /* reset view */
    document.getElementById('resetBtn').addEventListener('click', function(){
      sort='none'; unit='value'; thresh=MIN;
      document.getElementById('sortSel').value='none';
      document.getElementById('unitSeg').querySelectorAll('button').forEach(function(x){ x.classList.toggle('is-on', x.dataset.unit==='value'); });
      var tr=document.getElementById('threshRange'); tr.value=MIN; tr.style.setProperty('--fill','0%');
      document.getElementById('threshVal').textContent=MIN;
      unpin(); buildGrid();
    });

    /* Esc unpins; reposition pinned pop on resize/scroll */
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') unpin(); });
    window.addEventListener('resize', function(){ if(pinned){ var c=grid.querySelector('.cell[data-row="'+pinned.split('|')[0]+'"][data-col="'+pinned.split('|')[1]+'"]'); if(c) placePop(c); } });
    document.querySelector('.grid-scroll').addEventListener('scroll', function(){ if(pinned){ var c=grid.querySelector('.cell[data-row="'+pinned.split('|')[0]+'"][data-col="'+pinned.split('|')[1]+'"]'); if(c) placePop(c); } });
  }

  /* cycle a header axis through desc → asc → none */
  function cycleSort(axis){
    var d = axis+'-desc', a = axis+'-asc';
    sort = (sort===d) ? a : (sort===a) ? 'none' : d;
    document.getElementById('sortSel').value = sort;
    unpin(); buildGrid();
  }

  /* ---------- theme switcher ---------- */
  function wireThemeSwitch(){
    var rcSel = document.querySelector('.rc-theme-sel');
    var init = m.theme || 'teal';
    document.documentElement.dataset.theme = init;
    if(rcSel){
      rcSel.value = init;
      rcSel.addEventListener('change', function(){ document.documentElement.dataset.theme = rcSel.value; });
    }
  }

  /* ---------- boot ---------- */
  function render(){ renderChrome(); buildGrid(); }
  render();
  wireInteractions();
  wireThemeSwitch();
  document.getElementById('board').hidden = false;
})();
</script>
</body>
</html>
