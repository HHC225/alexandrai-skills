*{box-sizing:border-box}html,body{height:100%;margin:0}body{font:13px/1.45 var(--sans);background:var(--bg-band);color:var(--ink);overflow:hidden}button,select{font:inherit}.app{height:100vh;display:grid;grid-template-columns:230px 1fr 315px;grid-template-rows:52px 1fr;grid-template-areas:"bar bar bar" "left canvas right"}.bar{grid-area:bar;display:flex;align-items:center;gap:14px;padding:9px 16px;background:var(--bg);border-bottom:1px solid var(--rule);box-shadow:0 1px 3px rgba(17,19,26,.05);z-index:5}.mark{width:30px;height:30px;border-radius:8px;background:var(--navy);color:#fff;display:grid;place-items:center;font:800 13px/1 var(--mono)}.eyebrow{font:800 9px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}.title{font:800 15px/1.15 var(--sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title b{color:var(--navy-deep)}.spacer{flex:1}.date{font:700 10px/1 var(--mono);letter-spacing:.06em;color:var(--ink-soft);text-transform:uppercase}.rc-theme{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--rule);border-radius:7px;padding:3px 4px 3px 7px;background:var(--bg)}.rc-theme-sw{width:12px;height:12px;border-radius:50%;background:var(--navy);box-shadow:0 0 0 1px var(--rule)}.rc-theme-sel{border:0;background:none;font:600 11px/1 var(--mono);color:var(--ink-mid);outline:none}.side{background:var(--bg);overflow:auto}.left{grid-area:left;border-right:1px solid var(--rule)}.right{grid-area:right;border-left:1px solid var(--rule)}.group{padding:14px;border-bottom:1px solid var(--rule-soft)}.label{font:800 9.5px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}.chip{display:inline-flex;align-items:center;gap:6px;font:800 10.5px/1 var(--mono);color:var(--navy-deep);background:var(--navy-bg);border:1px solid var(--navy-line);border-radius:6px;padding:5px 8px;margin:0 5px 6px 0}.domain{width:100%;text-align:left;border:1px solid var(--rule);border-radius:8px;background:var(--bg);padding:8px 9px;margin-bottom:7px;cursor:pointer;color:var(--ink-mid);display:flex;justify-content:space-between}.domain:hover,.domain.on{background:var(--navy-bg);border-color:var(--navy-line);color:var(--navy-deep)}.canvas{grid-area:canvas;position:relative;overflow:hidden;cursor:grab;background:linear-gradient(var(--rule-soft) 1px,transparent 1px),linear-gradient(90deg,var(--rule-soft) 1px,transparent 1px),var(--bg-subtle);background-size:28px 28px;user-select:none;-webkit-user-select:none}.canvas.is-panning{cursor:grabbing}.world{position:absolute;left:0;top:0;width:1360px;height:820px;transform-origin:0 0;will-change:transform}svg.rels{position:absolute;inset:0;overflow:visible}.rel{stroke:var(--ink-soft);stroke-width:2;fill:none;opacity:.75}.rel.ident{stroke-width:3}.rel.hot{stroke:var(--navy);stroke-width:4;opacity:1}.rel.risk{stroke:var(--risk)}.rel-label{font:800 10px/1 var(--mono);fill:var(--ink-mid)}.rel-pill{fill:var(--bg);stroke:var(--rule)}.card{position:absolute;width:250px;transform:translate(-50%,-50%);border:1px solid var(--rule);border-radius:10px;background:var(--bg);box-shadow:0 8px 22px rgba(17,19,26,.08);overflow:hidden;cursor:pointer}.card:hover,.card.sel{border-color:var(--navy);box-shadow:0 0 0 3px var(--navy-bg),0 10px 24px rgba(17,19,26,.1)}.card.dim{opacity:.32}.head{padding:10px 11px;background:var(--navy-bg);border-bottom:1px solid var(--navy-line)}.area{font:800 9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--navy-deep);margin-bottom:5px}.name{font:800 14px/1.2 var(--sans);color:var(--ink);overflow-wrap:anywhere;hyphens:auto}.attrs{padding:7px 0}.attr{display:grid;grid-template-columns:42px minmax(0,1fr) minmax(54px,auto);gap:7px;align-items:baseline;padding:5px 10px;border-bottom:1px solid var(--rule-soft)}.attr:last-child{border-bottom:0}.key{font:800 9px/1 var(--mono);text-transform:uppercase;color:var(--ink-faint)}.key.pk{color:var(--navy-deep)}.key.fk{color:var(--hold)}.key.unique,.key.index{color:var(--ok)}.an{font:700 11.5px/1.2 var(--sans);color:var(--ink-mid);min-width:0;overflow-wrap:anywhere;word-break:break-word}.at{font:600 10px/1.2 var(--mono);color:var(--ink-faint);min-width:0;overflow-wrap:anywhere;word-break:break-word}.toolbar{position:absolute;left:16px;bottom:16px;z-index:20;display:flex;align-items:center;gap:4px;padding:5px;background:var(--bg);border:1px solid var(--rule);border-radius:10px;box-shadow:0 2px 8px rgba(17,19,26,.12)}.tool-btn{width:32px;height:32px;border-radius:7px;border:1px solid transparent;background:var(--bg);color:var(--ink-mid);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .12s,color .12s,border-color .12s}.tool-btn:hover{background:var(--navy-bg);color:var(--navy-deep);border-color:var(--navy-line)}.tool-btn svg{width:17px;height:17px}.tool-sep{width:1px;height:20px;background:var(--rule);margin:0 2px}.zoom-readout{font:700 11px/1 var(--mono);letter-spacing:.03em;color:var(--ink-soft);min-width:42px;text-align:center;padding:0 4px}.detail{padding:16px}.detail h2{font:800 17px/1.2 var(--sans);margin:0 0 8px;overflow-wrap:anywhere}.detail p{margin:10px 0;color:var(--ink-mid)}.st{display:inline-flex;align-items:center;gap:6px;font:800 10px/1 var(--mono);text-transform:uppercase;border:1px solid var(--rule);border-radius:6px;padding:4px 7px;background:var(--bg)}.st:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ink-faint)}.st.ok{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-line)}.st.ok:before{background:var(--ok)}.st.risk{color:var(--risk);background:var(--risk-bg);border-color:var(--risk-line)}.st.risk:before{background:var(--risk)}.st.hold{color:var(--hold);background:var(--hold-bg);border-color:var(--hold-line)}.st.hold:before{background:var(--hold)}.kv{display:grid;grid-template-columns:82px 1fr;gap:7px 10px;margin:12px 0}.k{font:800 9px/1.2 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}.v{font:600 12px/1.25 var(--sans);color:var(--ink-mid);overflow-wrap:anywhere;word-break:break-word}.idx,.edgeitem{border:1px solid var(--rule);border-radius:8px;padding:7px 8px;margin:6px 0;background:var(--bg-subtle);font:600 11px/1.25 var(--sans);overflow-wrap:anywhere;word-break:break-word}@media print{body{overflow:visible}.app{display:block}.bar,.side,.toolbar{display:none}.canvas{height:100vh;overflow:visible;cursor:auto;background:#fff}.world{transform:scale(.84);left:0;top:0;transform-origin:0 0}}

<script>
(function(){
  const data = JSON.parse(document.getElementById('report-data').textContent);
  const W = 1360, H = 820;
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const cls = (s) => s === 'ok' ? 'ok' : s === 'risk' ? 'risk' : s === 'hold' ? 'hold' : 'neutral';
  let activeDomain = 'all', selected = null, view = { zoom: 1, panX: 0, panY: 0 };
  function init(){
    document.documentElement.dataset.theme = data.meta.theme || 'black';
    $('theme').value = document.documentElement.dataset.theme;
    $('theme').addEventListener('change', e => document.documentElement.dataset.theme = e.target.value);
    $('eyebrow').textContent = data.meta.reportType || 'Entity Relationship Diagram';
    $('title').innerHTML = '<b>'+esc(data.meta.project)+'</b> - '+esc(data.meta.title);
    $('date').textContent = data.meta.date || '';
    renderDomains();
    render();
    fitToView(false);
    wireCanvas();
  }
  function pos(e){ return {x:e.x*W/100,y:e.y*H/100}; }
  function visible(e){ return activeDomain === 'all' || e.area === activeDomain; }
  function renderDomains(){
    const areas = [...new Set(data.entities.map(e => e.area).filter(Boolean))];
    $('domains').innerHTML = '<button class="domain on" data-domain="all">All domains<span>'+data.entities.length+'</span></button>' +
      areas.map(a => '<button class="domain" data-domain="'+esc(a)+'">'+esc(a)+'<span>'+data.entities.filter(e=>e.area===a).length+'</span></button>').join('');
    $('domains').querySelectorAll('button').forEach(b => b.onclick = () => { activeDomain = b.dataset.domain; selected = null; renderDomains(); render(); });
    document.querySelectorAll('[data-domain]').forEach(b => b.classList.toggle('on', b.dataset.domain === activeDomain));
  }
  function render(){
    const ents = data.entities.filter(visible), ids = new Set(ents.map(e=>e.id));
    const rels = data.relationships.filter(r => ids.has(r.from) && ids.has(r.to));
    renderRelations(rels);
    $('cards').innerHTML = ents.map(cardHtml).join('');
    $('cards').querySelectorAll('.card').forEach(c => c.onclick = (ev) => { ev.stopPropagation(); selected = c.dataset.id; render(); });
    renderDetail();
  }
  function cardHtml(e){
    const p = pos(e);
    const related = selected ? data.relationships.some(r => (r.from === selected && r.to === e.id) || (r.to === selected && r.from === e.id)) : false;
    const dim = selected && selected !== e.id && !related;
    return '<article class="card '+(selected===e.id?'sel ':'')+(dim?'dim':'')+'" data-id="'+esc(e.id)+'" style="left:'+p.x+'px;top:'+p.y+'px"><div class="head"><div class="area">'+esc(e.area||'domain')+'</div><div class="name">'+esc(e.name)+'</div></div><div class="attrs">'+e.attributes.map(a => '<div class="attr"><div class="key '+esc(a.key||'none')+'">'+esc(a.key||'')+'</div><div class="an">'+esc(a.name)+'</div><div class="at">'+esc(a.type)+(a.nullable?' ?':'')+'</div></div>').join('')+'</div></article>';
  }
  function renderRelations(rels){
    const byId = Object.fromEntries(data.entities.map(e=>[e.id,e]));
    $('rels').innerHTML = rels.map(r => {
      const a = pos(byId[r.from]), b = pos(byId[r.to]), mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
      const hot = selected && (r.from === selected || r.to === selected);
      const label = String(card(r.fromCardinality)+' '+(r.label||'rel')+' '+card(r.toCardinality));
      const pillW = Math.min(220, Math.max(72, label.length * 6.4 + 24));
      return '<path class="rel '+(r.identifying?'ident ':'')+(hot?'hot ':'')+cls(r.status)+'" d="M'+a.x+','+a.y+' L'+b.x+','+b.y+'"/><g><rect class="rel-pill" x="'+(mx-pillW/2)+'" y="'+(my-13)+'" width="'+pillW+'" height="25" rx="8"/><text class="rel-label" x="'+mx+'" y="'+(my+4)+'" text-anchor="middle">'+esc(label)+'</text></g>';
    }).join('');
  }
  function card(c){ return ({'one':'1','zero-one':'0..1','many':'*','zero-many':'0..*','one-many':'1..*'}[c] || c); }
  function renderDetail(){
    const e = data.entities.find(x => x.id === selected);
    if(!e){ $('detail').innerHTML = '<p>Select an entity to inspect attributes, indexes and direct relationships.</p>'; return; }
    const rels = data.relationships.filter(r => r.from === e.id || r.to === e.id);
    $('detail').innerHTML = '<h2>'+esc(e.name)+'</h2><span class="st '+cls(e.status)+'">'+esc(e.status||'neutral')+'</span><div class="kv"><div class="k">domain</div><div class="v">'+esc(e.area||'')+'</div><div class="k">fields</div><div class="v">'+e.attributes.length+'</div><div class="k">indexes</div><div class="v">'+(e.indexes||[]).length+'</div></div><div class="label">Attributes</div>'+e.attributes.map(a => '<div class="idx">'+esc(a.key||'none')+' - '+esc(a.name)+' : '+esc(a.type)+(a.ref?' -> '+esc(a.ref):'')+'</div>').join('')+'<div class="label" style="margin-top:14px">Indexes</div>'+(e.indexes||[]).map(i => '<div class="idx">'+esc(i)+'</div>').join('')+'<div class="label" style="margin-top:14px">Relationships</div>'+rels.map(r => '<div class="edgeitem">'+esc(r.from)+' '+card(r.fromCardinality)+' - '+card(r.toCardinality)+' '+esc(r.to)+'<br>'+esc(r.label||'')+'</div>').join('');
  }
  function applyTransform(){
    $('world').style.transform = 'translate('+view.panX+'px,'+view.panY+'px) scale('+view.zoom+')';
    $('zoom-readout').textContent = Math.round(view.zoom * 100) + '%';
  }
  function clampZoom(z){ return Math.max(0.3, Math.min(2.8, z)); }
  function zoomAt(factor, cx, cy){
    const canvas = $('canvas');
    const r = canvas.getBoundingClientRect();
    const ox = cx == null ? r.width / 2 : cx - r.left;
    const oy = cy == null ? r.height / 2 : cy - r.top;
    const next = clampZoom(view.zoom * factor);
    const k = next / view.zoom;
    view.panX = ox - (ox - view.panX) * k;
    view.panY = oy - (oy - view.panY) * k;
    view.zoom = next;
    applyTransform();
  }
  function fitToView(animate){
    const canvas = $('canvas');
    const r = canvas.getBoundingClientRect();
    const pad = 56;
    const next = clampZoom(Math.min((r.width - pad * 2) / W, (r.height - pad * 2) / H));
    view.zoom = next;
    view.panX = (r.width - W * next) / 2;
    view.panY = (r.height - H * next) / 2;
    const world = $('world');
    world.style.transition = animate ? 'transform .2s ease' : 'none';
    applyTransform();
    if(animate) setTimeout(() => { world.style.transition = 'none'; }, 220);
  }
  function wireCanvas(){
    const canvas = $('canvas');
    let dragging = false, moved = false, sx = 0, sy = 0, start = { x: 0, y: 0 };
    canvas.addEventListener('pointerdown', ev => {
      if(ev.button !== 0 || ev.target.closest('.card,.toolbar')) return;
      dragging = true; moved = false; sx = ev.clientX; sy = ev.clientY; start = { x: view.panX, y: view.panY };
      canvas.classList.add('is-panning'); canvas.setPointerCapture(ev.pointerId);
    });
    canvas.addEventListener('pointermove', ev => {
      if(!dragging) return;
      const dx = ev.clientX - sx, dy = ev.clientY - sy;
      if(Math.abs(dx) + Math.abs(dy) > 3) moved = true;
      view.panX = start.x + dx; view.panY = start.y + dy; applyTransform();
    });
    function endPan(){ if(!dragging) return; dragging = false; canvas.classList.remove('is-panning'); }
    canvas.addEventListener('pointerup', endPan);
    canvas.addEventListener('pointercancel', endPan);
    canvas.addEventListener('click', ev => {
      if(moved || ev.target.closest('.toolbar')) return;
      if(ev.target === canvas || ev.target === $('world') || ev.target.tagName === 'svg' || ev.target.classList.contains('rels')){ selected = null; render(); }
    });
    canvas.addEventListener('wheel', ev => {
      ev.preventDefault();
      zoomAt(ev.deltaY < 0 ? 1.12 : 1 / 1.12, ev.clientX, ev.clientY);
    }, { passive: false });
    $('zoom-in').addEventListener('click', () => zoomAt(1.2));
    $('zoom-out').addEventListener('click', () => zoomAt(1 / 1.2));
    $('fit').addEventListener('click', () => fitToView(true));
    window.addEventListener('resize', () => fitToView(false));
    document.addEventListener('keydown', ev => {
      if(ev.target && ['INPUT','TEXTAREA','SELECT'].includes(ev.target.tagName)) return;
      if(ev.key === '+' || ev.key === '=') zoomAt(1.2);
      if(ev.key === '-') zoomAt(1 / 1.2);
      if(ev.key === '0') fitToView(true);
      if(ev.key === 'Escape'){ selected = null; render(); }
    });
  }
  init();
})();
</script>
</body>
</html>
