<!DOCTYPE html>
<html lang="en" data-theme="plum">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>AlexandrAI Report</title>

<!-- ============================================================
     INCIDENT TIMELINE / POSTMORTEM CHRONOLOGY — data-driven, interactive, themeable.
     A vertical PAST event log: header (severity + key times) -> a vertical time
     rail of chronological events (clock + "+Nm since start", kind/severity coded,
     actor-attributed) with phase markers (detected -> mitigated -> resolved) and
     LIVE-computed MTTR -> contributing-factors panel -> sticky summary rail
     (MTTR card + phase jump + actor/kind/severity filter chips + density zoom).
     NOT the forward horizontal gantt (timeline-roadmap); this reads DOWNWARD.
     Self-contained: #report-data JSON is the ONLY content source; inline CSS
     (9 data-theme blocks incl Black) + inline SVG; render()/wire*() build the DOM.
     No external requests. Default theme: plum. PC-wide (1440).
     ============================================================ -->

<style>
:root{
 /* surfaces */
 --bg:#fff; --bg-band:#f6f6f8; --bg-subtle:#fafafb; --bg-deep:#15131a;
 --rule:#dcdce2; --rule-soft:#ebebef;
 /* ink */
 --ink:#11131a; --ink-mid:#33363f; --ink-soft:#5a5e68; --ink-faint:#868b95;
 /* brand accent — Plum (default) */
 --navy:#a21d6e; --navy-deep:#7c1450; --navy-bg:#fbe8f2; --navy-line:#e8b9d4;
 /* cleared / approved */
 --ok:#6d2356; --ok-bg:#f6e8f0; --ok-line:#e3bcd5;
 /* semantic states — CONSTANT across all themes */
 --risk:#b3261e; --risk-bg:#fbeceb; --risk-line:#edc7c4;
 --hold:#8a6d00; --hold-bg:#fbf3da; --hold-line:#e7d8a4;
 /* type stacks */
 --mono:ui-monospace,"JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;
 --sans:-apple-system,"Segoe UI",system-ui,Roboto,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Apple SD Gothic Neo","Malgun Gothic","PingFang SC","Microsoft YaHei","Noto Sans CJK JP","Noto Sans CJK KR","Noto Sans CJK SC","Noto Sans JP","Noto Sans KR","Noto Sans SC","Noto Sans",sans-serif;
}
/* theme overrides — swap ONLY the 7 accent values (risk/hold/neutrals stay) */
html[data-theme="blue"]  { --navy:#0b5fd4; --navy-deep:#0842a0; --navy-bg:#e8f1fc; --navy-line:#bcd6f5; --ok:#1a4f9c; --ok-bg:#e9f0fa; --ok-line:#b7cdea; }
html[data-theme="purple"]{ --navy:#a100ff; --navy-deep:#7a00c2; --navy-bg:#f3e8ff; --navy-line:#d9bef5; --ok:#5a2f8a; --ok-bg:#efe8f5; --ok-line:#d0b5e0; }
html[data-theme="indigo"]{ --navy:#4338ca; --navy-deep:#312c92; --navy-bg:#ebebfb; --navy-line:#c7c3f0; --ok:#3730a3; --ok-bg:#ebeaf7; --ok-line:#c5c2ea; }
html[data-theme="teal"]  { --navy:#0e7c86; --navy-deep:#095861; --navy-bg:#e0f3f4; --navy-line:#a9dade; --ok:#0f5d54; --ok-bg:#e3f3ef; --ok-line:#b3ddd4; }
html[data-theme="cyan"]  { --navy:#0891b2; --navy-deep:#0e6f88; --navy-bg:#e2f4f9; --navy-line:#abdde9; --ok:#0e6b7a; --ok-bg:#e4f3f4; --ok-line:#b0dde2; }
html[data-theme="green"] { --navy:#1f7a44; --navy-deep:#155730; --navy-bg:#e6f4ea; --navy-line:#b3dcc1; --ok:#2f6b3c; --ok-bg:#e9f3ea; --ok-line:#bedcc4; }
html[data-theme="plum"]  { --navy:#a21d6e; --navy-deep:#7c1450; --navy-bg:#fbe8f2; --navy-line:#e8b9d4; --ok:#6d2356; --ok-bg:#f6e8f0; --ok-line:#e3bcd5; }
html[data-theme="slate"] { --navy:#3f4f63; --navy-deep:#29384b; --navy-bg:#eef1f5; --navy-line:#c2ccd8; --ok:#34495e; --ok-bg:#eef1f5; --ok-line:#c2ccd8; }
html[data-theme="black"] { --navy:#000000; --navy-deep:#000; --navy-bg:#f1f1f3; --navy-line:#d6d6db; --ok:#3f3f46; --ok-bg:#f1f1f3; --ok-line:#cfcfd6; }

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
code{font-family:var(--mono);}
.icon{width:1.15em;height:1.15em;display:inline-block;vertical-align:-.18em;color:inherit;flex:none;}
.icon-sm{width:14px;height:14px;}
.tnum{font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums;}
.noscript{margin:20px;padding:14px 18px;border:1px solid var(--hold-line);background:var(--hold-bg);border-radius:10px;color:var(--hold);font-weight:600;}

/* ---------- PC-wide shell ---------- */
.rc-frame{max-width:1440px;margin:0 auto;}

/* ---------- incident header band ---------- */
.rc-header{background:var(--bg-band);border-bottom:1px solid var(--rule);}
.rc-header-inner{padding:18px 40px 16px;}
.rc-eyebrow{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--navy-deep);}
.rc-eyebrow .icon{width:15px;height:15px;}
.rc-eyebrow .org{color:var(--ink-faint);font-weight:700;}
.rc-titlerow{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-top:9px;}
.rc-title{font-size:24px;line-height:1.25;font-weight:800;letter-spacing:-.01em;margin:0;color:var(--ink);flex:1;min-width:60%;max-width:72ch;}
.rc-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.rc-subtitle{font-size:13px;line-height:1.65;color:var(--ink-soft);margin:8px 0 0;max-width:90ch;}

/* severity / status badge (st-badge family) */
.rc-sev,.rc-status{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.04em;padding:4px 11px;border-radius:6px;white-space:nowrap;border:1px solid var(--rule);background:#fff;color:var(--ink-soft);}
.rc-sev .icon,.rc-status .icon{width:13px;height:13px;}
.rc-sev::before,.rc-status::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor;flex:none;}
.rc-sev.is-risk{color:var(--risk);border-color:var(--risk-line);background:var(--risk-bg);}
.rc-sev.is-hold{color:var(--hold);border-color:var(--hold-line);background:var(--hold-bg);}
.rc-sev.is-ok{color:var(--ok);border-color:var(--ok-line);background:var(--ok-bg);}
.rc-status.is-resolved{color:var(--ok);border-color:var(--ok-line);background:var(--ok-bg);}
.rc-status.is-open{color:var(--risk);border-color:var(--risk-line);background:var(--risk-bg);}
.rc-status.is-mitigated{color:var(--hold);border-color:var(--hold-line);background:var(--hold-bg);}

/* key-times key/value grid */
.rc-keytimes{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:0;margin:15px 0 0;border:1px solid var(--rule);border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 1px 2px rgba(17,19,26,.045);}
@media(max-width:980px){.rc-keytimes{grid-template-columns:repeat(2,1fr);}}
.rc-kt{padding:10px 14px;border-right:1px solid var(--rule-soft);min-width:0;}
.rc-kt:last-child{border-right:none;}
.rc-kt .k{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);display:flex;align-items:center;gap:5px;}
.rc-kt .k .icon{width:12px;height:12px;color:var(--navy-deep);}
.rc-kt .v{font-family:var(--mono);font-size:14px;font-weight:800;color:var(--ink);margin-top:4px;font-feature-settings:"tnum" 1;}
.rc-kt .vsub{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--ink-faint);margin-top:2px;font-feature-settings:"tnum" 1;}
.rc-kt.is-empty .v{color:var(--ink-faint);font-weight:700;}
.rc-kt.col-impact{grid-column:1/-1;border-right:none;border-top:1px solid var(--rule-soft);}
.rc-kt.col-impact .v{font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--ink-mid);line-height:1.5;}

/* theme switcher (canonical dropdown) */
.rc-theme{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--rule);border-radius:7px;padding:3px 4px 3px 7px;background:var(--bg);}
.rc-theme-sw{width:12px;height:12px;border-radius:50%;background:var(--navy);box-shadow:0 0 0 1px var(--rule);flex:none;}
.rc-theme-sel{border:0;background:none;font:600 11px/1 var(--mono);color:var(--ink-mid);cursor:pointer;outline:none;padding:2px;}
@media print{.rc-theme{display:none;}}

/* ---------- 2-col body: timeline + sticky rail ---------- */
.rc-body{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:34px;padding:24px 40px 40px;align-items:start;}
@media(max-width:1100px){.rc-body{grid-template-columns:1fr;}.rc-rail{position:static;order:-1;}}

/* timeline column */
.rc-main{min-width:0;}
.rc-main-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 14px;}
.rc-main-bar h2{margin:0;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);}
.rc-textbtn{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--navy-deep);background:var(--navy-bg);border:1px solid var(--navy-line);border-radius:6px;padding:4px 9px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.rc-textbtn:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.rc-textbtn .icon{width:12px;height:12px;}
.rc-allbtn{margin-left:auto;}

/* ===== the vertical time rail ===== */
.rc-timeline{position:relative;list-style:none;margin:0;padding:0;}
/* the continuous rule down the rail */
.rc-timeline::before{content:"";position:absolute;left:140px;top:6px;bottom:6px;width:2px;background:var(--rule);}
@media(max-width:640px){.rc-timeline::before{left:92px;}}

/* one event = a row hung off the rail (col1 ends at 112px; gap holds the 30px node
   centred on the 140px rail — node left edge 125px clears the right-aligned clock) */
.rc-event{position:relative;display:grid;grid-template-columns:112px 1fr;gap:40px;padding:0 0 var(--ev-gap,22px);}
@media(max-width:640px){.rc-event{grid-template-columns:72px 1fr;gap:30px;}}
.rc-event:last-child{padding-bottom:4px;}
.rc-event.is-hidden{display:none;}

/* left gutter: clock + +Nm since start */
.rc-when{text-align:right;padding-top:1px;}
.rc-clock{font-family:var(--mono);font-size:14px;font-weight:800;color:var(--ink);line-height:1.2;font-feature-settings:"tnum" 1;letter-spacing:-.01em;}
.rc-since{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--ink-faint);margin-top:2px;font-feature-settings:"tnum" 1;}
.rc-daytag{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px;}

/* the on-rail node (kind-coded) — sits on the rule between the two columns */
.rc-node{position:absolute;left:140px;top:1px;transform:translateX(-50%);width:30px;height:30px;border-radius:9px;background:#fff;border:2px solid var(--navy);color:var(--navy-deep);display:flex;align-items:center;justify-content:center;z-index:2;box-shadow:0 0 0 4px var(--bg);transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;}
@media(max-width:640px){.rc-node{left:92px;}}
.rc-node .icon{width:16px;height:16px;}
/* per-kind accents (brand for most; semantic for the loud kinds) */
.rc-event[data-kind="detect"]     .rc-node{border-color:var(--navy);color:var(--navy-deep);background:var(--navy-bg);}
.rc-event[data-kind="action"]     .rc-node{border-color:var(--navy);color:var(--navy-deep);}
.rc-event[data-kind="comms"]      .rc-node{border-color:var(--ink-faint);color:var(--ink-soft);}
.rc-event[data-kind="escalation"] .rc-node{border-color:var(--risk-line);color:var(--risk);background:var(--risk-bg);}
.rc-event[data-kind="decision"]   .rc-node{border-color:var(--hold-line);color:var(--hold);background:var(--hold-bg);}
.rc-event[data-kind="resolve"]    .rc-node{border-color:var(--ok-line);color:var(--ok);background:var(--ok-bg);}
/* per-event severity emphasis ring */
.rc-event[data-sev="sev1"] .rc-node,.rc-event[data-sev="sev2"] .rc-node{border-color:var(--risk);color:var(--risk);}
.rc-event[data-sev="sev3"] .rc-node{border-color:var(--hold);color:var(--hold);}
.rc-event.is-pulse .rc-node{animation:pulse 1.1s ease;}
@keyframes pulse{0%{box-shadow:0 0 0 4px var(--bg),0 0 0 4px var(--navy-line);}50%{box-shadow:0 0 0 4px var(--bg),0 0 0 10px var(--navy-line);}100%{box-shadow:0 0 0 4px var(--bg);}}

/* the event card */
.rc-card{border:1px solid var(--rule);border-radius:12px;background:#fff;box-shadow:0 1px 2px rgba(17,19,26,.045);overflow:hidden;}
.rc-card-hd{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;}
.rc-card-main{min-width:0;flex:1;}
.rc-tags{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px;}
.rc-kind{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:5px;background:var(--navy-bg);color:var(--navy-deep);border:1px solid var(--navy-line);}
.rc-event[data-kind="escalation"] .rc-kind{background:var(--risk-bg);color:var(--risk);border-color:var(--risk-line);}
.rc-event[data-kind="decision"] .rc-kind{background:var(--hold-bg);color:var(--hold);border-color:var(--hold-line);}
.rc-event[data-kind="resolve"] .rc-kind{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-line);}
.rc-event[data-kind="comms"] .rc-kind{background:var(--bg-band);color:var(--ink-soft);border-color:var(--rule);}
.rc-actor{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--ink-mid);background:#fff;border:1px solid var(--rule);border-radius:5px;padding:2px 8px;}
.rc-actor .icon{width:12px;height:12px;color:var(--navy-deep);}
.rc-evsev{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:5px;}
.rc-evsev.is-risk{background:var(--risk-bg);color:var(--risk);border:1px solid var(--risk-line);}
.rc-evsev.is-hold{background:var(--hold-bg);color:var(--hold);border:1px solid var(--hold-line);}
.rc-evsev.is-ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-line);}
.rc-ref{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--navy-deep);background:var(--navy-bg);border:1px solid var(--navy-line);border-radius:5px;padding:2px 8px;text-decoration:none;white-space:nowrap;}
.rc-ref:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.rc-ref .icon{width:11px;height:11px;}
.rc-evtitle{font-size:13.5px;line-height:1.55;color:var(--ink);font-weight:600;}
.rc-evtitle code{font-family:var(--mono);font-size:11px;background:rgba(0,0,0,.05);padding:0 4px;border-radius:4px;}
.rc-caret{flex:none;color:var(--ink-faint);margin-top:2px;transition:transform .15s ease;}
.rc-caret .icon{width:16px;height:16px;}
.rc-event[data-open="true"] .rc-caret{transform:rotate(90deg);}

/* expandable detail */
.rc-detail{border-top:1px solid var(--rule-soft);padding:11px 14px 13px;background:var(--bg-subtle);}
.rc-event[data-open="false"] .rc-detail{display:none;}
.rc-detail p{margin:0;font-size:12.5px;line-height:1.6;color:var(--ink-mid);}
.rc-detail p code{font-family:var(--mono);font-size:11px;background:#fff;border:1px solid var(--rule-soft);padding:0 4px;border-radius:4px;}
.rc-cmd{margin:10px 0 0;border-radius:10px;background:var(--bg-deep);overflow:hidden;}
.rc-cmd pre{margin:0;padding:11px 14px;font-family:var(--mono);font-size:11.5px;line-height:1.6;color:#e5e7eb;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;}
.rc-cmd pre::before{content:"$";color:#d98cc0;margin-right:8px;font-weight:700;}

/* compact density: tighter gaps + hide detail blocks behind expand only */
body.is-compact .rc-event{--ev-gap:13px;}
body.is-compact .rc-card-hd{padding:8px 12px;}
body.is-compact .rc-evtitle{font-size:13px;}

/* ===== phase marker (enlarged diamond on the rail) ===== */
.rc-event.is-phase{padding-top:4px;}
.rc-event.is-phase .rc-node{width:36px;height:36px;border-radius:11px;transform:translateX(-50%) rotate(45deg);border-width:2.5px;}
.rc-event.is-phase .rc-node .icon{transform:rotate(-45deg);width:17px;height:17px;}
.rc-event.is-phase[data-phase="detected"] .rc-node{border-color:var(--navy);color:#fff;background:var(--navy);}
.rc-event.is-phase[data-phase="mitigated"] .rc-node{border-color:var(--hold);color:#fff;background:var(--hold);}
.rc-event.is-phase[data-phase="resolved"] .rc-node{border-color:var(--ok);color:#fff;background:var(--ok);}
.rc-phasebadge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:6px;}
.rc-event.is-phase[data-phase="detected"] .rc-phasebadge{background:var(--navy-bg);color:var(--navy-deep);border:1px solid var(--navy-line);}
.rc-event.is-phase[data-phase="mitigated"] .rc-phasebadge{background:var(--hold-bg);color:var(--hold);border:1px solid var(--hold-line);}
.rc-event.is-phase[data-phase="resolved"] .rc-phasebadge{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-line);}
.rc-phasedur{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--ink-soft);font-feature-settings:"tnum" 1;}
.rc-event.is-phase .rc-card{border-width:1.5px;}
.rc-event.is-phase[data-phase="detected"] .rc-card{border-color:var(--navy-line);}
.rc-event.is-phase[data-phase="mitigated"] .rc-card{border-color:var(--hold-line);}
.rc-event.is-phase[data-phase="resolved"] .rc-card{border-color:var(--ok-line);}

/* empty-state (filters hide everything) */
.rc-empty{display:none;border:1px dashed var(--rule);background:var(--bg-subtle);border-radius:12px;padding:22px 20px;text-align:center;color:var(--ink-soft);font-weight:700;align-items:center;justify-content:center;gap:9px;}
.rc-empty .icon{width:18px;height:18px;}
body.show-empty .rc-empty{display:flex;}

/* ---------- contributing-factors panel ---------- */
.rc-factors{margin:6px 40px 56px;border:1px solid var(--rule);border-radius:14px;background:#fff;box-shadow:0 1px 2px rgba(17,19,26,.045);overflow:hidden;}
.rc-factors-hd{display:flex;align-items:center;gap:9px;padding:12px 18px;background:var(--bg-band);border-bottom:1px solid var(--rule);}
.rc-factors-hd .icon{width:16px;height:16px;color:var(--navy-deep);}
.rc-factors-hd h2{margin:0;font-size:15px;font-weight:800;letter-spacing:-.01em;}
.rc-factors-hd .lbl{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-left:auto;}
.rc-factors-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--rule-soft);}
@media(max-width:880px){.rc-factors-grid{grid-template-columns:1fr;}}
.rc-factor{background:#fff;padding:14px 18px;display:grid;grid-template-columns:20px 1fr;gap:11px;align-items:start;}
.rc-factor .ficon{margin-top:2px;}
.rc-factor .ficon .icon{width:17px;height:17px;}
.rc-factor[data-kind="cause"] .ficon{color:var(--risk);}
.rc-factor[data-kind="gap"] .ficon{color:var(--hold);}
.rc-factor[data-kind="trigger"] .ficon{color:var(--navy-deep);}
.rc-factor .ftext{min-width:0;}
.rc-factor .fkind{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);}
.rc-factor[data-kind="cause"] .fkind{color:var(--risk);}
.rc-factor[data-kind="gap"] .fkind{color:var(--hold);}
.rc-factor[data-kind="trigger"] .fkind{color:var(--navy-deep);}
.rc-factor .flabel{font-size:13px;font-weight:800;color:var(--ink);margin:2px 0 3px;letter-spacing:-.01em;}
.rc-factor .fdetail{font-size:12px;line-height:1.55;color:var(--ink-mid);}
.rc-factor .fdetail code{font-family:var(--mono);font-size:11px;background:var(--bg-band);padding:0 4px;border-radius:4px;}

/* ---------- sticky summary rail ---------- */
.rc-rail{position:sticky;top:18px;align-self:start;display:flex;flex-direction:column;gap:14px;min-width:0;}
.rc-rcard{border:1px solid var(--rule);border-radius:14px;background:#fff;box-shadow:0 1px 3px rgba(17,19,26,.05);overflow:hidden;}
.rc-rcard-hd{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);padding:11px 15px 10px;border-bottom:1px solid var(--rule-soft);background:var(--bg-subtle);}
.rc-rcard-hd .icon{width:14px;height:14px;color:var(--navy-deep);}

/* MTTR card (live, computed) */
.rc-mttr{padding:14px 15px 15px;}
.rc-mttr-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.rc-tile{border:1px solid var(--rule);border-radius:10px;padding:9px 10px;background:var(--bg-subtle);text-align:center;}
.rc-tile .tl{font-family:var(--mono);font-size:8.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);}
.rc-tile .tv{font-family:var(--mono);font-size:17px;font-weight:800;color:var(--ink);margin-top:3px;font-feature-settings:"tnum" 1;letter-spacing:-.02em;}
.rc-tile.t-detect .tv{color:var(--navy-deep);}
.rc-tile.t-mitig .tv{color:var(--hold);}
.rc-tile.t-resolve .tv{color:var(--ok);}
.rc-tile.is-empty .tv{color:var(--ink-faint);}
/* proportional phase bar */
.rc-phasebar{display:flex;height:12px;border-radius:6px;overflow:hidden;margin-top:13px;border:1px solid var(--rule);background:var(--bg-band);}
.rc-phasebar span{display:block;height:100%;}
.rc-phasebar .seg-detect{background:var(--navy);}
.rc-phasebar .seg-mitig{background:var(--hold);}
.rc-phasebar .seg-resolve{background:var(--ok);}
.rc-phasebar-key{display:flex;justify-content:space-between;gap:6px;margin-top:7px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);}
.rc-phasebar-key b{display:inline-flex;align-items:center;gap:4px;}
.rc-phasebar-key .sw{width:8px;height:8px;border-radius:2px;}
.rc-phasebar-key .sw.d{background:var(--navy);}
.rc-phasebar-key .sw.m{background:var(--hold);}
.rc-phasebar-key .sw.r{background:var(--ok);}

/* phase jump links */
.rc-jumps{list-style:none;margin:0;padding:6px 8px 9px;}
.rc-jumps button{width:100%;display:grid;grid-template-columns:18px 1fr auto;gap:9px;align-items:center;padding:8px 9px;border-radius:8px;border:none;background:none;cursor:pointer;font:inherit;text-align:left;color:var(--ink-mid);}
.rc-jumps button:hover{background:var(--bg-subtle);color:var(--navy-deep);}
.rc-jumps button:disabled{opacity:.4;cursor:default;}
.rc-jumps .ji{flex:none;display:flex;}.rc-jumps .ji .icon{width:15px;height:15px;}
.rc-jumps button[data-phase="detected"] .ji{color:var(--navy-deep);}
.rc-jumps button[data-phase="mitigated"] .ji{color:var(--hold);}
.rc-jumps button[data-phase="resolved"] .ji{color:var(--ok);}
.rc-jumps .jt{font-size:12.5px;font-weight:700;}
.rc-jumps .jat{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--ink-faint);font-feature-settings:"tnum" 1;}

/* filter chips */
.rc-filters{padding:11px 15px 14px;display:flex;flex-direction:column;gap:11px;}
.rc-facet > .fl{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px;display:block;}
.rc-chiprow{display:flex;flex-wrap:wrap;gap:5px;}
.rc-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--ink-soft);background:#fff;border:1px solid var(--rule);border-radius:6px;padding:3px 8px;cursor:pointer;transition:background .12s ease,color .12s ease,border-color .12s ease;}
.rc-chip .icon{width:12px;height:12px;}
.rc-chip:hover{border-color:var(--navy-line);color:var(--navy-deep);}
.rc-chip.is-on{background:var(--navy);color:#fff;border-color:var(--navy);}
.rc-chip.is-on .icon{color:#fff;}
.rc-chip[data-facet="sev"][data-val="sev1"].is-on,.rc-chip[data-facet="sev"][data-val="sev2"].is-on{background:var(--risk);border-color:var(--risk);}
.rc-chip[data-facet="sev"][data-val="sev3"].is-on{background:var(--hold);border-color:var(--hold);}
.rc-chip[data-facet="sev"][data-val="info"].is-on{background:var(--ok);border-color:var(--ok);}
.rc-clearbtn{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);background:none;border:none;cursor:pointer;padding:0;margin-left:auto;display:inline-flex;align-items:center;gap:4px;}
.rc-clearbtn:hover{color:var(--risk);}
.rc-clearbtn .icon{width:12px;height:12px;}
.rc-facet-hd{display:flex;align-items:center;}

/* density toggle */
.rc-density{padding:12px 15px 14px;}
.rc-toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--ink-mid);user-select:none;}
.rc-switch{flex:none;width:38px;height:21px;border-radius:11px;background:var(--rule);border:none;cursor:pointer;position:relative;transition:background .15s ease;padding:0;}
.rc-switch::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:transform .15s ease;}
.rc-switch[aria-pressed="true"]{background:var(--navy);}
.rc-switch[aria-pressed="true"]::after{transform:translateX(17px);}

/* tooltip (hover event → exact ts + +Nm) */
.rc-tip{position:fixed;z-index:50;pointer-events:none;background:var(--bg-deep);color:#f1f1f3;font-family:var(--mono);font-size:11px;font-weight:600;padding:7px 10px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.28);max-width:280px;line-height:1.5;opacity:0;transition:opacity .1s ease;}
.rc-tip.is-on{opacity:1;}
.rc-tip .tts{color:#d98cc0;font-weight:700;}
.rc-tip .tsince{color:#cfd3da;}

/* footer */
.rc-footer{background:var(--bg-deep);color:#c9c4d0;padding:30px 40px;}
.rc-foot-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.rc-brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px;color:#fff;letter-spacing:-.01em;}
.rc-brand .sq{width:13px;height:13px;border-radius:4px;background:var(--navy);}
.rc-foot-meta{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8f8898;text-align:right;line-height:1.7;}

/* ---------- print: full chronology, expanded, controls hidden ---------- */
@media print{
 .rc-theme,.rc-caret,.rc-allbtn,.rc-filters,.rc-density,.rc-jumps,.rc-empty,.rc-tip{display:none !important;}
 .rc-body{grid-template-columns:1fr;padding:0 0 20px;}
 .rc-rail{position:static;order:0;}
 .rc-rcard{break-inside:avoid;box-shadow:none;}
 .rc-event{break-inside:avoid;}
 .rc-event.is-hidden{display:grid !important;}    /* ignore filters */
 .rc-detail{display:block !important;}            /* force expand */
 .rc-card{box-shadow:none;}
 .rc-factor{break-inside:avoid;}
 .rc-footer{background:#fff;color:#333;border-top:1px solid var(--rule);}
 .rc-brand{color:#111;}.rc-foot-meta{color:#666;}
 body{font-size:11px;}
}

    .sort(function (a, b) { return (a.__d ? a.__d.getTime() : 0) - (b.__d ? b.__d.getTime() : 0); });
  var actorMap = {}; (DATA.actors || []).forEach(function (a) { actorMap[a.key] = a; });

  // which event is the canonical "detected" / "resolved" phase node, and where mitigated sits
  var inc = DATA.incident || {};
  var detectedTs = inc.detected, mitigatedTs = inc.mitigated || null, resolvedTs = inc.resolved || null;

  // active filter state (Set per facet; empty set = no filter on that facet)
  var filters = { actor: new Set(), kind: new Set(), sev: new Set() };

  // ---- render ----
  function render() {
    var m = DATA.meta;
    document.documentElement.dataset.theme = m.theme || "plum";
    document.title = "Incident timeline — " + m.title + " · " + m.project;
    document.getElementById("foot-org").textContent = m.org;
    document.getElementById("foot-meta").innerHTML =
      esc(m.reportType) + " · " + esc(m.project) + " · " + esc(inc.id || "") + "<br>Reviewed " + esc(m.date) + " · Distribution controlled · " + esc(m.org);

    root.innerHTML = "";
    root.appendChild(buildHeader(m));
    root.appendChild(buildBody());
    root.appendChild(buildFactors());

    wireThemeSwitch();
  }

  function buildHeader(m) {
    var h = el("header", "rc-header");
    var sev = SEV[inc.severity] || SEV.info;
    var status = inc.status || "resolved";
    var statusT = { open:"Open", mitigated:"Mitigated", resolved:"Resolved", closed:"Closed" }[status] || status;

    // key-times grid (start / detected / mitigated / resolved) — values + derived offsets
    function kt(label, ts, icon, deriveFrom) {
      var d = parse(ts);
      if (!d) return '<div class="rc-kt is-empty"><div class="k">' + ico(icon) + esc(label) + '</div><div class="v">—</div></div>';
      var sub = "";
      if (deriveFrom) { var b = parse(deriveFrom); if (b) sub = '<div class="vsub">+' + durStr(d - b) + ' from start</div>'; }
      return '<div class="rc-kt"><div class="k">' + ico(icon) + esc(label) + '</div><div class="v">' + clockOf(d) + '</div>' + sub + '</div>';
    }
    var grid =
      kt("Impact start", inc.start, "i-clock", null) +
      kt("Detected", inc.detected, "i-alert", inc.start) +
      kt("Mitigated", inc.mitigated, "i-flag", inc.start) +
      kt("Resolved", inc.resolved, "i-check-circle", inc.start) +
      '<div class="rc-kt"><div class="k">' + ico("i-stopwatch") + 'MTTR</div><div class="v">' + durStr(parse(inc.resolved) && parse(inc.start) ? parse(inc.resolved) - parse(inc.start) : null) + '</div><div class="vsub">start → resolved</div></div>' +
      (inc.impact ? '<div class="rc-kt col-impact"><div class="k">' + ico("i-shield") + 'Impact</div><div class="v">' + md(inc.impact) + '</div></div>' : "");

    var themeDropdown =
      '<label class="rc-theme" title="Brand colour" style="margin-left:auto">' +
        '<span class="rc-theme-sw" aria-hidden="true"></span>' +
        '<select class="rc-theme-sel" aria-label="Brand theme">' +
          '<option value="blue">Blue</option>' +
          '<option value="purple">Purple</option>' +
          '<option value="indigo">Indigo</option>' +
          '<option value="teal">Teal</option>' +
          '<option value="cyan">Cyan</option>' +
          '<option value="green">Green</option>' +
          '<option value="plum">Plum</option>' +
          '<option value="slate">Slate</option>' +
          '<option value="black">Black</option>' +
        '</select>' +
      '</label>';

    h.innerHTML =
      '<div class="rc-header-inner">' +
        '<div class="rc-eyebrow">' + ico("i-history") + '<span>' + esc(m.reportType) + '</span><span class="org">· ' + esc(m.org) + ' / ' + esc(m.project) + ' · ' + esc(inc.id || "") + '</span>' +
          themeDropdown +
        '</div>' +
        '<div class="rc-titlerow">' +
          '<h1 class="rc-title">' + esc(m.title) + '</h1>' +
          '<div class="rc-badges">' +
            '<span class="rc-sev ' + sev.c + '">' + ico("i-shield") + 'Severity · ' + sev.t + '</span>' +
            '<span class="rc-status is-' + esc(status) + '">' + esc(statusT) + '</span>' +
          '</div>' +
        '</div>' +
        (m.subtitle ? '<p class="rc-subtitle">' + esc(m.subtitle) + '</p>' : "") +
        '<div class="rc-keytimes">' + grid + '</div>' +
      '</div>';
    return h;
  }

  function buildBody() {
    var body = el("div", "rc-body");

    // ---- timeline column ----
    var main = el("div", "rc-main");
    var bar = el("div", "rc-main-bar");
    bar.innerHTML = '<h2>Chronology · ' + EVENTS.length + ' events</h2>' +
      '<button class="rc-textbtn rc-allbtn" id="rc-toggleall">' + ico("i-expand") + '<span>Expand all</span></button>';
    main.appendChild(bar);

    var ul = el("ul", "rc-timeline");
    ul.id = "rc-timeline";
    var lastDay = null;
    EVENTS.forEach(function (e) {
      var d = e.__d;
      var newDay = d ? dayKey(d) : null;
      ul.appendChild(buildEvent(e, newDay && newDay !== lastDay));
      if (newDay) lastDay = newDay;
    });
    main.appendChild(ul);

    var empty = el("li", "rc-empty");      // sits after the list (block-level via show-empty)
    empty.innerHTML = ico("i-filter") + '<span>No events match the current filters — clear a chip to see more.</span>';
    main.appendChild(empty);

    body.appendChild(main);
    body.appendChild(buildRail());
    return body;
  }

  // map an event to a phase tag if it is THE detected / resolved / mitigated node
  function phaseOf(e) {
    if (resolvedTs && e.ts === resolvedTs) return "resolved";
    if (detectedTs && e.ts === detectedTs) return "detected";
    if (mitigatedTs && e.ts === mitigatedTs) return "mitigated";
    return null;
  }
  var PHASEMETA = {
    detected:{ t:"Detected", icon:"i-flag", from:"start" },
    mitigated:{ t:"Mitigated", icon:"i-flag", from:"start" },
    resolved:{ t:"Resolved", icon:"i-check-circle", from:"start" }
  };

  function buildEvent(e, showDay) {
    var li = el("li", "rc-event");
    var k = KIND[e.kind] || { t:e.kind, icon:"i-alert" };
    var ph = phaseOf(e);
    li.dataset.kind = e.kind;
    if (e.severity) li.dataset.sev = e.severity;
    li.dataset.actor = e.actor;
    li.dataset.open = "false";
    li.dataset.id = "ev-" + e.__i;
    var hasDetail = !!(e.detail || e.command);
    if (ph) { li.classList.add("is-phase"); li.dataset.phase = ph; li.id = "phase-" + ph; }

    var d = e.__d;
    var clock = d ? clockOf(d) : "—";
    var since = d ? "+" + sinceStart(d) : "";
    var dayHtml = (showDay && d) ? '<div class="rc-daytag">' + esc(dayTag(d)) + '</div>' : "";

    // node icon: phase uses the phase icon, else kind icon
    var nodeIcon = ph ? PHASEMETA[ph].icon : k.icon;

    // tags row
    var tags = "";
    if (ph) {
      var pm = PHASEMETA[ph];
      var dur = (d && parse(inc.start)) ? durStr(d - parse(inc.start)) : "—";
      tags += '<span class="rc-phasebadge">' + ico(pm.icon) + esc(pm.t) + '</span>' +
              '<span class="rc-phasedur">+' + dur + ' from impact start</span>';
    } else {
      tags += '<span class="rc-kind">' + esc(k.t) + '</span>';
    }
    var act = actorMap[e.actor];
    if (act) tags += '<span class="rc-actor">' + ico(ACTORICON[act.kind || "person"] || "i-user") + esc(act.label) + '</span>';
    if (e.severity && !ph) { var sv = SEV[e.severity]; if (sv) tags += '<span class="rc-evsev ' + sv.c + '">' + sv.t + '</span>'; }
    if (e.ref && e.ref.label) tags += '<span class="rc-ref">' + ico("i-link") + esc(e.ref.label) + '</span>';

    var detail = "";
    if (hasDetail) {
      detail = '<div class="rc-detail">' +
        (e.detail ? '<p>' + md(e.detail) + '</p>' : "") +
        (e.command ? '<div class="rc-cmd"><pre>' + esc(e.command) + '</pre></div>' : "") +
        '</div>';
    }

    li.innerHTML =
      '<div class="rc-when"><div class="rc-clock">' + esc(clock) + '</div><div class="rc-since">' + esc(since) + '</div>' + dayHtml + '</div>' +
      '<div class="rc-node">' + ico(nodeIcon) + '</div>' +
      '<div class="rc-card">' +
        '<div class="rc-card-hd"' + (hasDetail ? ' role="button" tabindex="0" aria-expanded="false"' : "") + '>' +
          '<div class="rc-card-main">' +
            '<div class="rc-tags">' + tags + '</div>' +
            '<div class="rc-evtitle">' + md(e.title) + '</div>' +
          '</div>' +
          (hasDetail ? '<span class="rc-caret">' + ico("i-chevron") + '</span>' : "") +
        '</div>' +
        detail +
      '</div>';

    // expand on header click / keyboard
    if (hasDetail) {
      var hd = li.querySelector(".rc-card-hd");
      hd.addEventListener("click", function () { toggleEvent(li); });
      hd.addEventListener("keydown", function (ev) { if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); toggleEvent(li); } });
    }
    // hover tooltip → exact iso ts + +Nm since start
    var card = li.querySelector(".rc-card");
    card.addEventListener("mouseenter", function () { showTip(card, isoOf(e.ts), since); });
    card.addEventListener("mousemove", moveTip);
    card.addEventListener("mouseleave", hideTip);

    return li;
  }

  function toggleEvent(li) {
    var open = li.dataset.open === "true";
    li.dataset.open = open ? "false" : "true";
    var hd = li.querySelector(".rc-card-hd"); if (hd) hd.setAttribute("aria-expanded", String(!open));
  }

  // ---- rail ----
  function buildRail() {
    var rail = el("aside", "rc-rail");
    rail.setAttribute("aria-label", "Incident summary and filters");

    // --- live MTTR card (computed from incident times) ---
    var s = parse(inc.start), det = parse(inc.detected), mit = parse(inc.mitigated), res = parse(inc.resolved);
    var ttd = (s && det) ? det - s : null;
    var ttm = (s && mit) ? mit - s : null;
    var mttr = (s && res) ? res - s : null;
    // proportional phase bar segments: detect = start→detected, mitig = detected→mitigated, resolve = mitigated→resolved
    var segD = (s && det) ? det - s : 0;
    var segM = (det && mit) ? mit - det : 0;
    var segR = (mit && res) ? res - mit : 0;
    var tot = segD + segM + segR || 1;
    function pct(x) { return (x / tot * 100).toFixed(2); }

    var mttrCard = el("div", "rc-rcard");
    mttrCard.innerHTML =
      '<div class="rc-rcard-hd">' + ico("i-stopwatch") + 'Time to respond · live from data</div>' +
      '<div class="rc-mttr">' +
        '<div class="rc-mttr-tiles">' +
          '<div class="rc-tile t-detect' + (ttd==null?" is-empty":"") + '"><div class="tl">Detect</div><div class="tv">' + durStr(ttd) + '</div></div>' +
          '<div class="rc-tile t-mitig' + (ttm==null?" is-empty":"") + '"><div class="tl">Mitigate</div><div class="tv">' + durStr(ttm) + '</div></div>' +
          '<div class="rc-tile t-resolve' + (mttr==null?" is-empty":"") + '"><div class="tl">MTTR</div><div class="tv">' + durStr(mttr) + '</div></div>' +
        '</div>' +
        '<div class="rc-phasebar" aria-hidden="true">' +
          '<span class="seg-detect" style="width:' + pct(segD) + '%" title="detect"></span>' +
          '<span class="seg-mitig" style="width:' + pct(segM) + '%" title="contain"></span>' +
          '<span class="seg-resolve" style="width:' + pct(segR) + '%" title="recover"></span>' +
        '</div>' +
        '<div class="rc-phasebar-key"><b><span class="sw d"></span>Detect ' + durStr(segD) + '</b><b><span class="sw m"></span>Contain ' + durStr(segM) + '</b><b><span class="sw r"></span>Recover ' + durStr(segR) + '</b></div>' +
      '</div>';
    rail.appendChild(mttrCard);

    // --- phase jump ---
    var jump = el("div", "rc-rcard");
    function jumpRow(phase) {
      var meta = PHASEMETA[phase];
      var ts = phase === "detected" ? detectedTs : phase === "mitigated" ? mitigatedTs : resolvedTs;
      var d = parse(ts);
      var present = !!d;
      return '<li><button type="button" data-phase="' + phase + '"' + (present ? "" : " disabled") + '>' +
        '<span class="ji">' + ico(meta.icon) + '</span>' +
        '<span class="jt">' + meta.t + '</span>' +
        '<span class="jat">' + (present ? clockOf(d) + " · +" + durStr(d - parse(inc.start)) : "—") + '</span>' +
        '</button></li>';
    }
    jump.innerHTML =
      '<div class="rc-rcard-hd">' + ico("i-flag") + 'Jump to phase</div>' +
      '<ul class="rc-jumps">' + jumpRow("detected") + jumpRow("mitigated") + jumpRow("resolved") + '</ul>';
    rail.appendChild(jump);

    // --- filters (actor / kind / severity) ---
    var usedKinds = {}; EVENTS.forEach(function (e) { usedKinds[e.kind] = 1; });
    var usedSev = {}; EVENTS.forEach(function (e) { if (e.severity) usedSev[e.severity] = 1; });

    function chip(facet, val, label, icon) {
      return '<button class="rc-chip" data-facet="' + facet + '" data-val="' + esc(val) + '" type="button">' +
        (icon ? ico(icon) : "") + esc(label) + '</button>';
    }
    var actorChips = (DATA.actors || []).map(function (a) { return chip("actor", a.key, a.label, ACTORICON[a.kind || "person"] || "i-user"); }).join("");
    var kindOrder = ["detect","action","comms","escalation","decision","resolve"];
    var kindChips = kindOrder.filter(function (k) { return usedKinds[k]; }).map(function (k) { return chip("kind", k, KIND[k].t, KIND[k].icon); }).join("");
    var sevOrder = ["sev1","sev2","sev3","info"];
    var sevChips = sevOrder.filter(function (s2) { return usedSev[s2]; }).map(function (s2) { return chip("sev", s2, SEV[s2].t, null); }).join("");

    var filt = el("div", "rc-rcard");
    filt.innerHTML =
      '<div class="rc-rcard-hd">' + ico("i-filter") + 'Filter events<button class="rc-clearbtn" id="rc-clear" type="button">' + ico("i-close") + 'Clear</button></div>' +
      '<div class="rc-filters">' +
        '<div class="rc-facet"><span class="fl">Actor</span><div class="rc-chiprow">' + actorChips + '</div></div>' +
        '<div class="rc-facet"><span class="fl">Kind</span><div class="rc-chiprow">' + kindChips + '</div></div>' +
        (sevChips ? '<div class="rc-facet"><span class="fl">Severity</span><div class="rc-chiprow">' + sevChips + '</div></div>' : "") +
      '</div>';
    rail.appendChild(filt);

    // --- density toggle ---
    var dens = el("div", "rc-rcard");
    dens.innerHTML =
      '<div class="rc-rcard-hd">' + ico("i-density") + 'Density</div>' +
      '<div class="rc-density"><label class="rc-toggle"><span>Compact spacing</span>' +
        '<button class="rc-switch" id="rc-density-sw" type="button" aria-pressed="false" aria-label="Toggle compact density"></button></label></div>';
    rail.appendChild(dens);

    return rail;
  }

  function buildFactors() {
    var wrap = el("section", "rc-factors");
    if (!DATA.factors || !DATA.factors.length) { wrap.style.display = "none"; return wrap; }
    var KINDLBL = { cause:"Contributing cause", gap:"Control gap", trigger:"Proximate trigger" };
    var cards = DATA.factors.map(function (f) {
      var kind = f.kind || "cause";
      return '<div class="rc-factor" data-kind="' + esc(kind) + '">' +
        '<div class="ficon">' + ico(FACTORICON[kind] || "i-cause") + '</div>' +
        '<div class="ftext"><div class="fkind">' + esc(KINDLBL[kind] || kind) + '</div>' +
          '<div class="flabel">' + md(f.label) + '</div>' +
          '<div class="fdetail">' + md(f.detail) + '</div></div>' +
      '</div>';
    }).join("");
    wrap.innerHTML =
      '<div class="rc-factors-hd">' + ico("i-rca") + '<h2>Contributing factors</h2><span class="lbl">' + DATA.factors.length + ' factors · what went wrong</span></div>' +
      '<div class="rc-factors-grid">' + cards + '</div>';
    return wrap;
  }

  // ---- filtering ----
  function anyActive() { return filters.actor.size || filters.kind.size || filters.sev.size; }
  function applyFilters() {
    var shown = 0;
    EVENTS.forEach(function (e) {
      var li = root.querySelector('.rc-event[data-id="ev-' + e.__i + '"]');
      if (!li) return;
      var okA = !filters.actor.size || filters.actor.has(e.actor);
      var okK = !filters.kind.size || filters.kind.has(e.kind);
      var okS = !filters.sev.size || (e.severity && filters.sev.has(e.severity));
      var visible = okA && okK && okS;
      li.classList.toggle("is-hidden", !visible);
      if (visible) shown++;
    });
    document.body.classList.toggle("show-empty", anyActive() && shown === 0);
  }

  // ---- tooltip ----
  var tip = null;
  function ensureTip() { if (!tip) { tip = el("div", "rc-tip"); document.body.appendChild(tip); } return tip; }
  function showTip(node, iso, since) {
    var t = ensureTip();
    t.innerHTML = '<span class="tts">' + esc(iso) + '</span>' + (since ? '<br><span class="tsince">' + esc(since) + ' since impact start</span>' : "");
    t.classList.add("is-on");
  }
  function moveTip(ev) {
    if (!tip) return;
    var x = ev.clientX + 14, y = ev.clientY + 16;
    var w = tip.offsetWidth, h = tip.offsetHeight;
    if (x + w > window.innerWidth - 8) x = ev.clientX - w - 14;
    if (y + h > window.innerHeight - 8) y = ev.clientY - h - 16;
    tip.style.left = x + "px"; tip.style.top = y + "px";
  }
  function hideTip() { if (tip) tip.classList.remove("is-on"); }

  // ---- global interactions ----
  function wireInteractions() {
    document.addEventListener("click", function (e) {
      var t = e.target.closest ? e.target.closest(".rc-chip, #rc-clear, #rc-toggleall, .rc-density-sw, #rc-density-sw, .rc-jumps button") : null;
      if (!t) return;

      // filter chip
      if (t.classList.contains("rc-chip")) {
        var f = t.dataset.facet, v = t.dataset.val, set = filters[f];
        if (set.has(v)) set.delete(v); else set.add(v);
        t.classList.toggle("is-on", set.has(v));
        applyFilters();
        return;
      }
      // clear filters
      if (t.id === "rc-clear") {
        filters.actor.clear(); filters.kind.clear(); filters.sev.clear();
        root.querySelectorAll(".rc-chip.is-on").forEach(function (c) { c.classList.remove("is-on"); });
        applyFilters();
        return;
      }
      // expand / collapse all
      if (t.id === "rc-toggleall") {
        var anyClosed = !!root.querySelector('.rc-event[data-open="false"] .rc-detail');
        // determine current state from any expandable event
        var firstOpen = root.querySelector('.rc-event[data-open="true"]');
        var open = !firstOpen;            // if none open → open all
        root.querySelectorAll(".rc-event").forEach(function (li) {
          if (!li.querySelector(".rc-detail")) return;
          li.dataset.open = open ? "true" : "false";
          var hd = li.querySelector(".rc-card-hd"); if (hd) hd.setAttribute("aria-expanded", String(open));
        });
        var sp = t.querySelector("span"); if (sp) sp.textContent = open ? "Collapse all" : "Expand all";
        return;
      }
      // density toggle
      if (t.id === "rc-density-sw") {
        var on = t.getAttribute("aria-pressed") !== "true";
        t.setAttribute("aria-pressed", String(on));
        document.body.classList.toggle("is-compact", on);
        return;
      }
      // phase jump
      if (t.closest && t.closest(".rc-jumps")) {
        var phase = t.dataset.phase;
        var target = document.getElementById("phase-" + phase);
        if (target) {
          target.scrollIntoView({ behavior: "smooth", block: "center" });
          target.classList.remove("is-pulse"); void target.offsetWidth; target.classList.add("is-pulse");
          if (target.querySelector(".rc-detail")) { target.dataset.open = "true"; var hd = target.querySelector(".rc-card-hd"); if (hd) hd.setAttribute("aria-expanded", "true"); }
        }
        return;
      }
    });
  }

  // ---- theme switch (canonical dropdown) ----
  function wireThemeSwitch() {
    var rcSel = document.querySelector('.rc-theme-sel');
    if (rcSel) {
      rcSel.value = document.documentElement.dataset.theme || 'plum';
      rcSel.addEventListener('change', function () {
        document.documentElement.dataset.theme = rcSel.value;
      });
    }
  }

  // ---- boot ----
  function boot() { render(); wireInteractions(); }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();
</script>

</body>
</html>
