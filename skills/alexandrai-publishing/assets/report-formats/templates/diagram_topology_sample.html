<!doctype html>
<html lang="en" data-theme="purple">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>AlexandrAI Report</title>
<style>
/* ============================================================
   SHARED FOUNDATION TOKENS  (per _FOUNDATION.md §1)
   :root = Purple default; data-theme overrides swap 7 values.
   This document ships data-theme="purple" (its default).
   ============================================================ */
:root{
  /* surfaces */
  --bg:#fff; --bg-band:#f6f6f8; --bg-subtle:#fafafb; --bg-deep:#15131a;
  --rule:#dcdce2; --rule-soft:#ebebef;
  /* ink */
  --ink:#11131a; --ink-mid:#33363f; --ink-soft:#5a5e68; --ink-faint:#868b95;
  /* brand accent (Purple default) */
  --navy:#a100ff; --navy-deep:#7a00c2; --navy-bg:#f3e8ff; --navy-line:#d9bef5;
  /* cleared / approved */
  --ok:#5a2f8a; --ok-bg:#efe8f5; --ok-line:#d0b5e0;
  /* semantic states — CONSTANT across all themes */
  --risk:#b3261e; --risk-bg:#fbeceb; --risk-line:#edc7c4;
  --hold:#8a6d00; --hold-bg:#fbf3da; --hold-line:#e7d8a4;
  /* type stacks */
  --mono:ui-monospace,"JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;
  --sans:-apple-system,"Segoe UI",system-ui,Roboto,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Apple SD Gothic Neo","Malgun Gothic","PingFang SC","Microsoft YaHei","Noto Sans CJK JP","Noto Sans CJK KR","Noto Sans CJK SC","Noto Sans JP","Noto Sans KR","Noto Sans SC","Noto Sans",sans-serif;
}
html[data-theme="blue"]{ --navy:#0b5fd4; --navy-deep:#0842a0; --navy-bg:#e8f1fc; --navy-line:#bcd6f5; --ok:#1a4f9c; --ok-bg:#e9f0fa; --ok-line:#b7cdea; }
html[data-theme="purple"]{ --navy:#a100ff; --navy-deep:#7a00c2; --navy-bg:#f3e8ff; --navy-line:#d9bef5; --ok:#5a2f8a; --ok-bg:#efe8f5; --ok-line:#d0b5e0; }
html[data-theme="indigo"]{ --navy:#4338ca; --navy-deep:#312c92; --navy-bg:#ebebfb; --navy-line:#c7c3f0; --ok:#3730a3; --ok-bg:#ebeaf7; --ok-line:#c5c2ea; }
html[data-theme="teal"]{ --navy:#0e7c86; --navy-deep:#095861; --navy-bg:#e0f3f4; --navy-line:#a9dade; --ok:#0f5d54; --ok-bg:#e3f3ef; --ok-line:#b3ddd4; }
html[data-theme="cyan"]{ --navy:#0891b2; --navy-deep:#0e6f88; --navy-bg:#e2f4f9; --navy-line:#abdde9; --ok:#0e6b7a; --ok-bg:#e4f3f4; --ok-line:#b0dde2; }
html[data-theme="green"]{ --navy:#1f7a44; --navy-deep:#155730; --navy-bg:#e6f4ea; --navy-line:#b3dcc1; --ok:#2f6b3c; --ok-bg:#e9f3ea; --ok-line:#bedcc4; }
html[data-theme="plum"]{ --navy:#a21d6e; --navy-deep:#7c1450; --navy-bg:#fbe8f2; --navy-line:#e8b9d4; --ok:#6d2356; --ok-bg:#f6e8f0; --ok-line:#e3bcd5; }
html[data-theme="slate"]{ --navy:#3f4f63; --navy-deep:#29384b; --navy-bg:#eef1f5; --navy-line:#c2ccd8; --ok:#34495e; --ok-bg:#eef1f5; --ok-line:#c2ccd8; }
html[data-theme="black"]{ --navy:#000000; --navy-deep:#000; --navy-bg:#f1f1f3; --navy-line:#d6d6db; --ok:#3f3f46; --ok-bg:#f1f1f3; --ok-line:#cfcfd6; }

*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; }
body{
  font:13px/1.6 var(--sans); color:var(--ink); background:var(--bg-band);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow:hidden;
}
h1,h2,h3,h4,p{ margin:0; }
.tnum{ font-feature-settings:"tnum" 1; }
.mono{ font-family:var(--mono); }
button{ font-family:inherit; }

/* icon sizing (house SVGs, currentColor) */
.icon{ width:1.15em; height:1.15em; display:inline-block; vertical-align:-.18em; color:inherit; }
.icon-sm{ width:14px; height:14px; }
.icon-lg{ width:18px; height:18px; }

/* ---- shared primitives ---- */
.st-badge{
  display:inline-flex; align-items:center; gap:6px; font:600 10.5px/1 var(--mono);
  letter-spacing:.04em; text-transform:uppercase; padding:4px 8px 4px 7px;
  border:1px solid var(--rule); border-radius:6px; background:var(--bg); white-space:nowrap;
}
.st-badge::before{ content:""; width:7px; height:7px; border-radius:50%; background:var(--ink-faint); }
.st-ok{ color:var(--ok); border-color:var(--ok-line); background:var(--ok-bg); }
.st-ok::before{ background:var(--ok); }
.st-risk{ color:var(--risk); border-color:var(--risk-line); background:var(--risk-bg); }
.st-risk::before{ background:var(--risk); }
.st-hold{ color:var(--hold); border-color:var(--hold-line); background:var(--hold-bg); }
.st-hold::before{ background:var(--hold); }
.st-neutral{ color:var(--ink-soft); }
.mini-dot{ display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--ink-faint); flex:none; }
.mini-dot.is-ok{ background:var(--ok); } .mini-dot.is-risk{ background:var(--risk); }
.mini-dot.is-hold{ background:var(--hold); } .mini-dot.is-neutral{ background:var(--ink-faint); }
.chip{
  display:inline-flex; align-items:center; gap:5px; font:500 11px/1 var(--mono); letter-spacing:.02em;
  color:var(--navy-deep); background:var(--navy-bg); border:1px solid var(--navy-line);
  border-radius:6px; padding:5px 8px; white-space:nowrap;
}

/* ============================================================
   TOPOLOGY APP SHELL  (the distinct format silhouette)
   100vw × 100vh: bar row, then [ layer-panel | stage | info-panel ]
   ============================================================ */
.topo{
  width:100vw; height:100vh; display:grid;
  grid-template-rows:auto 1fr;
  grid-template-columns:230px 1fr 300px;
  grid-template-areas:"bar bar bar" "left stage right";
}

/* ---- top app bar ---- */
.topo-bar{
  grid-area:bar; display:flex; align-items:center; gap:18px;
  padding:10px 18px; background:var(--bg); border-bottom:1px solid var(--rule);
  box-shadow:0 1px 3px rgba(17,19,26,.05); z-index:30; min-width:0;
}
.tb-id{ display:flex; align-items:center; gap:11px; min-width:0; }
.tb-mark{ width:30px; height:30px; border-radius:8px; background:var(--navy); color:#fff;
  display:inline-flex; align-items:center; justify-content:center; flex:none; }
.tb-mark svg{ width:19px; height:19px; }
.tb-titles{ min-width:0; }
.tb-eyebrow{ font:600 9.5px/1 var(--mono); letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:3px; }
.tb-title{ font:800 15px/1.15 var(--sans); letter-spacing:-.01em; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tb-title b{ color:var(--navy-deep); font-weight:800; }

.type-legend{ display:flex; flex-wrap:wrap; gap:6px; margin-left:6px; min-width:0; }
.legend-chip{
  display:inline-flex; align-items:center; gap:6px; font:600 10px/1 var(--mono); letter-spacing:.03em;
  color:var(--ink-mid); background:var(--bg-subtle); border:1px solid var(--rule);
  border-radius:6px; padding:4px 8px; white-space:nowrap;
}
.legend-chip .swatch{ width:13px; height:13px; flex:none; color:var(--navy); display:inline-flex; }
.legend-chip .swatch svg{ width:13px; height:13px; }

.tb-right{ margin-left:auto; display:flex; align-items:center; gap:16px; flex:none; }

/* ---- node search (find + centre a node) ---- */
.node-search{ position:relative; flex:none; }
.node-search .ns-ico{ position:absolute; left:9px; top:50%; transform:translateY(-50%);
  color:var(--ink-faint); display:inline-flex; pointer-events:none; }
.node-search .ns-ico svg{ width:14px; height:14px; }
.node-search input{
  width:188px; font:600 12px/1 var(--sans); color:var(--ink); background:var(--bg-subtle);
  border:1px solid var(--rule); border-radius:8px; padding:7px 26px 7px 28px; outline:none;
  transition:border-color .12s, background .12s, box-shadow .12s;
}
.node-search input::placeholder{ color:var(--ink-faint); font-weight:500; }
.node-search input:focus{ border-color:var(--navy-line); background:var(--bg); box-shadow:0 0 0 3px var(--navy-bg); }
.node-search .ns-clear{ position:absolute; right:6px; top:50%; transform:translateY(-50%);
  width:18px; height:18px; border:0; border-radius:5px; background:transparent; color:var(--ink-faint);
  cursor:pointer; display:none; align-items:center; justify-content:center; padding:0; font:700 13px/1 var(--sans); }
.node-search.has-text .ns-clear{ display:inline-flex; }
.node-search .ns-clear:hover{ background:var(--navy-bg); color:var(--navy-deep); }
.node-search .ns-results{
  position:absolute; top:calc(100% + 5px); left:0; right:0; z-index:40;
  background:var(--bg); border:1px solid var(--rule); border-radius:9px; padding:4px;
  box-shadow:0 6px 20px rgba(17,19,26,.16); max-height:280px; overflow:auto; display:none;
}
.node-search.open .ns-results{ display:block; }
.ns-opt{ display:flex; align-items:center; gap:8px; width:100%; text-align:left; cursor:pointer;
  background:transparent; border:0; border-radius:6px; padding:6px 8px; }
.ns-opt:hover, .ns-opt.active{ background:var(--navy-bg); }
.ns-opt .nso-ico{ width:22px; height:22px; border-radius:6px; flex:none; display:inline-flex;
  align-items:center; justify-content:center; background:var(--navy-bg); color:var(--navy-deep); }
.ns-opt .nso-ico svg{ width:14px; height:14px; }
.ns-opt .nso-body{ flex:1; min-width:0; display:flex; flex-direction:column; }
.ns-opt .nso-name{ display:block; font:700 11.5px/1.2 var(--sans); color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ns-opt .nso-name b{ color:var(--navy-deep); background:var(--navy-bg); }
.ns-opt .nso-sub{ display:block; font:600 9px/1.2 var(--mono); letter-spacing:.05em; text-transform:uppercase; color:var(--ink-faint); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ns-opt .nso-dot{ width:8px; height:8px; border-radius:50%; flex:none; background:var(--ink-faint); }
.ns-opt .nso-dot.is-ok{ background:var(--ok); } .ns-opt .nso-dot.is-risk{ background:var(--risk); }
.ns-opt .nso-dot.is-hold{ background:var(--hold); } .ns-opt .nso-dot.is-neutral{ background:var(--ink-faint); }
.ns-none{ padding:9px 10px; font:600 11px/1.3 var(--sans); color:var(--ink-faint); }
@media print{ .node-search{ display:none; } }
.asof{ font:600 10px/1.4 var(--mono); letter-spacing:.05em; text-transform:uppercase; color:var(--ink-soft); text-align:right; white-space:nowrap; }
.rc-theme{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--rule);border-radius:7px;padding:3px 4px 3px 7px;background:var(--bg);}
.rc-theme-sw{width:12px;height:12px;border-radius:50%;background:var(--navy);box-shadow:0 0 0 1px var(--rule);flex:none;}
.rc-theme-sel{border:0;background:none;font:600 11px/1 var(--mono);color:var(--ink-mid);cursor:pointer;outline:none;padding:2px;}
@media print{.rc-theme{display:none;}}

/* ============================================================
   SIDE PANELS (layer/type filter left, info right)
   ============================================================ */
.side{
  background:var(--bg); display:flex; flex-direction:column; min-height:0;
  overflow:auto;
}
.layer-panel{ grid-area:left; border-right:1px solid var(--rule); }
.info-panel{ grid-area:right; border-left:1px solid var(--rule); }

.panel-group{ padding:14px 14px 12px; border-bottom:1px solid var(--rule-soft); }
.group-label{
  display:flex; align-items:center; gap:7px; font:700 9.5px/1 var(--mono); letter-spacing:.1em;
  text-transform:uppercase; color:var(--ink-faint); margin-bottom:10px;
}
.group-label .gl-ico{ color:var(--navy); display:inline-flex; }
.group-label .gl-n{ margin-left:auto; color:var(--ink-faint); }

.toggle-list{ display:flex; flex-direction:column; gap:6px; }
.toggle-chip{
  display:flex; align-items:center; gap:8px; width:100%; text-align:left; cursor:pointer;
  font:600 11.5px/1.1 var(--sans); color:var(--ink-mid);
  background:var(--bg); border:1px solid var(--rule); border-radius:8px; padding:7px 9px;
  transition:background .12s, border-color .12s, opacity .12s;
}
.toggle-chip:hover{ border-color:var(--navy-line); background:var(--navy-bg); }
.toggle-chip .tc-swatch{ width:15px; height:15px; flex:none; color:var(--navy); display:inline-flex; }
.toggle-chip .tc-swatch svg{ width:15px; height:15px; }
.toggle-chip .tc-label{ flex:1; min-width:0; }
.toggle-chip .tc-n{ font:700 10px/1 var(--mono); color:var(--ink-faint); flex:none; }
.toggle-chip .tc-box{ width:15px; height:15px; border-radius:4px; border:1.5px solid var(--rule);
  flex:none; display:inline-flex; align-items:center; justify-content:center; color:#fff; background:var(--bg); }
.toggle-chip[aria-pressed="true"] .tc-box{ background:var(--navy); border-color:var(--navy); }
.toggle-chip[aria-pressed="true"] .tc-box svg{ width:11px; height:11px; }
.toggle-chip[aria-pressed="false"]{ opacity:.5; }
.toggle-chip[aria-pressed="false"] .tc-box svg{ display:none; }

/* status legend block */
.leg-rows{ display:flex; flex-direction:column; gap:7px; }
.leg-row{ display:flex; align-items:center; gap:8px; font:600 11px/1.1 var(--sans); color:var(--ink-mid); }
.leg-row .ek{ width:26px; height:0; flex:none; }
.leg-row .ek.sync{ border-top:2px solid var(--navy); }
.leg-row .ek.async{ border-top:2px dashed var(--navy); }
.leg-row .ek.data{ border-top:3.5px solid var(--ink-soft); }
.leg-row .ek.dep{ border-top:2px dotted var(--ink-soft); }

/* ---- info panel (selected node) ---- */
.info-empty{ padding:22px 16px; color:var(--ink-soft); font-size:12px; line-height:1.55; }
.info-empty .ie-ico{ color:var(--navy-line); display:block; margin-bottom:10px; }
.info-empty .ie-ico svg{ width:34px; height:34px; }
.info-empty b{ color:var(--ink-mid); font-weight:700; }

.info-card{ padding:0; display:none; }
.info-card.show{ display:block; }
.info-head{ padding:14px 16px 12px; border-bottom:1px solid var(--rule-soft); }
.info-head .ih-type{ font:700 9.5px/1 var(--mono); letter-spacing:.1em; text-transform:uppercase; color:var(--navy-deep); margin-bottom:7px; display:flex; align-items:center; gap:6px; }
.info-head .ih-type .iht-ico{ color:var(--navy); display:inline-flex; }
.info-head .ih-title{ font:800 16px/1.2 var(--sans); letter-spacing:-.01em; color:var(--ink); margin-bottom:9px; }
.info-chips{ display:flex; flex-wrap:wrap; gap:6px; }

.kv-grid{ padding:12px 16px; display:grid; grid-template-columns:1fr 1fr; gap:0; border-bottom:1px solid var(--rule-soft); }
.kv{ padding:7px 10px 7px 0; border-bottom:1px solid var(--rule-soft); }
.kv:nth-child(odd){ border-right:1px solid var(--rule-soft); padding-right:12px; }
.kv:nth-child(even){ padding-left:12px; }
.kv-grid .kv:nth-last-child(-n+2){ border-bottom:0; }
.kv .k{ font:700 9px/1.1 var(--mono); letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:3px; }
.kv .v{ font:600 12px/1.35 var(--sans); color:var(--ink); word-break:break-word; }
.kv.wide{ grid-column:1 / -1; border-right:0; padding-left:0; padding-right:0; }

.nb-wrap{ padding:13px 16px 18px; }
.nb-label{ font:700 9.5px/1 var(--mono); letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:10px; display:flex; align-items:center; gap:7px; }
.nb-label .nb-n{ margin-left:auto; color:var(--ink-faint); }
.neighbour-list{ display:flex; flex-direction:column; gap:6px; }
.nb{
  display:flex; align-items:center; gap:8px; width:100%; text-align:left; cursor:pointer;
  background:var(--bg-subtle); border:1px solid var(--rule); border-radius:8px; padding:7px 9px;
  transition:border-color .12s, background .12s;
}
.nb:hover{ border-color:var(--navy-line); background:var(--navy-bg); }
.nb .nb-dir{ color:var(--ink-faint); display:inline-flex; flex:none; }
.nb .nb-dir.out{ color:var(--navy); }
.nb .nb-body{ flex:1; min-width:0; display:flex; flex-direction:column; }
.nb .nb-name{ display:block; font:700 11.5px/1.2 var(--sans); color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.nb .nb-edge{ display:block; font:600 9.5px/1.2 var(--mono); letter-spacing:.03em; color:var(--ink-soft); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.nb .nb-kind{ font:700 8.5px/1 var(--mono); letter-spacing:.06em; text-transform:uppercase; color:var(--navy-deep);
  background:var(--navy-bg); border:1px solid var(--navy-line); border-radius:4px; padding:3px 5px; flex:none; }

/* ============================================================
   THE STAGE  (full-bleed pannable / zoomable viewport)
   ============================================================ */
.stage{
  grid-area:stage; position:relative; overflow:hidden; cursor:grab;
  background:
    radial-gradient(circle, var(--rule) 1px, transparent 1.4px) 0 0 / 26px 26px,
    var(--bg-band);
  user-select:none; -webkit-user-select:none;
}
.stage.is-panning{ cursor:grabbing; }
.stage:fullscreen{ background:
    radial-gradient(circle, var(--rule) 1px, transparent 1.4px) 0 0 / 26px 26px,
    var(--bg-band); }

.stage-world{
  position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform;
}

/* edge SVG fills the world box exactly */
svg.edges{ position:absolute; top:0; left:0; overflow:visible; pointer-events:none; }
path.edge{
  fill:none; stroke:var(--ink-soft); stroke-width:1.6; stroke-linecap:round;
  transition:stroke .14s, stroke-width .14s, opacity .14s;
}
path.edge[data-kind="async"]{ stroke-dasharray:6 5; }
path.edge[data-kind="data"]{ stroke-width:3.4; opacity:.85; }
path.edge[data-kind="dep"]{ stroke-dasharray:1.5 5; stroke-width:1.6; opacity:.8; }
path.edge.hot{ stroke:var(--navy); stroke-width:2.6; opacity:1; marker-end:url(#ah-hot); }
path.edge[data-kind="data"].hot{ stroke-width:4.2; }
path.edge.dim{ opacity:.12; }

/* hover hit-area (wide, transparent, catches pointer over thin lines) */
path.edge-hit{ fill:none; stroke:transparent; stroke-width:16; cursor:pointer; pointer-events:stroke; }

/* edge label pill (a <g>): hidden until hover / relevant */
g.edge-label{ opacity:0; transition:opacity .14s; pointer-events:none; }
g.edge-label.show{ opacity:1; }
g.edge-label rect{ fill:var(--bg); stroke:var(--navy-line); rx:5; }
g.edge-label text{ font:600 10px var(--mono); fill:var(--navy-deep); letter-spacing:.02em; }

/* arrowheads — explicit SVG markers filled from theme tokens (no context-stroke,
   which silently renders nothing where unsupported, killing directionality) */
#topo-svg-defs{ position:absolute; width:0; height:0; }
marker#ah path{ fill:var(--ink-soft); }
marker#ah-hot path{ fill:var(--navy); }

/* ---- node card (absolutely positioned by x/y) ---- */
.node{
  position:absolute; transform:translate(-50%,-50%);
  display:flex; align-items:center; gap:8px; cursor:pointer;
  background:var(--bg); border:1px solid var(--rule); border-radius:11px;
  padding:8px 11px 8px 9px; box-shadow:0 1px 3px rgba(17,19,26,.10);
  min-width:118px; max-width:190px;
  transition:opacity .14s, box-shadow .14s, border-color .14s, transform .04s;
  z-index:5;
}
.node:hover{ box-shadow:0 3px 10px rgba(17,19,26,.15); border-color:var(--navy-line); }
.node .node-ico{ width:30px; height:30px; border-radius:8px; flex:none;
  display:inline-flex; align-items:center; justify-content:center;
  background:var(--navy-bg); color:var(--navy-deep); }
.node .node-ico svg{ width:18px; height:18px; }
.node .node-main{ min-width:0; display:flex; flex-direction:column; }
.node .node-label{ display:block; font:700 12.5px/1.2 var(--sans); color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.node .node-type{ display:block; font:600 9px/1.1 var(--mono); letter-spacing:.07em; text-transform:uppercase; color:var(--ink-faint); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.node .node-status{ width:9px; height:9px; border-radius:50%; flex:none; background:var(--ink-faint); align-self:flex-start; margin-top:1px; }
.node .node-status.is-ok{ background:var(--ok); } .node .node-status.is-risk{ background:var(--risk); }
.node .node-status.is-hold{ background:var(--hold); } .node .node-status.is-neutral{ background:var(--ink-faint); }
/* status accent on the node card left edge */
.node.s-ok{ border-left:3px solid var(--ok); } .node.s-risk{ border-left:3px solid var(--risk); }
.node.s-hold{ border-left:3px solid var(--hold); } .node.s-neutral{ border-left:3px solid var(--rule); }

.node.is-selected{ border-color:var(--navy); box-shadow:0 0 0 3px var(--navy-bg), 0 4px 14px rgba(17,19,26,.18); z-index:9; }
.node.is-selected .node-ico{ background:var(--navy); color:#fff; }
.node.is-neighbour{ border-color:var(--navy-line); z-index:7; }
/* multi-hop reachable (blast-radius) nodes beyond the direct neighbours */
.node.is-reach{ border-color:var(--navy-line); z-index:6; box-shadow:0 0 0 2px var(--navy-bg), 0 1px 4px rgba(17,19,26,.10); }
.node.is-dim{ opacity:.22; }
.node.hidden{ display:none; }
/* a brief pulse used when search centres a node */
@keyframes nodePulse{ 0%{ box-shadow:0 0 0 0 var(--navy-line); } 70%{ box-shadow:0 0 0 12px transparent; } 100%{ box-shadow:0 0 0 0 transparent; } }
.node.pulse{ animation:nodePulse .7s ease-out 1; }

/* ============================================================
   TOOLBAR  (zoom in/out/reset/fullscreen) — pinned to stage
   ============================================================ */
.toolbar{
  position:absolute; left:16px; bottom:16px; z-index:20;
  display:flex; align-items:center; gap:4px; padding:5px;
  background:var(--bg); border:1px solid var(--rule); border-radius:10px;
  box-shadow:0 2px 8px rgba(17,19,26,.12);
}
.tool-btn{
  width:32px; height:32px; border-radius:7px; border:1px solid transparent; background:var(--bg);
  color:var(--ink-mid); cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
  transition:background .12s, color .12s, border-color .12s;
}
.tool-btn:hover{ background:var(--navy-bg); color:var(--navy-deep); border-color:var(--navy-line); }
.tool-btn svg{ width:17px; height:17px; }
.tool-sep{ width:1px; height:20px; background:var(--rule); margin:0 2px; }
.zoom-readout{ font:700 11px/1 var(--mono); letter-spacing:.03em; color:var(--ink-soft); min-width:42px; text-align:center; padding:0 4px; }

/* a small focus-banner shown when a node is selected */
.focus-banner{
  position:absolute; left:50%; top:14px; transform:translateX(-50%); z-index:20;
  display:none; align-items:center; gap:9px; padding:6px 8px 6px 12px;
  background:var(--bg); border:1px solid var(--navy-line); border-radius:9px;
  box-shadow:0 2px 8px rgba(17,19,26,.12);
  font:600 11px/1 var(--sans); color:var(--ink-mid);
}
.focus-banner.show{ display:flex; }
.focus-banner b{ color:var(--navy-deep); }
.focus-banner .fb-clear{ border:1px solid var(--rule); background:var(--bg); color:var(--ink-soft);
  border-radius:6px; padding:4px 7px; cursor:pointer; font:600 10px/1 var(--mono); letter-spacing:.05em; text-transform:uppercase; }
.focus-banner .fb-clear:hover{ border-color:var(--navy-line); color:var(--navy-deep); background:var(--navy-bg); }
.focus-banner .fb-blast{ display:inline-flex; align-items:center; gap:6px; border:1px solid var(--rule);
  background:var(--bg); color:var(--ink-soft); border-radius:6px; padding:4px 8px; cursor:pointer;
  font:700 9.5px/1 var(--mono); letter-spacing:.05em; text-transform:uppercase; }
.focus-banner .fb-blast svg{ width:13px; height:13px; }
.focus-banner .fb-blast:hover{ border-color:var(--navy-line); color:var(--navy-deep); background:var(--navy-bg); }
.focus-banner .fb-blast[aria-pressed="true"]{ background:var(--navy); border-color:var(--navy); color:#fff; }
.focus-banner .fb-sep{ width:1px; height:16px; background:var(--rule); }

/* print-only footer (hidden on screen, shown in print) */
.print-foot{ display:none; }

.noscript-note{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  background:var(--bg); z-index:999; padding:40px; text-align:center; color:var(--ink-mid); font-size:14px; }

/* ============================================================
   PRINT — full diagram fit-to-page, controls hidden
   ============================================================ */
@media print{
  html,body{ height:auto; overflow:visible; background:#fff; }
  .topo{ display:block; width:auto; height:auto; }
  .topo-bar{ box-shadow:none; border-bottom:1px solid var(--rule); flex-wrap:wrap; }
  .rc-theme, .asof select{ display:none; }
  .layer-panel, .info-panel{ display:none; }
  .toolbar, .focus-banner{ display:none !important; }

    border:1px solid var(--rule); overflow:visible; page-break-inside:avoid; }
  /* the world transform is replaced with a fit-to-page scale at print time (JS) */
  .node{ box-shadow:none; }

  .print-foot .wm .sq{ width:14px; height:14px; border-radius:4px; background:var(--navy); }
  .print-foot .fmeta{ font:600 10px/1.5 var(--mono); letter-spacing:.06em; text-transform:uppercase; color:#555; }
}

function icon(key){ return ICONS[key] || ICONS['microservice']; }

/* ============================================================
   STATE + DATA
   ============================================================ */
var DATA = JSON.parse(document.getElementById('report-data').textContent);
var TYPE_BY_KEY = {}; DATA.nodeTypes.forEach(function(t){ TYPE_BY_KEY[t.key] = t; });
var NODE_BY_ID  = {}; DATA.nodes.forEach(function(n){ NODE_BY_ID[n.id] = n; });
var CANVAS = (DATA.meta.canvas) || { w:1640, h:1000, coords:'norm' };
var COORDS = CANVAS.coords || 'norm';

var view = { zoom:1, panX:0, panY:0 };
var activeLayers = {}; DATA.layers.forEach(function(l){ activeLayers[l.key] = true; });
var activeTypes  = {}; DATA.nodeTypes.forEach(function(t){ activeTypes[t.key] = true; });
var selectedId = null;
var blastMode  = false;   /* multi-hop blast-radius highlight on/off */

/* adjacency (id -> [{other, edge, dir}]) */
var ADJ = {};
/* directed downstream map (from -> [to]) for blast-radius reachability */
var OUT = {};
DATA.nodes.forEach(function(n){ ADJ[n.id] = []; OUT[n.id] = []; });
DATA.edges.forEach(function(e){
  if(ADJ[e.from]) ADJ[e.from].push({ other:e.to, edge:e, dir:'out' });
  if(ADJ[e.to])   ADJ[e.to].push({ other:e.from, edge:e, dir:'in' });
  if(OUT[e.from]) OUT[e.from].push(e.to);
});

/* BFS over the directed OUT map → every node downstream of `id` (the blast radius:
   "what is affected if this node fails"), honouring the current filters. */
function reachDownstream(id){
  var seen = {}, q = [id], reached = {};
  seen[id] = true;
  while(q.length){
    var cur = q.shift();
    (OUT[cur] || []).forEach(function(to){
      if(seen[to]) return;
      seen[to] = true;
      if(!nodeVisible(NODE_BY_ID[to])) return;   /* don't traverse through filtered-out nodes */
      reached[to] = true;
      q.push(to);
    });
  }
  return reached;   /* map of reachable node ids (excludes the origin) */
}

/* px position of a node on the world canvas */
function px(n){
  if(COORDS === 'px') return { x:n.x, y:n.y };
  return { x:(n.x/100)*CANVAS.w, y:(n.y/100)*CANVAS.h };
}
/* whether a node currently passes the layer + type filters */
function nodeVisible(n){
  if(n.layer && activeLayers[n.layer] === false) return false;
  if(activeTypes[n.type] === false) return false;
  return true;
}
function edgeVisible(e){ return nodeVisible(NODE_BY_ID[e.from]) && nodeVisible(NODE_BY_ID[e.to]); }

}

function renderLayerPanel(){

/* ----- build the edge paths (curved) into the SVG ----- */
function buildEdges(){
  var svg = document.getElementById('edges');
  /* keep <defs>, drop the rest */
  var defs = document.getElementById('topo-svg-defs');
  svg.innerHTML = ''; svg.appendChild(defs);
  var NS = 'http://www.w3.org/2000/svg';
  DATA.edges.forEach(function(e, i){
    var a = NODE_BY_ID[e.from], b = NODE_BY_ID[e.to];
    if(!a || !b) return;
    var pa = px(a), pb = px(b);
    /* gentle quadratic curve, control point offset perpendicular to the line */
    var mx=(pa.x+pb.x)/2, my=(pa.y+pb.y)/2;
    var dx=pb.x-pa.x, dy=pb.y-pa.y, len=Math.sqrt(dx*dx+dy*dy)||1;
    var off=Math.min(48, len*0.12);
    var cx=mx + (-dy/len)*off, cy=my + (dx/len)*off;
    var d='M'+pa.x+' '+pa.y+' Q'+cx+' '+cy+' '+pb.x+' '+pb.y;

    var hit = document.createElementNS(NS,'path');
    hit.setAttribute('class','edge-hit'); hit.setAttribute('d',d);
    hit.setAttribute('data-edge',i);
    svg.appendChild(hit);

    var path = document.createElementNS(NS,'path');
    path.setAttribute('class','edge'); path.setAttribute('d',d);
    path.setAttribute('data-kind', e.kind||'sync');
    path.setAttribute('data-from', e.from); path.setAttribute('data-to', e.to);
    path.setAttribute('data-edge', i);
    path.setAttribute('marker-end','url(#ah)');
    svg.appendChild(path);

    if(e.label){
      var g = document.createElementNS(NS,'g');
      g.setAttribute('class','edge-label'); g.setAttribute('data-edge',i);
      var pt = quadPoint(pa,{x:cx,y:cy},pb,0.5);
      var w = e.label.length*6.0 + 12;
      var rect = document.createElementNS(NS,'rect');
      rect.setAttribute('x', pt.x - w/2); rect.setAttribute('y', pt.y - 9);
      rect.setAttribute('width', w); rect.setAttribute('height', 18); rect.setAttribute('rx',5);
      var text = document.createElementNS(NS,'text');
      text.setAttribute('x', pt.x); text.setAttribute('y', pt.y + 3.5);
      text.setAttribute('text-anchor','middle'); text.textContent = e.label;
      g.appendChild(rect); g.appendChild(text); svg.appendChild(g);
    }
  });
}
function quadPoint(p0,p1,p2,t){
  var mt=1-t;
  return { x:mt*mt*p0.x + 2*mt*t*p1.x + t*t*p2.x,
           y:mt*mt*p0.y + 2*mt*t*p1.y + t*t*p2.y };
}

/* ============================================================

   ============================================================ */
function applyFilters(){
  document.querySelectorAll('.node').forEach(function(el){
    var n = NODE_BY_ID[el.dataset.id];
    el.classList.toggle('hidden', !nodeVisible(n));
  });
  document.querySelectorAll('path.edge, path.edge-hit, g.edge-label').forEach(function(el){
    var e = DATA.edges[+el.dataset.edge];
    var vis = e && edgeVisible(e);
    el.style.display = vis ? '' : 'none';
  });
  recountControls();
  if(selectedId && !nodeVisible(NODE_BY_ID[selectedId])) clearSelection();
  else if(selectedId) applySelection();
}

function recountControls(){
  DATA.layers.forEach(function(l){
    var c = DATA.nodes.filter(function(n){ return n.layer===l.key && activeTypes[n.type]!==false; }).length;
    var el = document.querySelector('[data-layer-n="'+l.key+'"]'); if(el) el.textContent = c;
  });
  DATA.nodeTypes.forEach(function(t){
    var c = DATA.nodes.filter(function(n){ return n.type===t.key && (!n.layer||activeLayers[n.layer]!==false); }).length;
    var el = document.querySelector('[data-type-n="'+t.key+'"]'); if(el) el.textContent = c;
  });
  var lc=document.getElementById('layer-count'); if(lc) lc.textContent = Object.keys(activeLayers).filter(function(k){return activeLayers[k];}).length+'/'+DATA.layers.length;
  var tc=document.getElementById('type-count'); if(tc) tc.textContent = Object.keys(activeTypes).filter(function(k){return activeTypes[k];}).length+'/'+DATA.nodeTypes.length;
}

/* ============================================================
   SELECTION — highlight node + neighbours + edges, dim rest
   ============================================================ */
function selectNode(id, opts){
  opts = opts || {};
  selectedId = id;
  applySelection();
  fillInfo(id);
  /* pan-to-selected: bring the chosen node into view (P2 fix — selecting an
     off-screen node previously left it off-screen) */
  if(opts.center !== false) centerOnNode(id, true);
}
function applySelection(){
  var id = selectedId;
  var neigh = {};
  ADJ[id].forEach(function(a){ if(nodeVisible(NODE_BY_ID[a.other])) neigh[a.other]=true; });
  /* blast radius = every node reachable downstream when blastMode is on */
  var reach = blastMode ? reachDownstream(id) : {};

  document.querySelectorAll('.node').forEach(function(el){
    var nid = el.dataset.id;
    el.classList.remove('is-selected','is-neighbour','is-reach','is-dim');
    if(el.classList.contains('hidden')) return;
    if(nid===id) el.classList.add('is-selected');
    else if(neigh[nid]) el.classList.add('is-neighbour');
    else if(reach[nid]) el.classList.add('is-reach');
    else el.classList.add('is-dim');
  });
  document.querySelectorAll('path.edge').forEach(function(p){
    if(p.style.display==='none') return;
    /* hot = touches the selected node, OR (in blast mode) connects two in-radius nodes */
    var f=p.dataset.from, t=p.dataset.to;
    var direct = (f===id || t===id);
    var inRadius = blastMode && (f===id||reach[f]) && (t===id||reach[t]) && OUT[f] && OUT[f].indexOf(t)>=0;
    var touches = direct || inRadius;
    p.classList.toggle('hot', touches);
    p.classList.toggle('dim', !touches);
  });
  document.querySelectorAll('g.edge-label').forEach(function(g){
    var e = DATA.edges[+g.dataset.edge];
    if(!e || !edgeVisible(e)){ g.classList.remove('show'); return; }
    var direct = (e.from===id || e.to===id);
    var inRadius = blastMode && (e.from===id||reach[e.from]) && (reach[e.to]);
    g.classList.toggle('show', !!(direct||inRadius));
  });

  var n = NODE_BY_ID[id];
  var reachN = Object.keys(reach).length;
  var fb = document.getElementById('focus-banner');
  var summary = blastMode
    ? 'Blast radius of <b>&nbsp;'+esc(n.label)+'&nbsp;</b> &middot; '+reachN+' node(s) downstream'
    : 'Focused on <b>&nbsp;'+esc(n.label)+'&nbsp;</b> &middot; '+Object.keys(neigh).length+' neighbour(s)';
  fb.innerHTML = summary+
    ' <button class="fb-blast" id="fb-blast" type="button" aria-pressed="'+(blastMode?'true':'false')+'" title="Toggle multi-hop blast radius (downstream reachability)">'+icon('blast')+'Blast</button>'+
    '<span class="fb-sep"></span>'+
    '<button class="fb-clear" id="fb-clear" type="button">Clear</button>';
  fb.classList.add('show');
  document.getElementById('fb-clear').addEventListener('click', function(ev){ ev.stopPropagation(); clearSelection(); });
  document.getElementById('fb-blast').addEventListener('click', function(ev){
    ev.stopPropagation();
    blastMode = !blastMode;
    applySelection();   /* re-render highlight (banner & classes) */
  });
}
function clearSelection(){
  selectedId = null;
  document.querySelectorAll('.node').forEach(function(el){ el.classList.remove('is-selected','is-neighbour','is-reach','is-dim'); });
  document.querySelectorAll('path.edge').forEach(function(p){ p.classList.remove('hot','dim'); });
  document.querySelectorAll('g.edge-label').forEach(function(g){ g.classList.remove('show'); });
  document.getElementById('focus-banner').classList.remove('show');
  document.getElementById('info-card').classList.remove('show');

}

    '</div>'+

/* ============================================================
   PAN + ZOOM
   ============================================================ */
function applyTransform(){
  var w = document.getElementById('world');
  w.style.transform = 'translate('+view.panX+'px,'+view.panY+'px) scale('+view.zoom+')';
  var z=document.getElementById('zoom-readout'); if(z) z.textContent = Math.round(view.zoom*100)+'%';
}
function clampZoom(z){ return Math.max(0.3, Math.min(2.6, z)); }
function zoomAt(factor, cx, cy){
  var stage=document.getElementById('stage'); var r=stage.getBoundingClientRect();
  var ox = (cx==null? r.width/2 : cx-r.left), oy = (cy==null? r.height/2 : cy-r.top);
  var nz = clampZoom(view.zoom*factor);
  var k = nz/view.zoom;
  view.panX = ox - (ox-view.panX)*k;
  view.panY = oy - (oy-view.panY)*k;
  view.zoom = nz;
  applyTransform();
}
function fitToView(animate){
  var stage=document.getElementById('stage'); if(!stage) return;
  var r=stage.getBoundingClientRect();
  var pad=70;
  var z = clampZoom(Math.min((r.width-pad*2)/CANVAS.w, (r.height-pad*2)/CANVAS.h));
  view.zoom = z;
  view.panX = (r.width  - CANVAS.w*z)/2;
  view.panY = (r.height - CANVAS.h*z)/2;
  var w=document.getElementById('world');
  if(w){ w.style.transition = animate?'transform .2s ease':'none'; }
  applyTransform();
  if(animate) setTimeout(function(){ if(w) w.style.transition='none'; },220);
}

/* pan the world so a node sits at the centre of the visible stage (zoom unchanged) */
function centerOnNode(id, animate){
  var n = NODE_BY_ID[id]; if(!n) return;
  var stage=document.getElementById('stage'); if(!stage) return;
  var r=stage.getBoundingClientRect();
  var p=px(n);
  view.panX = r.width/2  - p.x*view.zoom;
  view.panY = r.height/2 - p.y*view.zoom;
  var w=document.getElementById('world');
  if(w){ w.style.transition = animate?'transform .26s ease':'none'; }
  applyTransform();
  if(animate && w) setTimeout(function(){ w.style.transition='none'; },280);
}

/* ============================================================
   WIRE INTERACTIONS
   ============================================================ */
function wireInteractions(){
  var stage=document.getElementById('stage');
  var world=document.getElementById('world');

  /* node click -> select (stop drag from firing) */
  world.querySelectorAll('.node').forEach(function(el){
    el.addEventListener('click', function(ev){ ev.stopPropagation(); selectNode(el.dataset.id); });
  });

  /* edge hover -> reveal label + accent line */
  document.querySelectorAll('path.edge-hit').forEach(function(hit){
    var i = hit.dataset.edge;
    var path = document.querySelector('path.edge[data-edge="'+i+'"]');
    var glabel = document.querySelector('g.edge-label[data-edge="'+i+'"]');
    hit.addEventListener('mouseenter', function(){ if(path) path.classList.add('hot'); if(glabel) glabel.classList.add('show'); });
    hit.addEventListener('mouseleave', function(){
      if(selectedId){ applySelection(); return; }   /* keep focus styling */
      if(path) path.classList.remove('hot'); if(glabel) glabel.classList.remove('show');
    });
  });

  /* PAN (pointer drag on empty stage) */
  var dragging=false, moved=false, sx=0, sy=0, sp={};
  stage.addEventListener('pointerdown', function(ev){
    if(ev.button!==0) return;
    dragging=true; moved=false; sx=ev.clientX; sy=ev.clientY; sp={x:view.panX,y:view.panY};
    stage.classList.add('is-panning'); stage.setPointerCapture(ev.pointerId);
  });
  stage.addEventListener('pointermove', function(ev){
    if(!dragging) return;
    var dx=ev.clientX-sx, dy=ev.clientY-sy;
    if(Math.abs(dx)+Math.abs(dy)>3) moved=true;
    view.panX=sp.x+dx; view.panY=sp.y+dy; applyTransform();
  });
  function endPan(ev){ if(!dragging) return; dragging=false; stage.classList.remove('is-panning'); }
  stage.addEventListener('pointerup', endPan);
  stage.addEventListener('pointercancel', endPan);

  /* click empty stage clears selection (only if not a drag) */
  stage.addEventListener('click', function(ev){
    if(moved) return;
    if(ev.target===stage || ev.target===world || ev.target.tagName==='svg' || ev.target.classList.contains('edges')) clearSelection();
  });

  /* ZOOM via wheel (about cursor) */
  stage.addEventListener('wheel', function(ev){
    ev.preventDefault();
    zoomAt(ev.deltaY<0 ? 1.12 : 1/1.12, ev.clientX, ev.clientY);
  }, { passive:false });

  /* toolbar */
  document.getElementById('zoom-in').addEventListener('click', function(){ zoomAt(1.2); });
  document.getElementById('zoom-out').addEventListener('click', function(){ zoomAt(1/1.2); });
  document.getElementById('fit').addEventListener('click', function(){ clearSelection(); fitToView(true); });
  document.getElementById('fullscreen').addEventListener('click', function(){
    if(!document.fullscreenElement){ if(stage.requestFullscreen) stage.requestFullscreen(); }
    else if(document.exitFullscreen) document.exitFullscreen();
  });
  document.addEventListener('fullscreenchange', function(){ setTimeout(function(){ fitToView(true); },60); });

  /* layer toggles */
  document.querySelectorAll('[data-layer]').forEach(function(b){
    b.addEventListener('click', function(){
      var k=b.dataset.layer, on=b.getAttribute('aria-pressed')!=='true';
      b.setAttribute('aria-pressed', on?'true':'false'); activeLayers[k]=on; applyFilters();
    });
  });
  /* type filter */
  document.querySelectorAll('[data-type]').forEach(function(b){
    b.addEventListener('click', function(){
      var k=b.dataset.type, on=b.getAttribute('aria-pressed')!=='true';
      b.setAttribute('aria-pressed', on?'true':'false'); activeTypes[k]=on; applyFilters();
    });
  });

  /* keyboard: Esc clears, +/- zoom (ignore while typing in the search box) */
  document.addEventListener('keydown', function(ev){
    var t=ev.target;
    if(t && (t.tagName==='INPUT' || t.tagName==='TEXTAREA')){
      if(ev.key==='Escape' && t.id==='ns-input') t.blur();
      return;
    }
    if(ev.key==='Escape') clearSelection();
    else if(ev.key==='+'||ev.key==='=') zoomAt(1.2);
    else if(ev.key==='-') zoomAt(1/1.2);
    else if(ev.key==='0') { clearSelection(); fitToView(true); }
  });

  window.addEventListener('resize', function(){ if(!selectedId) fitToView(false); });
  /* before print: fit so the whole diagram lands on the page */
  window.addEventListener('beforeprint', function(){ clearSelection(); fitToView(false); });
}

/* ============================================================
   NODE SEARCH  (find → centre + select a node)
   ============================================================ */
function wireSearch(){
  var wrap=document.getElementById('node-search');
  var input=document.getElementById('ns-input');
  var box=document.getElementById('ns-results');
  var clr=document.getElementById('ns-clear');
  if(!wrap||!input||!box) return;
  var activeIdx=-1, matches=[];

  function typeLabel(n){ return (TYPE_BY_KEY[n.type]||{}).label || n.type; }
  function find(q){
    q=q.trim().toLowerCase();
    if(!q) return [];
    return DATA.nodes.filter(function(n){
      return n.label.toLowerCase().indexOf(q)>=0 ||
             (typeLabel(n)||'').toLowerCase().indexOf(q)>=0 ||
             n.id.toLowerCase().indexOf(q)>=0;
    }).slice(0,8);
  }
  function hl(label,q){
    var i=label.toLowerCase().indexOf(q.trim().toLowerCase());
    if(i<0||!q.trim()) return esc(label);
    var L=q.trim().length;
    return esc(label.slice(0,i))+'<b>'+esc(label.slice(i,i+L))+'</b>'+esc(label.slice(i+L));
  }
  function renderResults(){
    var q=input.value;
    matches=find(q); activeIdx=-1;
    wrap.classList.toggle('has-text', q.length>0);
    if(!q.trim()){ box.innerHTML=''; close(); return; }
    if(!matches.length){
      box.innerHTML='<div class="ns-none">No node matches “'+esc(q.trim())+'”.</div>';
    } else {
      box.innerHTML = matches.map(function(n,idx){
        var s=n.status||'neutral', t=TYPE_BY_KEY[n.type]||{};
        var off = !nodeVisible(n) ? ' style="opacity:.5"' : '';
        return '<button class="ns-opt" type="button" role="option" data-id="'+n.id+'" data-idx="'+idx+'"'+off+'>'+
          '<span class="nso-ico">'+icon(t.icon)+'</span>'+
          '<span class="nso-body"><span class="nso-name">'+hl(n.label,q)+'</span>'+
          '<span class="nso-sub">'+esc(typeLabel(n))+(nodeVisible(n)?'':' &middot; hidden')+'</span></span>'+
          '<span class="nso-dot is-'+s+'"></span></button>';
      }).join('');
      box.querySelectorAll('.ns-opt').forEach(function(b){
        b.addEventListener('click', function(){ pick(b.dataset.id); });
      });
    }
    open();
  }
  function open(){ wrap.classList.add('open'); input.setAttribute('aria-expanded','true'); }
  function close(){ wrap.classList.remove('open'); input.setAttribute('aria-expanded','false'); activeIdx=-1; }
  function setActive(i){
    var opts=box.querySelectorAll('.ns-opt'); if(!opts.length) return;
    activeIdx=(i+opts.length)%opts.length;
    opts.forEach(function(o,k){ o.classList.toggle('active', k===activeIdx); });
    opts[activeIdx].scrollIntoView({ block:'nearest' });
  }
  function pick(id){
    var n=NODE_BY_ID[id]; if(!n) return;
    /* if the node is filtered out, switch its layer + type back on so it can be shown */
    if(!nodeVisible(n)){
      if(n.layer && activeLayers[n.layer]===false){
        activeLayers[n.layer]=true;
        var lb=document.querySelector('[data-layer="'+n.layer+'"]'); if(lb) lb.setAttribute('aria-pressed','true');
      }
      if(activeTypes[n.type]===false){
        activeTypes[n.type]=true;
        var tb=document.querySelector('[data-type="'+n.type+'"]'); if(tb) tb.setAttribute('aria-pressed','true');
      }
      applyFilters();
    }
    selectNode(id);                 /* selects + pans-to (centerOnNode) */
    var el=document.querySelector('.node[data-id="'+id+'"]');
    if(el){ el.classList.remove('pulse'); void el.offsetWidth; el.classList.add('pulse'); }
    input.value=n.label; wrap.classList.add('has-text');
    close();
  }

  input.addEventListener('input', renderResults);
  input.addEventListener('focus', function(){ if(input.value.trim()) renderResults(); });
  input.addEventListener('keydown', function(ev){
    if(ev.key==='ArrowDown'){ ev.preventDefault(); if(!wrap.classList.contains('open')) renderResults(); setActive(activeIdx+1); }
    else if(ev.key==='ArrowUp'){ ev.preventDefault(); setActive(activeIdx-1); }
    else if(ev.key==='Enter'){
      ev.preventDefault();
      if(activeIdx>=0 && matches[activeIdx]) pick(matches[activeIdx].id);
      else if(matches.length) pick(matches[0].id);
    } else if(ev.key==='Escape'){
      if(wrap.classList.contains('open')){ ev.stopPropagation(); close(); }
    }
  });
  clr.addEventListener('click', function(){ input.value=''; wrap.classList.remove('has-text'); box.innerHTML=''; close(); input.focus(); });
  document.addEventListener('click', function(ev){ if(!wrap.contains(ev.target)) close(); });
}

/* ============================================================
   THEME SWITCH  (canonical dropdown → data-theme)
   ============================================================ */
function wireThemeSwitch(){
  var rcSel = document.querySelector('.rc-theme-sel');
  if(rcSel){
    rcSel.value = document.documentElement.dataset.theme || 'purple';
    rcSel.addEventListener('change', function(){ document.documentElement.dataset.theme = rcSel.value; });
  }
}

/* small HTML escaper */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

/* ============================================================ */
document.addEventListener('DOMContentLoaded', function(){
  render();
  wireInteractions();
  wireSearch();
  wireThemeSwitch();
});
</script>
