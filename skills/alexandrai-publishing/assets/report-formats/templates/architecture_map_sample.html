<style>
:root{--bg:#fff;--bg-band:#f6f6f8;--bg-subtle:#fafafb;--bg-deep:#15131a;--rule:#dcdce2;--rule-soft:#ebebef;--ink:#11131a;--ink-mid:#33363f;--ink-soft:#5a5e68;--ink-faint:#868b95;--navy:#3f4f63;--navy-deep:#29384b;--navy-bg:#eef1f5;--navy-line:#c2ccd8;--ok:#34495e;--ok-bg:#eef1f5;--ok-line:#c2ccd8;--risk:#b3261e;--risk-bg:#fbeceb;--risk-line:#edc7c4;--hold:#8a6d00;--hold-bg:#fbf3da;--hold-line:#e7d8a4;--mono:ui-monospace,"JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;--sans:-apple-system,"Segoe UI",system-ui,Roboto,"Noto Sans",sans-serif}

*{box-sizing:border-box}html,body{margin:0;height:100%}body{font:13px/1.45 var(--sans);color:var(--ink);background:var(--bg-band);overflow:hidden}button,select{font:inherit}.app{height:100vh;display:grid;grid-template-columns:230px 1fr 310px;grid-template-rows:52px 1fr;grid-template-areas:"bar bar bar" "left canvas right"}.bar{grid-area:bar;display:flex;align-items:center;gap:14px;padding:9px 16px;background:var(--bg);border-bottom:1px solid var(--rule);box-shadow:0 1px 3px rgba(17,19,26,.05);z-index:5}.mark{width:30px;height:30px;border-radius:8px;background:var(--navy);color:#fff;display:grid;place-items:center;font:800 14px/1 var(--mono)}.titles{min-width:0}.eyebrow{font:700 9px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}.title{font:800 15px/1.15 var(--sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title b{color:var(--navy-deep)}.bar-spacer{flex:1}.date{font:700 10px/1 var(--mono);letter-spacing:.06em;color:var(--ink-soft);text-transform:uppercase}.rc-theme{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--rule);border-radius:7px;padding:3px 4px 3px 7px;background:var(--bg)}.rc-theme-sw{width:12px;height:12px;border-radius:50%;background:var(--navy);box-shadow:0 0 0 1px var(--rule)}.rc-theme-sel{border:0;background:none;font:600 11px/1 var(--mono);color:var(--ink-mid);outline:none}
.side{background:var(--bg);overflow:auto}.left{grid-area:left;border-right:1px solid var(--rule)}.right{grid-area:right;border-left:1px solid var(--rule)}.group{padding:14px;border-bottom:1px solid var(--rule-soft)}.label{font:800 9.5px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}.chip{display:inline-flex;align-items:center;gap:6px;font:700 10.5px/1 var(--mono);color:var(--navy-deep);background:var(--navy-bg);border:1px solid var(--navy-line);border-radius:6px;padding:5px 8px;margin:0 5px 6px 0}.sw{width:9px;height:9px;border-radius:50%;background:var(--navy)}.st{display:inline-flex;align-items:center;gap:6px;font:700 10px/1 var(--mono);text-transform:uppercase;border:1px solid var(--rule);border-radius:6px;padding:4px 7px;background:var(--bg)}.st:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ink-faint)}.st.ok{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-line)}.st.ok:before{background:var(--ok)}.st.risk{color:var(--risk);background:var(--risk-bg);border-color:var(--risk-line)}.st.risk:before{background:var(--risk)}.st.hold{color:var(--hold);background:var(--hold-bg);border-color:var(--hold-line)}.st.hold:before{background:var(--hold)}.list{display:flex;flex-direction:column;gap:7px}.filter{width:100%;text-align:left;border:1px solid var(--rule);border-radius:8px;background:var(--bg);padding:8px 9px;cursor:pointer;color:var(--ink-mid);display:flex;align-items:center;justify-content:space-between}.filter:hover,.filter.on{background:var(--navy-bg);border-color:var(--navy-line);color:var(--navy-deep)}.canvas{grid-area:canvas;position:relative;overflow:hidden;cursor:grab;background:linear-gradient(var(--rule-soft) 1px,transparent 1px),linear-gradient(90deg,var(--rule-soft) 1px,transparent 1px),var(--bg-subtle);background-size:28px 28px;user-select:none;-webkit-user-select:none}.canvas.is-panning{cursor:grabbing}.world{position:absolute;left:0;top:0;width:1400px;height:820px;transform-origin:0 0;will-change:transform}.band{position:absolute;left:36px;right:36px;border:1px solid var(--rule);border-radius:12px;background:rgba(255,255,255,.62);box-shadow:0 1px 2px rgba(17,19,26,.04)}.band-title{position:absolute;left:14px;top:10px;font:800 10px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}svg.edges{position:absolute;inset:0;overflow:visible}.edge{stroke:var(--ink-soft);stroke-width:2;fill:none;marker-end:url(#arrow);opacity:.72}.edge.event{stroke-dasharray:7 6}.edge.data{stroke-width:3.5}.edge.imports{stroke-dasharray:2 5}.edge.hot{stroke:var(--navy);stroke-width:4;opacity:1}.edge.risk{stroke:var(--risk)}.edge-label{font:700 10px/1 var(--mono);fill:var(--ink-mid)}.edge-pill{fill:var(--bg);stroke:var(--rule)}
.component{position:absolute;width:220px;min-height:96px;transform:translate(-50%,-50%);border:1px solid var(--rule);border-radius:10px;background:var(--bg);box-shadow:0 8px 22px rgba(17,19,26,.08);padding:11px 12px;cursor:pointer;transition:opacity .12s,box-shadow .12s,border-color .12s}.component:hover,.component.sel{border-color:var(--navy);box-shadow:0 0 0 3px var(--navy-bg),0 10px 24px rgba(17,19,26,.1)}.component.dim{opacity:.32}.ctype{font:800 9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);display:flex;justify-content:space-between;gap:8px}.cname{font:800 13px/1.25 var(--sans);margin:7px 0 5px;color:var(--ink);overflow-wrap:anywhere;hyphens:auto}.cmeta{font:600 10.5px/1.35 var(--mono);color:var(--ink-soft);white-space:normal;overflow-wrap:anywhere;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.dot{width:8px;height:8px;border-radius:50%;background:var(--ink-faint);display:inline-block;flex:none}.dot.ok{background:var(--ok)}.dot.risk{background:var(--risk)}.dot.hold{background:var(--hold)}.toolbar{position:absolute;left:16px;bottom:16px;z-index:20;display:flex;align-items:center;gap:4px;padding:5px;background:var(--bg);border:1px solid var(--rule);border-radius:10px;box-shadow:0 2px 8px rgba(17,19,26,.12)}.tool-btn{width:32px;height:32px;border-radius:7px;border:1px solid transparent;background:var(--bg);color:var(--ink-mid);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .12s,color .12s,border-color .12s}.tool-btn:hover{background:var(--navy-bg);color:var(--navy-deep);border-color:var(--navy-line)}.tool-btn svg{width:17px;height:17px}.tool-sep{width:1px;height:20px;background:var(--rule);margin:0 2px}.zoom-readout{font:700 11px/1 var(--mono);letter-spacing:.03em;color:var(--ink-soft);min-width:42px;text-align:center;padding:0 4px}.detail{padding:16px}.detail h2{font:800 17px/1.2 var(--sans);margin:0 0 8px;overflow-wrap:anywhere}.detail p{margin:10px 0;color:var(--ink-mid)}.kv{display:grid;grid-template-columns:82px 1fr;gap:7px 10px;margin:12px 0}.k{font:800 9px/1.2 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}.v{font:600 12px/1.25 var(--sans);color:var(--ink-mid);overflow-wrap:anywhere;word-break:break-word}.iface{border:1px solid var(--rule);border-radius:8px;padding:7px 8px;margin:6px 0;background:var(--bg-subtle);font:600 11px/1.25 var(--sans);overflow-wrap:anywhere;word-break:break-word}.finding{border-left:3px solid var(--rule);padding:8px 0 8px 10px;margin:9px 0}.finding.risk{border-color:var(--risk)}.finding.hold{border-color:var(--hold)}.finding.ok{border-color:var(--ok)}.finding b{display:block;font:800 12px/1.2 var(--sans);margin-bottom:3px}.finding span{color:var(--ink-soft);font-size:12px}@media print{body{overflow:visible}.app{display:block}.bar,.side,.toolbar{display:none}.canvas{height:100vh;overflow:visible;cursor:auto;background:#fff}.world{transform:scale(.82);left:0;top:0;transform-origin:0 0}}
</style>

  <aside class="side right"><div class="group"><div class="label">Selected component</div><div id="detail" class="detail"><p>Select a component to inspect interfaces, paths and direct dependencies.</p></div></div><div class="group"><div class="label">Architecture findings</div><div id="findings"></div></div></aside>

<script>
(function(){
  const data = JSON.parse(document.getElementById('report-data').textContent);
  let W = 1400, H = 820;
  const CW = 220, CH = 104;                 // card footprint used for layout + edge clipping
  const GAP_X = 30, MARGIN_X = 36;          // MARGIN_X matches the .band left/right inset
  const BAND_PAD_X = 30, BAND_PAD_TOP = 38, BAND_PAD_BOTTOM = 24, BAND_GAP_Y = 26, MARGIN_Y = 28;
  let posMap = {}, bandGeom = [];
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const cls = (s) => s === 'ok' ? 'ok' : s === 'risk' ? 'risk' : s === 'hold' ? 'hold' : 'neutral';
  const clampLabel = (s, w) => { s = String(s ?? ''); const max = Math.max(3, Math.floor((w - 20) / 6.4)); return s.length > max ? s.slice(0, Math.max(1, max - 1)) + '…' : s; };
  let activeLayer = 'all', activeType = 'all', selected = null;
  let view = { zoom: 1, panX: 0, panY: 0 };

  function init(){
    document.documentElement.dataset.theme = data.meta.theme || 'black';
    $('theme').value = document.documentElement.dataset.theme;
    $('theme').addEventListener('change', e => document.documentElement.dataset.theme = e.target.value);
    $('eyebrow').textContent = data.meta.reportType || 'Architecture Map';
    $('title').innerHTML = '<b>'+esc(data.meta.project)+'</b> - '+esc(data.meta.title);
    $('date').textContent = data.meta.date || '';
    computeLayout();
    $('world').style.width = W + 'px';
    $('world').style.height = H + 'px';
    $('edges').setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    renderFilters();
    render();
    fitToView(false);
    wireCanvas();
  }

  function renderFilters(){
    $('layers').innerHTML = '<button class="filter on" data-layer="all">All layers</button>' +
      data.layers.map(l => '<button class="filter" data-layer="'+esc(l.id)+'">'+esc(l.label)+'<span>'+count('layer',l.id)+'</span></button>').join('');
    $('layers').querySelectorAll('button').forEach(b => b.onclick = () => { activeLayer = b.dataset.layer; renderFilters(); render(); });
    const types = [...new Set(data.components.map(c => c.type))];
    $('types').innerHTML = '<button class="filter on" data-type="all">All types</button>' +
      types.map(t => '<button class="filter" data-type="'+esc(t)+'">'+esc(t)+'<span>'+count('type',t)+'</span></button>').join('');
    $('types').querySelectorAll('button').forEach(b => b.onclick = () => { activeType = b.dataset.type; renderFilters(); render(); });
    document.querySelectorAll('[data-layer]').forEach(b => b.classList.toggle('on', b.dataset.layer === activeLayer));
    document.querySelectorAll('[data-type]').forEach(b => b.classList.toggle('on', b.dataset.type === activeType));
  }

  function count(k,v){ return data.components.filter(c => c[k] === v).length; }
  function visible(c){ return (activeLayer === 'all' || c.layer === activeLayer) && (activeType === 'all' || c.type === activeType); }
  function pos(c){ return posMap[c.id] || { x: W / 2, y: H / 2 }; }

  function render(){
    const comps = data.components.filter(visible);
    const ids = new Set(comps.map(c => c.id));
    const edges = data.relationships.filter(r => ids.has(r.from) && ids.has(r.to));
    renderBands();
    renderEdges(edges);
    $('components').innerHTML = comps.map(componentHtml).join('');
    $('components').querySelectorAll('.component').forEach(el => el.onclick = (ev) => { ev.stopPropagation(); selected = el.dataset.id; render(); });
    renderDetail();
    renderFindings();
  }

  // Auto-layout: each layer is a horizontal band; its components sit inside it as an
  // evenly-spaced row (ordered by the authored x), so cards never overflow their band.
  function computeLayout(){
    const known = new Set(data.layers.map(l => l.id));
    const groups = data.layers.map(l => ({ label: l.label, items: data.components.filter(c => c.layer === l.id) }));
    const orphans = data.components.filter(c => !known.has(c.layer));
    if(orphans.length) groups.push({ label: 'Other', items: orphans });
    groups.forEach(g => g.items.sort((a,b) => (a.x ?? 50) - (b.x ?? 50) || (a.id < b.id ? -1 : 1)));

    const maxCount = Math.max(1, ...groups.map(g => g.items.length));
    const rowW = maxCount * CW + (maxCount - 1) * GAP_X;
    const bandH = BAND_PAD_TOP + CH + BAND_PAD_BOTTOM;
    W = Math.max(1180, rowW + 2 * MARGIN_X + 2 * BAND_PAD_X + 80);
    H = MARGIN_Y * 2 + groups.length * bandH + (groups.length - 1) * BAND_GAP_Y;

    const innerLeft = MARGIN_X + BAND_PAD_X, innerW = W - 2 * MARGIN_X - 2 * BAND_PAD_X;
    posMap = {}; bandGeom = [];
    groups.forEach((g, i) => {
      const top = MARGIN_Y + i * (bandH + BAND_GAP_Y);
      bandGeom.push({ top, height: bandH, label: g.label });
      const m = g.items.length, thisW = m * CW + (m - 1) * GAP_X;
      const startX = innerLeft + Math.max(0, (innerW - thisW) / 2);
      const cy = top + BAND_PAD_TOP + CH / 2;
      g.items.forEach((c, k) => { posMap[c.id] = { x: startX + k * (CW + GAP_X) + CW / 2, y: cy }; });
    });
  }
  function renderBands(){
    $('bands').innerHTML = bandGeom.map(b => '<div class="band" style="top:'+b.top+'px;height:'+b.height+'px"><div class="band-title">'+esc(b.label)+'</div></div>').join('');
  }
  // Clip an edge to the card borders so the line starts/ends just outside each card
  // (arrowheads stay visible instead of hiding under the box).
  function edgeEnds(a, b){
    const hw = CW / 2 + 10, hh = CH / 2 + 8;
    const dx = b.x - a.x, dy = b.y - a.y, adx = Math.abs(dx), ady = Math.abs(dy);
    let s = Math.min(adx > 0.01 ? hw / adx : 1e9, ady > 0.01 ? hh / ady : 1e9);
    s = Math.min(s, 0.46);
    return { ax: a.x + dx * s, ay: a.y + dy * s, bx: b.x - dx * s, by: b.y - dy * s };
  }
  function renderEdges(edges){
    const byId = Object.fromEntries(data.components.map(c => [c.id,c]));
    const defs = '<defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="var(--ink-soft)"/></marker></defs>';
    const items = edges.map(e => {
      const a = pos(byId[e.from]), b = pos(byId[e.to]);
      const { ax, ay, bx, by } = edgeEnds(a, b);
      const label = String(e.label || e.kind || 'link');
      const pillW = Math.min(180, Math.max(60, label.length * 6.4 + 22));
      const hot = selected && (e.from === selected || e.to === selected);
      return { e, ax, ay, bx, by, mx: (ax + bx) / 2, my: (ay + by) / 2, pillW, label, text: clampLabel(label, pillW), hot };
    });
    // Place each label at the clear spot nearest its edge midpoint. Cards and
    // already-placed pills are obstacles; the search tries straight up/down first (keeps
    // the pill on the edge's x) then sideways, so text never covers a card or a pill.
    const cards = data.components.map(c => { const q = pos(c); return { x: q.x - CW / 2, y: q.y - CH / 2, w: CW, h: CH }; });
    const hit = (b, r, mx, my) => b.x < r.x + r.w + mx && b.x + b.w + mx > r.x && b.y < r.y + r.h + my && b.y + b.h + my > r.y;
    const offsets = [[0, 0]];
    for(let d = 6; d <= 180; d += 6) offsets.push([0, -d], [0, d], [-d, 0], [d, 0], [-d, -d], [d, -d], [-d, d], [d, d]);
    const placed = [];
    items.slice().sort((p, q) => p.my - q.my || p.mx - q.mx).forEach(p => {
      const ox = p.mx - p.pillW / 2, oy = p.my - 11;
      let spot = { x: ox, y: oy, w: p.pillW, h: 22 };
      for(const [dx, dy] of offsets){
        const box = { x: ox + dx, y: oy + dy, w: p.pillW, h: 22 };
        if(cards.every(r => !hit(box, r, 6, 10)) && placed.every(o => !hit(box, o, 6, 5))){ spot = box; break; }
      }
      placed.push(spot);
      p.lx = spot.x + p.pillW / 2; p.ly = spot.y + 11;
    });
    $('edges').innerHTML = defs + items.map(p =>
      '<path class="edge '+esc(p.e.kind||'call')+' '+(p.hot?'hot ':'')+cls(p.e.status)+'" d="M'+p.ax+','+p.ay+' L'+p.bx+','+p.by+'"/>' +
      '<g><title>'+esc(p.label)+'</title><rect class="edge-pill" x="'+(p.lx-p.pillW/2)+'" y="'+(p.ly-11)+'" width="'+p.pillW+'" height="22" rx="8"/><text class="edge-label" x="'+p.lx+'" y="'+(p.ly+4)+'" text-anchor="middle">'+esc(p.text)+'</text></g>'
    ).join('');
  }
  function componentHtml(c){
    const p = pos(c);
    const related = selected ? data.relationships.some(e => (e.from === selected && e.to === c.id) || (e.to === selected && e.from === c.id)) : false;
    const dim = selected && c.id !== selected && !related;
    return '<article class="component '+(c.id===selected?'sel ':'')+(dim?'dim':'')+'" data-id="'+esc(c.id)+'" style="left:'+p.x+'px;top:'+p.y+'px"><div class="ctype">'+esc(c.type)+'<span class="dot '+cls(c.status)+'"></span></div><div class="cname">'+esc(c.label)+'</div><div class="cmeta">'+esc(c.path||c.tech||'')+'</div></article>';
  }
  function renderDetail(){
    const c = data.components.find(x => x.id === selected);
    if(!c){ $('detail').innerHTML = '<p>Select a component to inspect interfaces, paths and direct dependencies.</p>'; return; }
    const rels = data.relationships.filter(r => r.from === c.id || r.to === c.id);
    $('detail').innerHTML = '<h2>'+esc(c.label)+'</h2><span class="st '+cls(c.status)+'">'+esc(c.status||'neutral')+'</span><p>'+esc(c.summary||'')+'</p><div class="kv"><div class="k">type</div><div class="v">'+esc(c.type)+'</div><div class="k">layer</div><div class="v">'+esc(c.layer)+'</div><div class="k">owner</div><div class="v">'+esc(c.owner||'')+'</div><div class="k">tech</div><div class="v">'+esc(c.tech||'')+'</div><div class="k">path</div><div class="v">'+esc(c.path||'')+'</div></div><div class="label">Interfaces</div>'+(c.interfaces||[]).map(i => '<div class="iface">'+esc(i.kind||'api')+' - '+esc(i.label)+'</div>').join('')+'<div class="label" style="margin-top:14px">Direct links</div>'+rels.map(r => '<div class="iface">'+esc(r.from)+' -> '+esc(r.to)+' : '+esc(r.label||r.kind)+'</div>').join('');
  }
  function renderFindings(){
    $('findings').innerHTML = (data.findings||[]).map(f => '<div class="finding '+cls(f.status)+'"><b>'+esc(f.title)+'</b><span>'+esc(f.detail)+'</span></div>').join('');
  }
  function applyTransform(){
    $('world').style.transform = 'translate('+view.panX+'px,'+view.panY+'px) scale('+view.zoom+')';
    $('zoom-readout').textContent = Math.round(view.zoom * 100) + '%';
  }
  function clampZoom(z){ return Math.max(0.3, Math.min(2.8, z)); }
  function zoomAt(factor, cx, cy){
    const canvas = $('canvas');
    const r = canvas.getBoundingClientRect();
    const ox = cx == null ? r.width / 2 : cx - r.left;
    const oy = cy == null ? r.height / 2 : cy - r.top;
    const next = clampZoom(view.zoom * factor);
    const k = next / view.zoom;
    view.panX = ox - (ox - view.panX) * k;
    view.panY = oy - (oy - view.panY) * k;
    view.zoom = next;
    applyTransform();
  }
  function fitToView(animate){
    const canvas = $('canvas');
    const r = canvas.getBoundingClientRect();
    const pad = 56;
    const next = clampZoom(Math.min((r.width - pad * 2) / W, (r.height - pad * 2) / H));
    view.zoom = next;
    view.panX = (r.width - W * next) / 2;
    view.panY = (r.height - H * next) / 2;
    const world = $('world');
    world.style.transition = animate ? 'transform .2s ease' : 'none';
    applyTransform();
    if(animate) setTimeout(() => { world.style.transition = 'none'; }, 220);
  }
  function wireCanvas(){
    const canvas = $('canvas');
    let dragging = false, moved = false, sx = 0, sy = 0, start = { x: 0, y: 0 };
    canvas.addEventListener('pointerdown', ev => {
      if(ev.button !== 0 || ev.target.closest('.component,.toolbar')) return;
      dragging = true; moved = false; sx = ev.clientX; sy = ev.clientY; start = { x: view.panX, y: view.panY };
      canvas.classList.add('is-panning'); canvas.setPointerCapture(ev.pointerId);
    });
    canvas.addEventListener('pointermove', ev => {
      if(!dragging) return;
      const dx = ev.clientX - sx, dy = ev.clientY - sy;
      if(Math.abs(dx) + Math.abs(dy) > 3) moved = true;
      view.panX = start.x + dx; view.panY = start.y + dy; applyTransform();
    });
    function endPan(){ if(!dragging) return; dragging = false; canvas.classList.remove('is-panning'); }
    canvas.addEventListener('pointerup', endPan);
    canvas.addEventListener('pointercancel', endPan);
    canvas.addEventListener('click', ev => {
      if(moved || ev.target.closest('.toolbar')) return;
      if(ev.target === canvas || ev.target === $('world') || ev.target.tagName === 'svg' || ev.target.classList.contains('edges')){ selected = null; render(); }
    });
    canvas.addEventListener('wheel', ev => {
      ev.preventDefault();
      zoomAt(ev.deltaY < 0 ? 1.12 : 1 / 1.12, ev.clientX, ev.clientY);
    }, { passive: false });
    $('zoom-in').addEventListener('click', () => zoomAt(1.2));
    $('zoom-out').addEventListener('click', () => zoomAt(1 / 1.2));
    $('fit').addEventListener('click', () => fitToView(true));
    window.addEventListener('resize', () => fitToView(false));
    document.addEventListener('keydown', ev => {
      if(ev.target && ['INPUT','TEXTAREA','SELECT'].includes(ev.target.tagName)) return;
      if(ev.key === '+' || ev.key === '=') zoomAt(1.2);
      if(ev.key === '-') zoomAt(1 / 1.2);
      if(ev.key === '0') fitToView(true);
      if(ev.key === 'Escape'){ selected = null; render(); }
    });
  }
  init();
})();
</script>
</body>
</html>
