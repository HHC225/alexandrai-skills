    "source": "# AGENTS.md\n\nGuidance for coding agents working on **acme-web**. Human contributors should read `README.md`; this file holds the build, test, and convention details an agent needs.\n\n## Project overview\n\n- **Stack:** TypeScript, Next.js (App Router), PostgreSQL via Prisma.\n- **Layout:** pnpm workspace — `apps/web` (the app), `packages/ui` (component library), `packages/config` (shared lint/tsconfig).\n- **Entry point:** `apps/web/src/app`.\n\n## Setup commands\n\n- Install deps: `pnpm install`\n- Start dev server: `pnpm dev`\n- Build: `pnpm build`\n- Run tests: `pnpm test`\n- Lint + typecheck: `pnpm lint && pnpm typecheck`\n\n## Code style\n\n- TypeScript **strict** mode; no `any` without a `// why:` comment.\n- Single quotes, no semicolons, 2-space indent (enforced by Prettier — run `pnpm format`).\n- Prefer functional components and hooks; colocate a component's styles and tests beside it.\n- Name files `kebab-case.ts`; export one component per file.\n\n## Testing\n\n- Framework: Vitest + Testing Library.\n- Write the failing test first, then make it pass.\n- A change is not done until `pnpm test` is green and coverage on touched files does not drop.\n\n## Security\n\n- Never commit secrets; read config from environment variables.\n- Validate all external input at the route boundary with `zod`.\n- Server-only code stays under `src/server/**` and is never imported by client components.\n\n## Commit & PR rules\n\n1. Branch from `main`; keep each PR focused on one change.\n2. Conventional commit messages (`feat:`, `fix:`, `chore:` …).\n3. PRs must pass CI (lint, typecheck, test) before review.\n\n> **Note:** nested `AGENTS.md` files override this one for their subtree — agents read the nearest file first.\n"

(function(){
  "use strict";

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function attr(s){ return esc(s).replace(/"/g,'&quot;'); }
  function slug(s){ return String(s).toLowerCase().trim().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'') || 'section'; }

  // ---- inline spans (input is already HTML-escaped) ----
  function inline(s){
    return s.split(/(`[^`]+`)/g).map(function(part){
      if(part.length>1 && part.charAt(0)==='`' && part.charAt(part.length-1)==='`'){

        var safe = /^(https?:|mailto:|#|\/|\.\/|\.\.\/)/i.test(u) ? u : '#';
        return '<a href="'+attr(safe)+'" target="_blank" rel="noopener noreferrer">'+t+'</a>';
      });
      part = part.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
                 .replace(/__([^_]+)__/g,'<strong>$1</strong>')
                 .replace(/~~([^~]+)~~/g,'<del>$1</del>')
                 .replace(/(^|[^\*])\*([^\*\s][^\*]*?)\*(?!\*)/g,'$1<em>$2</em>')
                 .replace(/(^|[^_\w])_([^_\s][^_]*?)_(?![\w_])/g,'$1<em>$2</em>');

  // ---- nested list builder ----
  function renderList(items){
    // items: [{indent, ordered, text}] contiguous; build nested <ul>/<ol>
    var html='', stack=[];
    function open(ordered){ var t=ordered?'ol':'ul'; html+='<'+t+'>'; stack.push(t); }
    function close(){ html+='</'+stack.pop()+'>'; }
    var prevIndent=-1;
    items.forEach(function(it){
      if(it.indent>prevIndent){ open(it.ordered); }
      else if(it.indent<prevIndent){ while(stack.length>it.level+1){ html+='</li>'; close(); } html+='</li>'; }
      else { html+='</li>'; }

      if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)){ out.push('<hr>'); i++; continue; }
      // table (header row + separator)
      if(/^\s*\|.*\|\s*$/.test(line) && i+1<lines.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i+1]) && lines[i+1].indexOf('-')>=0){
        var head=splitRow(line); i+=2; var rows=[];
        while(i<lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){ rows.push(splitRow(lines[i])); i++; }
        var t='<table><thead><tr>'+head.map(function(c){return '<th>'+inline(esc(c))+'</th>';}).join('')+'</tr></thead><tbody>';
        rows.forEach(function(r){ t+='<tr>'+r.map(function(c){return '<td>'+inline(esc(c))+'</td>';}).join('')+'</tr>'; });
        out.push(t+'</tbody></table>'); continue;
      }
      // blockquote
      if(/^\s*>/.test(line)){
        var q=[]; while(i<lines.length && /^\s*>/.test(lines[i])){ q.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
        out.push('<blockquote>'+renderMarkdown(q.join('\n'))+'</blockquote>'); continue;
      }
      // list
      var lm=line.match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
      if(lm){
        var items=[];
        while(i<lines.length){
          var m=lines[i].match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
          if(!m) { if(/^\s+\S/.test(lines[i]) && items.length){ items[items.length-1].text+=' '+lines[i].trim(); i++; continue; } break; }
          var indent=Math.floor(m[1].length/2);
          items.push({indent:indent, level:indent, ordered:/\d/.test(m[2]), text:m[3]});
          i++;
        }
        out.push(renderList(items));
        continue;
      }
      // blank
      if(/^\s*$/.test(line)){ i++; continue; }
      // paragraph (gather until blank / block start)
      var para=[];
      while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6})\s/.test(lines[i]) && !/^```/.test(lines[i])
            && !/^\s*([-*_])(\s*\1){2,}\s*$/.test(lines[i]) && !/^\s*>/.test(lines[i])
            && !/^(\s*)([-*+]|\d+[.)])\s+/.test(lines[i]) && !/^\s*\|.*\|\s*$/.test(lines[i])){
        para.push(lines[i]); i++;
      }
      flushPara(para);
    }
    return out.join('\n');
  }
  function splitRow(line){
    return line.trim().replace(/^\||\|$/g,'').split('|').map(function(c){return c.trim();});
  }

  function el(id){ return document.getElementById(id); }
  function text(id,v){ var n=el(id); if(n) n.textContent=v; }

  var DATA={};
  try{ DATA=JSON.parse(el('report-data').textContent); }catch(e){ DATA={}; }
  var meta=DATA.meta||{}, doc=DATA.document||{};

  document.documentElement.setAttribute('data-theme', meta.theme||'slate');

  var fname=doc.filename||'AGENTS.md';
  text('r-filename', fname);
  text('r-eyebrow', meta.reportType||fname);
  text('r-title', meta.title||fname);
  var sub=el('r-subtitle'); if(meta.subtitle){ sub.textContent=meta.subtitle; } else { sub.hidden=true; }
  if(doc.summary){ text('r-summary-text', doc.summary); el('r-summary').hidden=false; }

  var metaItems=[];
  if(meta.org && meta.org!=='{{ORG}}') metaItems.push(meta.org);
  if(meta.project) metaItems.push(meta.project);
  if(meta.date) metaItems.push(meta.date);
  if(meta.author && meta.author!=='{{AUTHOR}}') metaItems.push(meta.author);
  el('r-metaline').innerHTML=metaItems.map(function(m){return '<span class="m">'+esc(m)+'</span>';}).join('');

  headings=[];
  el('r-md').innerHTML=renderMarkdown(doc.source||'');
  text('r-foot', [meta.project||'', fname, meta.date||''].filter(Boolean).join('  ·  '));

  // TOC
  var tl=el('r-toc-list');
  if(headings.length>=2){
    tl.innerHTML=headings.map(function(h){return '<li><a class="lvl'+h.level+'" href="#'+attr(h.id)+'">'+esc(h.text)+'</a></li>';}).join('');
  } else { el('r-toc').style.display='none'; }

  // scroll-spy
  var links=Array.prototype.slice.call(tl.querySelectorAll('a'));
  if(links.length){
    var targets=headings.map(function(h){return document.getElementById(h.id);});
    var onScroll=function(){
      var y=window.scrollY+90, idx=0;
      for(var k=0;k<targets.length;k++){ if(targets[k] && targets[k].offsetTop<=y) idx=k; }
      links.forEach(function(a,j){ a.classList.toggle('active', j===idx); });
    };
    window.addEventListener('scroll', onScroll, {passive:true}); onScroll();
  }

  // theme switch
  var sel=document.querySelector('.rc-theme-sel');
  if(sel){
    sel.value=document.documentElement.getAttribute('data-theme')||'slate';
    sel.addEventListener('change', function(){ document.documentElement.setAttribute('data-theme', sel.value); });
  }

  // copy markdown
  var toast=el('toast');
  function ping(msg){ toast.textContent=msg; toast.classList.add('show'); setTimeout(function(){toast.classList.remove('show');},1300); }
  var cb=el('copy-btn');
  if(cb){ cb.addEventListener('click', function(){
    var src=doc.source||'';
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(src).then(function(){ping('Copied '+fname);},function(){ping('Copy failed');}); }
    else { ping('Copy unavailable'); }
  }); }
})();
</script>
</body>
</html>
