<!doctype html>
<html lang="en" data-theme="indigo">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>{{PROJECT}} - Sequence Diagram</title>
<style>
:root{--bg:#fff;--bg-band:#f6f6f8;--bg-subtle:#fafafb;--bg-deep:#15131a;--rule:#dcdce2;--rule-soft:#ebebef;--ink:#11131a;--ink-mid:#33363f;--ink-soft:#5a5e68;--ink-faint:#868b95;--navy:#4338ca;--navy-deep:#312c92;--navy-bg:#ebebfb;--navy-line:#c7c3f0;--ok:#3730a3;--ok-bg:#ebeaf7;--ok-line:#c5c2ea;--risk:#b3261e;--risk-bg:#fbeceb;--risk-line:#edc7c4;--hold:#8a6d00;--hold-bg:#fbf3da;--hold-line:#e7d8a4;--mono:ui-monospace,"JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;--sans:-apple-system,"Segoe UI",system-ui,Roboto,"Noto Sans",sans-serif}
html[data-theme="blue"]{--navy:#0b5fd4;--navy-deep:#0842a0;--navy-bg:#e8f1fc;--navy-line:#bcd6f5;--ok:#1a4f9c;--ok-bg:#e9f0fa;--ok-line:#b7cdea}html[data-theme="purple"]{--navy:#a100ff;--navy-deep:#7a00c2;--navy-bg:#f3e8ff;--navy-line:#d9bef5;--ok:#5a2f8a;--ok-bg:#efe8f5;--ok-line:#d0b5e0}html[data-theme="indigo"]{--navy:#4338ca;--navy-deep:#312c92;--navy-bg:#ebebfb;--navy-line:#c7c3f0;--ok:#3730a3;--ok-bg:#ebeaf7;--ok-line:#c5c2ea}html[data-theme="teal"]{--navy:#0e7c86;--navy-deep:#095861;--navy-bg:#e0f3f4;--navy-line:#a9dade;--ok:#0f5d54;--ok-bg:#e3f3ef;--ok-line:#b3ddd4}html[data-theme="cyan"]{--navy:#0891b2;--navy-deep:#0e6f88;--navy-bg:#e2f4f9;--navy-line:#abdde9;--ok:#0e6b7a;--ok-bg:#e4f3f4;--ok-line:#b0dde2}html[data-theme="green"]{--navy:#1f7a44;--navy-deep:#155730;--navy-bg:#e6f4ea;--navy-line:#b3dcc1;--ok:#2f6b3c;--ok-bg:#e9f3ea;--ok-line:#bedcc4}html[data-theme="plum"]{--navy:#a21d6e;--navy-deep:#7c1450;--navy-bg:#fbe8f2;--navy-line:#e8b9d4;--ok:#6d2356;--ok-bg:#f6e8f0;--ok-line:#e3bcd5}html[data-theme="slate"]{--navy:#3f4f63;--navy-deep:#29384b;--navy-bg:#eef1f5;--navy-line:#c2ccd8;--ok:#34495e;--ok-bg:#eef1f5;--ok-line:#c2ccd8}html[data-theme="black"]{--navy:#000;--navy-deep:#000;--navy-bg:#f1f1f3;--navy-line:#d6d6db;--ok:#3f3f46;--ok-bg:#f1f1f3;--ok-line:#cfcfd6}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{font:13px/1.45 var(--sans);background:var(--bg-band);color:var(--ink);overflow:hidden}button,select{font:inherit}.app{height:100vh;display:grid;grid-template-columns:225px 1fr 305px;grid-template-rows:52px 1fr;grid-template-areas:"bar bar bar" "left trace right"}.bar{grid-area:bar;display:flex;gap:14px;align-items:center;padding:9px 16px;background:var(--bg);border-bottom:1px solid var(--rule);box-shadow:0 1px 3px rgba(17,19,26,.05);z-index:5}.mark{width:30px;height:30px;border-radius:8px;background:var(--navy);color:#fff;display:grid;place-items:center;font:800 13px/1 var(--mono)}.eyebrow{font:800 9px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}.title{font:800 15px/1.15 var(--sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title b{color:var(--navy-deep)}.spacer{flex:1}.stepper{display:flex;align-items:center;gap:6px;border:1px solid var(--rule);border-radius:8px;background:var(--bg-subtle);padding:4px}.stepper button{border:0;background:var(--bg);border-radius:6px;padding:4px 8px;cursor:pointer;color:var(--ink-mid)}.stepper button:hover{background:var(--navy-bg);color:var(--navy-deep)}.readout{font:800 10px/1 var(--mono);color:var(--ink-soft);padding:0 6px}.date{font:700 10px/1 var(--mono);letter-spacing:.06em;color:var(--ink-soft);text-transform:uppercase}.rc-theme{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--rule);border-radius:7px;padding:3px 4px 3px 7px;background:var(--bg)}.rc-theme-sw{width:12px;height:12px;border-radius:50%;background:var(--navy);box-shadow:0 0 0 1px var(--rule)}.rc-theme-sel{border:0;background:none;font:600 11px/1 var(--mono);color:var(--ink-mid);outline:none}.side{background:var(--bg);overflow:auto}.left{grid-area:left;border-right:1px solid var(--rule)}.right{grid-area:right;border-left:1px solid var(--rule)}.group{padding:14px;border-bottom:1px solid var(--rule-soft)}.label{font:800 9.5px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}.chip{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--rule);border-radius:8px;background:var(--bg);padding:8px 9px;margin-bottom:7px;font:700 11px/1.2 var(--sans);color:var(--ink-mid)}.chip b{font:800 9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}.kind{display:inline-flex;align-items:center;gap:6px;font:800 10px/1 var(--mono);color:var(--navy-deep);background:var(--navy-bg);border:1px solid var(--navy-line);border-radius:6px;padding:5px 8px;margin:0 5px 6px 0}.line{width:24px;border-top:2px solid var(--navy)}.line.async{border-top-style:dashed}.line.return{border-top-style:dotted}.line.error{border-top-color:var(--risk)}
.trace{grid-area:trace;position:relative;overflow:auto;background:var(--bg-subtle)}.inner{position:relative;width:1280px;min-height:860px;margin:0 auto;padding:28px 34px 60px}.heads{position:sticky;top:0;z-index:3;height:96px;background:linear-gradient(var(--bg-subtle) 0 82px,transparent);}.participant{position:absolute;top:12px;width:150px;transform:translateX(-50%);text-align:center;border:1px solid var(--rule);background:var(--bg);border-radius:10px;padding:9px 8px;box-shadow:0 5px 18px rgba(17,19,26,.07)}.participant .ptype{font:800 9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}.participant .pname{font:800 12.5px/1.2 var(--sans);color:var(--ink)}.lifeline{position:absolute;top:92px;bottom:30px;border-left:2px dashed var(--rule);z-index:0}.row-label{position:absolute;left:8px;font:800 10px/1 var(--mono);color:var(--ink-faint);transform:translateY(-50%)}svg.msgs{position:absolute;left:0;top:0;width:1280px;height:860px;overflow:visible;z-index:1}.msg-line{stroke:var(--navy);stroke-width:2;fill:none;marker-end:url(#arrow)}.msg-line.async{stroke-dasharray:7 6}.msg-line.return{stroke-dasharray:2 5;stroke:var(--ink-soft)}.msg-line.error{stroke:var(--risk)}.msg-line.dim{opacity:.2}.msg-label{font:800 10.5px/1 var(--mono);fill:var(--ink-mid)}.msg-pill{fill:var(--bg);stroke:var(--rule)}.hit{position:absolute;height:38px;left:34px;right:34px;border:1px solid transparent;border-radius:9px;z-index:2;cursor:pointer}.hit:hover,.hit.sel{border-color:var(--navy-line);background:rgba(255,255,255,.62);box-shadow:0 0 0 3px var(--navy-bg)}.note{position:absolute;right:44px;width:260px;border:1px solid var(--hold-line);background:var(--hold-bg);color:var(--hold);border-radius:9px;padding:8px 10px;font:600 11px/1.35 var(--sans);z-index:2}.detail{padding:16px}.detail h2{font:800 17px/1.2 var(--sans);margin:0 0 8px}.detail p{margin:10px 0;color:var(--ink-mid)}.st{display:inline-flex;align-items:center;gap:6px;font:800 10px/1 var(--mono);text-transform:uppercase;border:1px solid var(--rule);border-radius:6px;padding:4px 7px;background:var(--bg)}.st:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ink-faint)}.st.ok{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-line)}.st.ok:before{background:var(--ok)}.st.risk{color:var(--risk);background:var(--risk-bg);border-color:var(--risk-line)}.st.risk:before{background:var(--risk)}.st.hold{color:var(--hold);background:var(--hold-bg);border-color:var(--hold-line)}.st.hold:before{background:var(--hold)}.kv{display:grid;grid-template-columns:72px 1fr;gap:7px 10px;margin:13px 0}.k{font:800 9px/1.2 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}.v{font:600 12px/1.25 var(--sans);color:var(--ink-mid)}@media print{body{overflow:visible}.app{display:block}.bar,.side{display:none}.trace{overflow:visible}.heads{position:relative}}
</style>
</head>
<body>
<noscript>This report needs JavaScript to render the sequence diagram from #report-data.</noscript>
<div class="app">
  <header class="bar"><div class="mark">SD</div><div><div class="eyebrow" id="eyebrow"></div><div class="title" id="title"></div></div><div class="spacer"></div><div class="stepper"><button id="prev">Prev</button><span class="readout" id="readout"></span><button id="next">Next</button></div><div class="date" id="date"></div><label class="rc-theme"><span class="rc-theme-sw"></span><select class="rc-theme-sel" id="theme"><option>blue</option><option>purple</option><option>indigo</option><option>teal</option><option>cyan</option><option>green</option><option>plum</option><option>slate</option><option>black</option></select></label></header>
  <aside class="side left"><div class="group"><div class="label">Participants</div><div id="participants"></div></div><div class="group"><div class="label">Message kinds</div><span class="kind"><span class="line"></span>sync</span><span class="kind"><span class="line async"></span>async</span><span class="kind"><span class="line return"></span>return</span><span class="kind"><span class="line error"></span>error</span></div></aside>
  <main class="trace"><div class="inner" id="inner"><div class="heads" id="heads"></div><svg class="msgs" id="msgs" viewBox="0 0 1280 860"><defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="var(--navy)"/></marker></defs></svg><div id="hits"></div><div id="notes"></div></div></main>
  <aside class="side right"><div class="group"><div class="label">Selected step</div><div id="detail" class="detail"><p>Select a message or use the stepper to inspect request flow details.</p></div></div></aside>
</div>
<script type="application/json" id="report-data">
{
  "meta": {
    "org": "{{ORG}}",
    "project": "{{PROJECT}}",
    "reportType": "Sequence Diagram",
    "title": "Checkout Request - Payment Authorization Trace",
    "subtitle": "One request path from browser submit through API, domain service, provider adapter and event publication",
    "date": "2026-06-23",
    "author": "{{AUTHOR}}",
    "theme": "indigo"
  },
  "participants": [
    { "id": "browser", "label": "Browser", "type": "client", "owner": "customer", "status": "neutral" },
    { "id": "router", "label": "HTTP Router", "type": "module", "path": "src/routes/checkout.ts", "status": "ok" },
    { "id": "checkout", "label": "Checkout Service", "type": "service", "path": "src/domain/checkout", "status": "ok" },
    { "id": "payment", "label": "Payment Adapter", "type": "external", "path": "src/infra/payment-provider.ts", "status": "risk" },
    { "id": "orders", "label": "Order DB", "type": "database", "path": "orders", "status": "ok" },
    { "id": "events", "label": "Event Bus", "type": "queue", "path": "checkout.events", "status": "hold" }
  ],
  "messages": [
    { "step": 1, "from": "browser", "to": "router", "label": "POST /checkout", "kind": "sync", "detail": "Browser submits cart, customer and payment token.", "status": "ok" },
    { "step": 2, "from": "router", "to": "checkout", "label": "createCheckout(command)", "kind": "sync", "detail": "Route validates JSON and maps the request into a domain command.", "status": "ok" },
    { "step": 3, "from": "checkout", "to": "payment", "label": "authorize(amount, token)", "kind": "sync", "detail": "Main runtime dependency; provider failures currently bubble into request latency.", "status": "risk" },
    { "step": 4, "from": "payment", "to": "checkout", "label": "auth result", "kind": "return", "detail": "Adapter returns authorization id or provider decline code.", "status": "hold" },
    { "step": 5, "from": "checkout", "to": "orders", "label": "insert order + payment attempt", "kind": "sync", "detail": "Order repository persists the accepted checkout and payment audit record.", "status": "ok" },
    { "step": 6, "from": "checkout", "to": "events", "label": "checkout.completed", "kind": "event", "detail": "Event is published for fulfillment and notification consumers.", "status": "hold" },
    { "step": 7, "from": "checkout", "to": "router", "label": "201 Created", "kind": "return", "detail": "Domain response returns order id and next action.", "status": "ok" },
    { "step": 8, "from": "router", "to": "browser", "label": "render confirmation", "kind": "return", "detail": "Client receives order confirmation.", "status": "ok" }
  ],
  "notes": [
    { "step": 3, "participant": "payment", "text": "Retry and timeout policy should be reviewed before peak-sale traffic.", "status": "risk" },
    { "step": 6, "participant": "events", "text": "Async publication decouples fulfillment but needs idempotent consumers.", "status": "hold" }
  ]
}
</script>
<script type="application/json" id="alexandrai-metadata">
{
  "formatId": "sequence-diagram",
  "templateVersion": "sequence-diagram@1",
  "skillVersion": "alexandrai-research-publishing@0.2.0",
  "language": "en",
  "primaryCategory": "computer-science.software-engineering",
  "secondaryCategories": ["computer-science.systems"],
  "topics": ["request sequence", "repository trace", "system behavior"]
}
</script>
<script>
(function(){
  const data = JSON.parse(document.getElementById('report-data').textContent);
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const cls = (s) => s === 'ok' ? 'ok' : s === 'risk' ? 'risk' : s === 'hold' ? 'hold' : 'neutral';
  const x0 = 135, gap = 190, y0 = 128, row = 74;
  let index = 0;
  function init(){
    document.documentElement.dataset.theme = data.meta.theme || 'indigo';
    $('theme').value = document.documentElement.dataset.theme;
    $('theme').addEventListener('change', e => document.documentElement.dataset.theme = e.target.value);
    $('eyebrow').textContent = data.meta.reportType || 'Sequence Diagram';
    $('title').innerHTML = '<b>'+esc(data.meta.project)+'</b> - '+esc(data.meta.title);
    $('date').textContent = data.meta.date || '';
    $('prev').onclick = () => select(Math.max(0,index-1));
    $('next').onclick = () => select(Math.min(data.messages.length-1,index+1));
    render();
    select(0);
  }
  function pIndex(id){ return data.participants.findIndex(p => p.id === id); }
  function px(id){ return x0 + pIndex(id) * gap; }
  function py(i){ return y0 + i * row; }
  function render(){
    const height = y0 + data.messages.length * row + 80;
    $('inner').style.minHeight = height + 'px';
    $('msgs').setAttribute('height', height);
    $('msgs').setAttribute('viewBox', '0 0 1280 '+height);
    $('participants').innerHTML = data.participants.map(p => '<div class="chip">'+esc(p.label)+'<b>'+esc(p.type)+'</b></div>').join('');
    $('heads').innerHTML = data.participants.map((p,i) => '<div class="participant" style="left:'+px(p.id)+'px"><div class="ptype">'+esc(p.type)+'</div><div class="pname">'+esc(p.label)+'</div></div><div class="lifeline" style="left:'+px(p.id)+'px"></div>').join('');
    $('hits').innerHTML = data.messages.map((m,i) => '<button class="hit" data-i="'+i+'" style="top:'+(py(i)-19)+'px"></button><div class="row-label" style="top:'+py(i)+'px">'+String(i+1).padStart(2,'0')+'</div>').join('');
    $('hits').querySelectorAll('.hit').forEach(h => h.onclick = () => select(Number(h.dataset.i)));
    $('notes').innerHTML = (data.notes||[]).map(n => '<div class="note" style="top:'+(py(n.step-1)+18)+'px">'+esc(n.text)+'</div>').join('');
    drawMessages();
  }
  function drawMessages(){
    $('msgs').innerHTML = '<defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="var(--navy)"/></marker></defs>' + data.messages.map((m,i) => {
      const a = px(m.from), b = px(m.to), y = py(i), dir = a < b ? 1 : -1, mx = (a+b)/2;
      return '<path class="msg-line '+esc(m.kind||'sync')+'" d="M'+a+','+y+' L'+(b-14*dir)+','+y+'"/><g><rect class="msg-pill" x="'+(mx-82)+'" y="'+(y-15)+'" width="164" height="26" rx="8"/><text class="msg-label" x="'+mx+'" y="'+(y+3)+'" text-anchor="middle">'+esc(m.label)+'</text></g>';
    }).join('');
  }
  function select(i){
    index = i;
    document.querySelectorAll('.hit').forEach((h,n) => h.classList.toggle('sel', n === i));
    $('readout').textContent = (i+1)+' / '+data.messages.length;
    const m = data.messages[i], from = data.participants[pIndex(m.from)], to = data.participants[pIndex(m.to)];
    $('detail').innerHTML = '<h2>'+esc(m.label)+'</h2><span class="st '+cls(m.status)+'">'+esc(m.status||'neutral')+'</span><p>'+esc(m.detail||'')+'</p><div class="kv"><div class="k">from</div><div class="v">'+esc(from.label)+'</div><div class="k">to</div><div class="v">'+esc(to.label)+'</div><div class="k">kind</div><div class="v">'+esc(m.kind||'sync')+'</div><div class="k">paths</div><div class="v">'+esc((from.path||'')+' -> '+(to.path||''))+'</div></div>';
    const hit = document.querySelector('.hit[data-i="'+i+'"]');
    if(hit) hit.scrollIntoView({block:'center', behavior:'smooth'});
  }
  init();
})();
</script>
</body>
</html>
