<!doctype html>
<html lang="en" data-theme="black">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>{{PROJECT}} - Sequence Diagram</title>
<style>
:root{--bg:#fff;--bg-band:#f6f6f8;--bg-subtle:#fafafb;--bg-deep:#15131a;--rule:#dcdce2;--rule-soft:#ebebef;--ink:#11131a;--ink-mid:#33363f;--ink-soft:#5a5e68;--ink-faint:#868b95;--navy:#4338ca;--navy-deep:#312c92;--navy-bg:#ebebfb;--navy-line:#c7c3f0;--ok:#3730a3;--ok-bg:#ebeaf7;--ok-line:#c5c2ea;--risk:#b3261e;--risk-bg:#fbeceb;--risk-line:#edc7c4;--hold:#8a6d00;--hold-bg:#fbf3da;--hold-line:#e7d8a4;--mono:ui-monospace,"JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;--sans:-apple-system,"Segoe UI",system-ui,Roboto,"Noto Sans",sans-serif}
html[data-theme="blue"]{--navy:#0b5fd4;--navy-deep:#0842a0;--navy-bg:#e8f1fc;--navy-line:#bcd6f5;--ok:#1a4f9c;--ok-bg:#e9f0fa;--ok-line:#b7cdea}html[data-theme="purple"]{--navy:#a100ff;--navy-deep:#7a00c2;--navy-bg:#f3e8ff;--navy-line:#d9bef5;--ok:#5a2f8a;--ok-bg:#efe8f5;--ok-line:#d0b5e0}html[data-theme="indigo"]{--navy:#4338ca;--navy-deep:#312c92;--navy-bg:#ebebfb;--navy-line:#c7c3f0;--ok:#3730a3;--ok-bg:#ebeaf7;--ok-line:#c5c2ea}html[data-theme="teal"]{--navy:#0e7c86;--navy-deep:#095861;--navy-bg:#e0f3f4;--navy-line:#a9dade;--ok:#0f5d54;--ok-bg:#e3f3ef;--ok-line:#b3ddd4}html[data-theme="cyan"]{--navy:#0891b2;--navy-deep:#0e6f88;--navy-bg:#e2f4f9;--navy-line:#abdde9;--ok:#0e6b7a;--ok-bg:#e4f3f4;--ok-line:#b0dde2}html[data-theme="green"]{--navy:#1f7a44;--navy-deep:#155730;--navy-bg:#e6f4ea;--navy-line:#b3dcc1;--ok:#2f6b3c;--ok-bg:#e9f3ea;--ok-line:#bedcc4}html[data-theme="plum"]{--navy:#a21d6e;--navy-deep:#7c1450;--navy-bg:#fbe8f2;--navy-line:#e8b9d4;--ok:#6d2356;--ok-bg:#f6e8f0;--ok-line:#e3bcd5}html[data-theme="slate"]{--navy:#3f4f63;--navy-deep:#29384b;--navy-bg:#eef1f5;--navy-line:#c2ccd8;--ok:#34495e;--ok-bg:#eef1f5;--ok-line:#c2ccd8}html[data-theme="black"]{--navy:#000;--navy-deep:#000;--navy-bg:#f1f1f3;--navy-line:#d6d6db;--ok:#3f3f46;--ok-bg:#f1f1f3;--ok-line:#cfcfd6}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{font:13px/1.45 var(--sans);background:var(--bg-band);color:var(--ink);overflow:hidden}button,select{font:inherit}.app{height:100vh;display:grid;grid-template-columns:225px 1fr 305px;grid-template-rows:52px 1fr;grid-template-areas:"bar bar bar" "left trace right"}.bar{grid-area:bar;display:flex;gap:14px;align-items:center;padding:9px 16px;background:var(--bg);border-bottom:1px solid var(--rule);box-shadow:0 1px 3px rgba(17,19,26,.05);z-index:5}.mark{width:30px;height:30px;border-radius:8px;background:var(--navy);color:#fff;display:grid;place-items:center;font:800 13px/1 var(--mono)}.eyebrow{font:800 9px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}.title{font:800 15px/1.15 var(--sans);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title b{color:var(--navy-deep)}.spacer{flex:1}.stepper{display:flex;align-items:center;gap:6px;border:1px solid var(--rule);border-radius:8px;background:var(--bg-subtle);padding:4px}.stepper button{border:0;background:var(--bg);border-radius:6px;padding:4px 8px;cursor:pointer;color:var(--ink-mid)}.stepper button:hover{background:var(--navy-bg);color:var(--navy-deep)}.readout{font:800 10px/1 var(--mono);color:var(--ink-soft);padding:0 6px}.date{font:700 10px/1 var(--mono);letter-spacing:.06em;color:var(--ink-soft);text-transform:uppercase}.rc-theme{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--rule);border-radius:7px;padding:3px 4px 3px 7px;background:var(--bg)}.rc-theme-sw{width:12px;height:12px;border-radius:50%;background:var(--navy);box-shadow:0 0 0 1px var(--rule)}.rc-theme-sel{border:0;background:none;font:600 11px/1 var(--mono);color:var(--ink-mid);outline:none}.side{background:var(--bg);overflow:auto}.left{grid-area:left;border-right:1px solid var(--rule)}.right{grid-area:right;border-left:1px solid var(--rule)}.group{padding:14px;border-bottom:1px solid var(--rule-soft)}.label{font:800 9.5px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}.chip{display:flex;align-items:center;justify-content:space-between;gap:8px;min-width:0;border:1px solid var(--rule);border-radius:8px;background:var(--bg);padding:8px 9px;margin-bottom:7px;font:700 11px/1.2 var(--sans);color:var(--ink-mid);overflow-wrap:anywhere;word-break:break-word}.chip b{font:800 9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);flex:none}.kind{display:inline-flex;align-items:center;gap:6px;font:800 10px/1 var(--mono);color:var(--navy-deep);background:var(--navy-bg);border:1px solid var(--navy-line);border-radius:6px;padding:5px 8px;margin:0 5px 6px 0}.line{width:24px;border-top:2px solid var(--navy)}.line.async{border-top-style:dashed}.line.return{border-top-style:dotted}.line.error{border-top-color:var(--risk)}
.trace{grid-area:trace;position:relative;overflow:auto;cursor:grab;background:var(--bg-subtle);user-select:none;-webkit-user-select:none}.trace.is-panning{cursor:grabbing}.trace-space{position:relative;margin:0 auto}.inner{position:absolute;left:0;top:0;width:1280px;min-height:860px;padding:28px 34px 60px;transform-origin:0 0;will-change:transform}.heads{position:absolute;left:0;top:0;z-index:3;width:1280px;height:96px;background:linear-gradient(var(--bg-subtle) 0 82px,transparent)}.participant{position:absolute;top:12px;width:170px;transform:translateX(-50%);text-align:center;border:1px solid var(--rule);background:var(--bg);border-radius:10px;padding:9px 10px;box-shadow:0 5px 18px rgba(17,19,26,.07)}.participant .ptype{font:800 9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}.participant .pname{font:800 12.5px/1.2 var(--sans);color:var(--ink);overflow-wrap:anywhere;hyphens:auto}.lifeline{position:absolute;top:92px;bottom:30px;border-left:2px dashed var(--rule);z-index:0}.row-label{position:absolute;left:8px;font:800 10px/1 var(--mono);color:var(--ink-faint);transform:translateY(-50%)}svg.msgs{position:absolute;left:0;top:0;width:1280px;height:860px;overflow:visible;z-index:1}.msg-line{stroke:var(--navy);stroke-width:2;fill:none;marker-end:url(#arrow)}.msg-line.async{stroke-dasharray:7 6}.msg-line.return{stroke-dasharray:2 5;stroke:var(--ink-soft)}.msg-line.error{stroke:var(--risk)}.msg-line.dim{opacity:.2}.msg-label{font:800 10.5px/1 var(--mono);fill:var(--ink-mid)}.msg-pill{fill:var(--bg);stroke:var(--rule)}.hit{position:absolute;height:38px;left:34px;right:34px;border:1px solid transparent;border-radius:9px;z-index:2;cursor:pointer;background:none;-webkit-appearance:none;appearance:none}.hit:hover,.hit.sel{border-color:var(--navy-line);background:rgba(255,255,255,.62);box-shadow:0 0 0 3px var(--navy-bg)}.note{position:absolute;right:44px;width:260px;border:1px solid var(--hold-line);background:var(--hold-bg);color:var(--hold);border-radius:9px;padding:8px 10px;font:600 11px/1.35 var(--sans);z-index:2;overflow-wrap:anywhere;word-break:break-word}.toolbar{position:absolute;left:16px;bottom:16px;z-index:20;display:flex;align-items:center;gap:4px;padding:5px;background:var(--bg);border:1px solid var(--rule);border-radius:10px;box-shadow:0 2px 8px rgba(17,19,26,.12)}.tool-btn{width:32px;height:32px;border-radius:7px;border:1px solid transparent;background:var(--bg);color:var(--ink-mid);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .12s,color .12s,border-color .12s}.tool-btn:hover{background:var(--navy-bg);color:var(--navy-deep);border-color:var(--navy-line)}.tool-btn svg{width:17px;height:17px}.tool-sep{width:1px;height:20px;background:var(--rule);margin:0 2px}.zoom-readout{font:700 11px/1 var(--mono);letter-spacing:.03em;color:var(--ink-soft);min-width:42px;text-align:center;padding:0 4px}.detail{padding:16px}.detail h2{font:800 17px/1.2 var(--sans);margin:0 0 8px;overflow-wrap:anywhere}.detail p{margin:10px 0;color:var(--ink-mid)}.st{display:inline-flex;align-items:center;gap:6px;font:800 10px/1 var(--mono);text-transform:uppercase;border:1px solid var(--rule);border-radius:6px;padding:4px 7px;background:var(--bg)}.st:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ink-faint)}.st.ok{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-line)}.st.ok:before{background:var(--ok)}.st.risk{color:var(--risk);background:var(--risk-bg);border-color:var(--risk-line)}.st.risk:before{background:var(--risk)}.st.hold{color:var(--hold);background:var(--hold-bg);border-color:var(--hold-line)}.st.hold:before{background:var(--hold)}.kv{display:grid;grid-template-columns:72px 1fr;gap:7px 10px;margin:13px 0}.k{font:800 9px/1.2 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}.v{font:600 12px/1.25 var(--sans);color:var(--ink-mid);overflow-wrap:anywhere;word-break:break-word}@media print{body{overflow:visible}.app{display:block}.bar,.side,.toolbar{display:none}.trace{overflow:visible;cursor:auto}.trace-space{width:auto!important;height:auto!important}.inner{position:relative;transform:none!important}.heads{position:absolute}}
</style>
</head>
<body>
<noscript>This report needs JavaScript to render the sequence diagram from #report-data.</noscript>
<div class="app">
  <header class="bar"><div class="mark">SD</div><div><div class="eyebrow" id="eyebrow"></div><div class="title" id="title"></div></div><div class="spacer"></div><div class="stepper"><button id="prev">Prev</button><span class="readout" id="readout"></span><button id="next">Next</button></div><div class="date" id="date"></div><label class="rc-theme"><span class="rc-theme-sw"></span><select class="rc-theme-sel" id="theme"><option>blue</option><option>purple</option><option>indigo</option><option>teal</option><option>cyan</option><option>green</option><option>plum</option><option>slate</option><option>black</option></select></label></header>
  <aside class="side left"><div class="group"><div class="label">Participants</div><div id="participants"></div></div><div class="group"><div class="label">Message kinds</div><span class="kind"><span class="line"></span>sync</span><span class="kind"><span class="line async"></span>async</span><span class="kind"><span class="line return"></span>return</span><span class="kind"><span class="line error"></span>error</span></div></aside>
  <main class="trace" id="trace"><div class="trace-space" id="trace-space"><div class="inner" id="inner"><div class="heads" id="heads"></div><div id="lifelines"></div><svg class="msgs" id="msgs" viewBox="0 0 1280 860"><defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="var(--navy)"/></marker></defs></svg><div id="hits"></div><div id="notes"></div></div></div><div class="toolbar" role="group" aria-label="zoom controls"><button class="tool-btn" id="zoom-out" type="button" title="Zoom out" aria-label="Zoom out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6.5"/><path d="M16 16 20.5 20.5M8.5 11h5"/></svg></button><span class="zoom-readout" id="zoom-readout">100%</span><button class="tool-btn" id="zoom-in" type="button" title="Zoom in" aria-label="Zoom in"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6.5"/><path d="M16 16 20.5 20.5M11 8.5v5M8.5 11h5"/></svg></button><span class="tool-sep"></span><button class="tool-btn" id="fit" type="button" title="Fit to view" aria-label="Fit to view"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3.5H4.5V7M16 3.5h3.5V7M19.5 17v3.5H16M8 20.5H4.5V17"/><path d="M8.5 12h7"/></svg></button></div></main>
  <aside class="side right"><div class="group"><div class="label">Selected step</div><div id="detail" class="detail"><p>Select a message or use the stepper to inspect request flow details.</p></div></div></aside>
</div>

<script type="application/json" id="alexandrai-metadata">
{
  "formatId": "sequence-diagram",
  "templateVersion": "sequence-diagram@1",
  "skillVersion": "alexandrai-research-publishing@0.2.0",

<script>
(function(){
  const data = JSON.parse(document.getElementById('report-data').textContent);
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const cls = (s) => s === 'ok' ? 'ok' : s === 'risk' ? 'risk' : s === 'hold' ? 'hold' : 'neutral';
  const clampLabel = (s, w) => { s = String(s ?? ''); const max = Math.max(3, Math.floor((w - 20) / 6.4)); return s.length > max ? s.slice(0, Math.max(1, max - 1)) + '…' : s; };
  const W = 1280, H = 860, x0 = 135, gap = 190, y0 = 128, row = 74;
  let index = 0, traceHeight = H, view = { zoom: 1 };
  function init(){
    document.documentElement.dataset.theme = data.meta.theme || 'black';
    $('theme').value = document.documentElement.dataset.theme;
    $('theme').addEventListener('change', e => document.documentElement.dataset.theme = e.target.value);
    $('eyebrow').textContent = data.meta.reportType || 'Sequence Diagram';
    $('title').innerHTML = '<b>'+esc(data.meta.project)+'</b> - '+esc(data.meta.title);
    $('date').textContent = data.meta.date || '';
    $('prev').onclick = () => select(Math.max(0,index-1));
    $('next').onclick = () => select(Math.min(data.messages.length-1,index+1));
    render();
    fitToView(false);
    wireCanvas();
    select(0);
  }
  function pIndex(id){ return data.participants.findIndex(p => p.id === id); }
  function px(id){ return x0 + pIndex(id) * gap; }
  function py(i){ return y0 + i * row; }
  function render(){
    const height = Math.max(H, y0 + data.messages.length * row + 80);
    traceHeight = height;
    $('inner').style.height = height + 'px';
    $('inner').style.minHeight = height + 'px';
    $('msgs').setAttribute('height', height);
    $('msgs').setAttribute('viewBox', '0 0 '+W+' '+height);
    $('participants').innerHTML = data.participants.map(p => '<div class="chip">'+esc(p.label)+'<b>'+esc(p.type)+'</b></div>').join('');
    $('heads').innerHTML = data.participants.map(p => '<div class="participant" style="left:'+px(p.id)+'px"><div class="ptype">'+esc(p.type)+'</div><div class="pname">'+esc(p.label)+'</div></div>').join('');
    $('lifelines').innerHTML = data.participants.map(p => '<div class="lifeline" style="left:'+px(p.id)+'px"></div>').join('');
    $('hits').innerHTML = data.messages.map((m,i) => '<button class="hit" data-i="'+i+'" style="top:'+(py(i)-19)+'px"></button><div class="row-label" style="top:'+py(i)+'px">'+String(i+1).padStart(2,'0')+'</div>').join('');
    $('hits').querySelectorAll('.hit').forEach(h => h.onclick = () => select(Number(h.dataset.i)));
    $('notes').innerHTML = (data.notes||[]).map(n => '<div class="note" style="top:'+(py(n.step-1)+18)+'px">'+esc(n.text)+'</div>').join('');
    drawMessages();
    applyTransform();
  }
  function drawMessages(){
    $('msgs').innerHTML = '<defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="var(--navy)"/></marker></defs>' + data.messages.map((m,i) => {
      const a = px(m.from), b = px(m.to), y = py(i), dir = a < b ? 1 : -1, mx = (a+b)/2;
      const raw = String(m.label || '');
      const pillW = Math.min(260, Math.max(72, raw.length * 6.4 + 24));
      const label = clampLabel(raw, pillW);
      return '<path class="msg-line '+esc(m.kind||'sync')+'" d="M'+a+','+y+' L'+(b-14*dir)+','+y+'"/><g><title>'+esc(raw)+'</title><rect class="msg-pill" x="'+(mx-pillW/2)+'" y="'+(y-15)+'" width="'+pillW+'" height="26" rx="8"/><text class="msg-label" x="'+mx+'" y="'+(y+3)+'" text-anchor="middle">'+esc(label)+'</text></g>';
    }).join('');
  }
  function select(i){
    index = i;
    document.querySelectorAll('.hit').forEach((h,n) => h.classList.toggle('sel', n === i));
    $('readout').textContent = (i+1)+' / '+data.messages.length;
    const m = data.messages[i], from = data.participants[pIndex(m.from)], to = data.participants[pIndex(m.to)];
    $('detail').innerHTML = '<h2>'+esc(m.label)+'</h2><span class="st '+cls(m.status)+'">'+esc(m.status||'neutral')+'</span><p>'+esc(m.detail||'')+'</p><div class="kv"><div class="k">from</div><div class="v">'+esc(from.label)+'</div><div class="k">to</div><div class="v">'+esc(to.label)+'</div><div class="k">kind</div><div class="v">'+esc(m.kind||'sync')+'</div><div class="k">paths</div><div class="v">'+esc((from.path||'')+' -> '+(to.path||''))+'</div></div>';
    const trace = $('trace');
    trace.scrollTo({ top: Math.max(0, py(i) * view.zoom - trace.clientHeight / 2), behavior: 'smooth' });
  }
  function applyTransform(){
    $('inner').style.transform = 'scale('+view.zoom+')';
    $('trace-space').style.width = (W * view.zoom) + 'px';
    $('trace-space').style.height = (traceHeight * view.zoom) + 'px';
    $('zoom-readout').textContent = Math.round(view.zoom * 100) + '%';
  }
  function clampZoom(z){ return Math.max(0.32, Math.min(2.8, z)); }
  function zoomAt(factor, cx, cy){
    const trace = $('trace');
    const r = trace.getBoundingClientRect();
    const ox = cx == null ? r.width / 2 : cx - r.left;
    const oy = cy == null ? r.height / 2 : cy - r.top;
    const beforeX = (trace.scrollLeft + ox) / view.zoom;
    const beforeY = (trace.scrollTop + oy) / view.zoom;
    view.zoom = clampZoom(view.zoom * factor);
    applyTransform();
    trace.scrollLeft = beforeX * view.zoom - ox;
    trace.scrollTop = beforeY * view.zoom - oy;
  }
  function fitToView(animate){
    const trace = $('trace');
    const pad = 56;
    view.zoom = clampZoom(Math.min((trace.clientWidth - pad * 2) / W, (trace.clientHeight - pad * 2) / traceHeight));
    const inner = $('inner');
    inner.style.transition = animate ? 'transform .2s ease' : 'none';
    applyTransform();
    trace.scrollLeft = Math.max(0, (W * view.zoom - trace.clientWidth) / 2);
    trace.scrollTop = 0;
    if(animate) setTimeout(() => { inner.style.transition = 'none'; }, 220);
  }
  function wireCanvas(){
    const trace = $('trace');
    let dragging = false, sx = 0, sy = 0, sl = 0, st = 0;
    trace.addEventListener('pointerdown', ev => {
      if(ev.button !== 0 || ev.target.closest('.hit,.toolbar,button,select')) return;
      dragging = true; sx = ev.clientX; sy = ev.clientY; sl = trace.scrollLeft; st = trace.scrollTop;
      trace.classList.add('is-panning'); trace.setPointerCapture(ev.pointerId);
    });
    trace.addEventListener('pointermove', ev => {
      if(!dragging) return;
      trace.scrollLeft = sl - (ev.clientX - sx);
      trace.scrollTop = st - (ev.clientY - sy);
    });
    function endPan(){ if(!dragging) return; dragging = false; trace.classList.remove('is-panning'); }
    trace.addEventListener('pointerup', endPan);
    trace.addEventListener('pointercancel', endPan);
    trace.addEventListener('wheel', ev => {
      ev.preventDefault();
      zoomAt(ev.deltaY < 0 ? 1.12 : 1 / 1.12, ev.clientX, ev.clientY);
    }, { passive: false });
    $('zoom-in').addEventListener('click', () => zoomAt(1.2));
    $('zoom-out').addEventListener('click', () => zoomAt(1 / 1.2));
    $('fit').addEventListener('click', () => fitToView(true));
    window.addEventListener('resize', () => fitToView(false));
    document.addEventListener('keydown', ev => {
      if(ev.target && ['INPUT','TEXTAREA','SELECT'].includes(ev.target.tagName)) return;
      if(ev.key === '+' || ev.key === '=') zoomAt(1.2);
      if(ev.key === '-') zoomAt(1 / 1.2);
      if(ev.key === '0') fitToView(true);
    });
  }
  init();
})();
</script>
</body>
</html>
